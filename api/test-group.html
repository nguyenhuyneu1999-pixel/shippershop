<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug Group</title></head>
<body>
<div id="result" style="font-family:monospace;white-space:pre;padding:20px"></div>
<script>
var el=document.getElementById("result");
function log(m){el.textContent+=m+"\n";console.log(m);}

log("1. Check localStorage user");
var CU=JSON.parse(localStorage.getItem("user")||"null");
log("  CU: "+(CU?CU.fullname:"NOT LOGGED IN"));

log("\n2. Fetch group detail");
fetch("/api/groups.php?action=detail&id=1",{credentials:"include"}).then(function(r){return r.json();}).then(function(d){
  log("  success: "+d.success);
  log("  name: "+(d.data?d.data.name:"N/A"));
  log("  is_member: "+(d.data?d.data.is_member:"N/A"));
  
  log("\n3. Fetch group posts");
  return fetch("/api/groups.php?action=posts&group_id=1&limit=3&sort=new",{credentials:"include"});
}).then(function(r){return r.json();}).then(function(d){
  log("  success: "+d.success);
  log("  posts: "+(d.data&&d.data.posts?d.data.posts.length:"N/A"));
  if(d.data&&d.data.posts&&d.data.posts[0]){
    var p=d.data.posts[0];
    log("  first post: #"+p.id+" "+p.content.substring(0,40)+"...");
    log("  images: "+p.images);
    log("  user_name: "+p.user_name);
  }
  
  log("\n4. Test mkPost rendering");
  log("  (loading group.html scripts...)");
}).catch(function(e){
  log("ERROR: "+e.message);
});
</script>
</body></html>
