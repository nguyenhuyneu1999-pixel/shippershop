<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - ShipperShop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
            <div class="container">
                <div class="d-flex justify-between align-center">
                    <div class="header-top-left">
                        <span>📞 1900-6868</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-main">
            <div class="container">
                <div class="header-content">
                    <a href="index.html" class="logo">🛒 SHIPPER<span>SHOP</span></a>
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Tìm kiếm...">
                        <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
                    </div>
                    <div class="header-actions">
                        <a href="cart.html" class="header-btn">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="cart-badge" id="cartCount">0</span>
                        </a>
                        <a href="login.html" class="header-btn" id="authBtn">
                            <i class="fas fa-user"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- CART SECTION -->
    <section class="cart-section">
        <div class="container">
            <h1 style="margin-bottom: 30px;">🛒 Giỏ hàng của bạn</h1>

            <div class="cart-container">
                <!-- CART ITEMS -->
                <div class="cart-items">
                    <div id="cartItemsList">
                        <!-- Cart items loaded by JS -->
                    </div>
                </div>

                <!-- CART SUMMARY -->
                <div class="cart-summary">
                    <h3 style="margin-bottom: 20px;">Tổng đơn hàng</h3>

                    <div class="summary-row">
                        <span>Tạm tính:</span>
                        <span id="subtotal">0₫</span>
                    </div>

                    <div class="summary-row">
                        <span>Phí vận chuyển:</span>
                        <span id="shippingFee">0₫</span>
                    </div>

                    <div class="summary-row">
                        <span>Giảm giá:</span>
                        <span id="discount" style="color: var(--danger);">-0₫</span>
                    </div>

                    <div class="summary-row summary-total">
                        <span>Tổng cộng:</span>
                        <span id="total">0₫</span>
                    </div>

                    <div style="margin: 20px 0; padding: 15px; background: var(--light); border-radius: 10px;">
                        <input type="text" id="voucherInput" placeholder="Nhập mã giảm giá" style="width: 100%; margin-bottom: 10px;">
                        <button onclick="applyVoucher()" style="width: 100%; padding: 10px; background: var(--white); border: 1px solid var(--gray-light); border-radius: 8px; cursor: pointer;">
                            Áp dụng
                        </button>
                    </div>

                    <button class="checkout-btn" onclick="goToCheckout()">
                        <i class="fas fa-lock"></i> Tiến hành thanh toán
                    </button>

                    <div style="margin-top: 20px; text-align: center;">
                        <a href="marketplace.html" style="color: var(--primary); text-decoration: underline;">
                            ← Tiếp tục mua sắm
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer style="background: var(--dark); color: white; padding: 40px 0 20px; margin-top: 60px;">
        <div class="container" style="text-align: center;">
            <p style="color: rgba(255,255,255,0.5);">&copy; 2024 ShipperShop</p>
        </div>
    </footer>

    <script src="js/shop.js"></script>
    <script>
        const SHIPPING_FEE = 30000;
        const FREE_SHIPPING_THRESHOLD = 500000;

        // Load cart items
        function loadCart() {
            const container = document.getElementById('cartItemsList');
            
            if (cart.items.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px;">
                        <i class="fas fa-shopping-cart" style="font-size: 64px; color: var(--gray-light); margin-bottom: 20px;"></i>
                        <h3 style="margin-bottom: 15px;">Giỏ hàng trống</h3>
                        <p style="color: var(--gray); margin-bottom: 25px;">Hãy thêm sản phẩm vào giỏ hàng để tiếp tục mua sắm</p>
                        <a href="marketplace.html" class="btn btn-primary">Mua sắm ngay</a>
                    </div>
                `;
                updateSummary();
                return;
            }

            container.innerHTML = cart.items.map(item => `
                <div class="cart-item" data-id="${item.id}">
                    <div class="cart-item-image">
                        <img src="${item.image}" alt="${item.name}">
                    </div>

                    <div class="cart-item-info">
                        <h3 class="cart-item-name">
                            <a href="product.html?id=${item.id}">${item.name}</a>
                        </h3>
                        <div class="cart-item-price">${formatCurrency(item.price)}</div>
                        
                        <div class="quantity-selector">
                            <button class="qty-btn" onclick="updateItemQty(${item.id}, ${item.quantity - 1})">-</button>
                            <input type="number" class="qty-input" value="${item.quantity}" min="1" onchange="updateItemQty(${item.id}, this.value)">
                            <button class="qty-btn" onclick="updateItemQty(${item.id}, ${item.quantity + 1})">+</button>
                        </div>
                    </div>

                    <div style="margin-left: auto; text-align: right;">
                        <div style="font-size: 20px; font-weight: bold; color: var(--primary); margin-bottom: 10px;">
                            ${formatCurrency(item.price * item.quantity)}
                        </div>
                        <button class="remove-btn" onclick="removeItem(${item.id})">
                            <i class="fas fa-trash"></i> Xóa
                        </button>
                    </div>
                </div>
            `).join('');

            updateSummary();
        }

        // Update item quantity
        function updateItemQty(productId, newQty) {
            newQty = parseInt(newQty);
            if (newQty < 1) {
                if (confirm('Bạn muốn xóa sản phẩm này khỏi giỏ hàng?')) {
                    removeItem(productId);
                }
                return;
            }

            cart.updateQuantity(productId, newQty);
            loadCart();
        }

        // Remove item
        function removeItem(productId) {
            if (confirm('Xóa sản phẩm này khỏi giỏ hàng?')) {
                cart.remove(productId);
                loadCart();
            }
        }

        // Update summary
        function updateSummary() {
            const subtotal = cart.getTotal();
            const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
            const discount = 0; // TODO: Apply voucher
            const total = subtotal + shipping - discount;

            document.getElementById('subtotal').textContent = formatCurrency(subtotal);
            document.getElementById('shippingFee').textContent = shipping === 0 ? 'Miễn phí' : formatCurrency(shipping);
            document.getElementById('discount').textContent = discount > 0 ? '-' + formatCurrency(discount) : '0₫';
            document.getElementById('total').textContent = formatCurrency(total);

            if (subtotal >= FREE_SHIPPING_THRESHOLD && shipping === 0) {
                document.getElementById('shippingFee').innerHTML = '<span style="color: var(--success);">Miễn phí 🎉</span>';
            }
        }

        // Apply voucher
        function applyVoucher() {
            const code = document.getElementById('voucherInput').value.trim();
            if (!code) {
                alert('Vui lòng nhập mã giảm giá');
                return;
            }

            // TODO: Validate voucher via API
            alert('Mã giảm giá không hợp lệ!');
        }

        // Go to checkout
        function goToCheckout() {
            if (cart.items.length === 0) {
                alert('Giỏ hàng trống!');
                return;
            }

            // Check if user logged in
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            if (!user) {
                if (confirm('Bạn cần đăng nhập để tiếp tục. Đăng nhập ngay?')) {
                    localStorage.setItem('returnUrl', 'checkout.html');
                    window.location.href = 'login.html';
                }
                return;
            }

            window.location.href = 'checkout.html';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadCart);
    </script>
    <script src="js/mobile.js"></script>

  <!-- MOBILE BOTTOM NAV - rendered in HTML, no JS injection -->
  <nav id="mobileBottomNav" role="navigation" aria-label="Mobile navigation">
    <a href="index.html"     class="mnav-item" data-page="index.html">
      <i class="fas fa-home"></i><span>Trang chủ</span>
    </a>
    <a href="marketplace.html"      class="mnav-item" data-page="marketplace.html">
      <i class="fas fa-store"></i>
      <span class="mnav-badge" id="navCartBadge" style="display:none">0</span>
      <span>Mua sắm</span>
    </a>
    <button class="mnav-item mnav-fab-wrap" onclick="handleFab()" aria-label="Hành động nhanh">
      <div class="mnav-fab"><i class="fas fa-search" id="fabIcon"></i></div>
    </button>
    <a href="map.html" class="mnav-item" data-page="map.html">
      <i class="fas fa-map-marked-alt"></i><span>Bản đồ</span>
    </a>
    <a href="profile.html"   class="mnav-item" data-page="profile.html" id="navProfileItem">
      <i class="fas fa-user" id="navProfileIcon"></i><span id="navProfileName">Tài khoản</span>
    </a>
  </nav>

  <!-- BACK TO TOP -->
  <button id="backToTop" onclick="scrollToTop()" aria-label="Lên đầu trang">
    <i class="fas fa-chevron-up"></i>
  </button>

  <!-- PULL TO REFRESH INDICATOR -->
  <div id="pullIndicator" aria-hidden="true">
    <i class="fas fa-rotate-right"></i>
    <span>Kéo xuống để làm mới</span>
  </div>

<script src="js/post-modal.js"></script>
</body>
</html>
