<!DOCTYPE html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1">
<script>
window.onload=function(){
  var all=document.querySelectorAll('*');
  var vw=document.documentElement.clientWidth;
  var results=[];
  all.forEach(function(el){
    var r=el.getBoundingClientRect();
    if(r.right>vw+2){
      results.push({tag:el.tagName,class:el.className,id:el.id,width:Math.round(r.width),right:Math.round(r.right),vw:vw});
    }
  });
  document.body.innerHTML='<h2>Viewport: '+vw+'px</h2><pre>'+JSON.stringify(results,null,2)+'</pre>';
};
</script>
</head>
<body>
<p>Loading index.html content...</p>
</body></html>
