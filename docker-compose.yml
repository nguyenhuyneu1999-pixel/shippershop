# ShipperShop Docker Compose — Run on VPS for 100K users
# Usage: docker-compose up -d
# All services auto-configure, zero manual setup

version: '3.8'

services:
  # === NGINX (Load Balancer + Static Cache) ===
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public_html:/var/www/html:ro
      - ./vps-config/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/tmp/nginx_cache
    depends_on:
      - php1
      - php2
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  # === PHP-FPM Worker 1 ===
  php1:
    image: php:8.2-fpm-alpine
    volumes:
      - ./public_html:/var/www/html
      - ./uploads:/var/www/html/uploads
    environment:
      - DB_HOST=mysql
      - DB_NAME=shippershop
      - DB_USER=shippershop
      - DB_PASS=${DB_PASS:-shippershop_pass}
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # === PHP-FPM Worker 2 (scale) ===
  php2:
    image: php:8.2-fpm-alpine
    volumes:
      - ./public_html:/var/www/html
      - ./uploads:/var/www/html/uploads
    environment:
      - DB_HOST=mysql
      - DB_NAME=shippershop
      - DB_USER=shippershop
      - DB_PASS=${DB_PASS:-shippershop_pass}
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  # === MySQL Primary ===
  mysql:
    image: mysql:8.0
    volumes:
      - mysql_data:/var/lib/mysql
      - ./vps-config/mysql/docker.cnf:/etc/mysql/conf.d/custom.cnf:ro
    environment:
      - MYSQL_DATABASE=shippershop
      - MYSQL_USER=shippershop
      - MYSQL_PASSWORD=${DB_PASS:-shippershop_pass}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS:-root_pass_change_me}
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G

  # === Redis (Cache + Session + Queue) ===
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 900 1
    volumes:
      - redis_data:/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 600M

  # === Queue Worker ===
  queue:
    image: php:8.2-cli-alpine
    command: php /var/www/html/scripts/queue-worker.php
    volumes:
      - ./public_html:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_NAME=shippershop
      - DB_USER=shippershop
      - DB_PASS=${DB_PASS:-shippershop_pass}
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M

  # === Cron (Health check + Cache warm + Backup) ===
  cron:
    image: php:8.2-cli-alpine
    command: sh -c "while true; do php /var/www/html/api/cache-warm.php key=ss_cache_warm_key 2>/dev/null; sleep 300; done"
    volumes:
      - ./public_html:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_NAME=shippershop
      - DB_USER=shippershop
      - DB_PASS=${DB_PASS:-shippershop_pass}
    depends_on:
      - mysql
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mysql_data:
  redis_data:
  nginx_cache:
