<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#7C3AED">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhóm - ShipperShop</title>
<link rel="stylesheet" href="css/style-v2.css">
<link rel="stylesheet" href="mobile.css">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
:root{--primary:#7C3AED;--bg:#f0f2f5;--card:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding-bottom:80px}

/* Header */
.gh{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;display:flex;align-items:center;padding:10px 12px;gap:10px;border-bottom:1px solid var(--border)}
.gh-back{background:none;border:none;font-size:18px;padding:4px;cursor:pointer;color:var(--text)}
.gh-name{flex:1;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gh-meta{font-size:11px;color:var(--muted);font-weight:400}
.gh-icons{display:flex;gap:6px}
.gh-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg);font-size:16px;color:var(--text);border:none;cursor:pointer}
.gh-join{padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;border:none;cursor:pointer}
.gh-join.join{background:var(--primary);color:#fff}
.gh-join.joined{background:var(--bg);color:var(--muted);border:1px solid var(--border)}

/* Group banner/info */
.g-banner{padding-top:56px;background:#fff;border-bottom:1px solid var(--border)}
.g-banner-info{padding:16px;display:flex;gap:14px;align-items:flex-start}
.g-banner-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;flex-shrink:0}
.g-banner-text h1{font-size:20px;font-weight:800;margin-bottom:2px}
.g-banner-text .gm{font-size:13px;color:var(--muted)}

/* Tabs */
.g-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:56px;z-index:50}
.g-tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.g-tab.active{color:var(--primary);border-bottom-color:var(--primary)}

/* Posts - Facebook-style matching feed */
.post-card{background:#fff;margin-top:8px;overflow:hidden}
.post-meta{display:flex;gap:10px;padding:10px 16px 4px;align-items:center}
.post-av{width:40px;height:40px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden}
.post-av img{width:100%;height:100%;object-fit:cover}
.post-author{font-weight:700;font-size:14px}
.post-author a{color:var(--text);text-decoration:none}
.post-time{font-size:12px;color:var(--muted)}
.post-content{padding:4px 16px 8px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.post-content.trunc{max-height:120px;overflow:hidden}
.show-more{display:block;padding:0 16px 8px;font-size:13px;color:var(--primary);font-weight:600;cursor:pointer}
.post-images{width:100%;display:block}
.post-images img{width:100%;display:block;max-height:500px;object-fit:cover;cursor:pointer}
.post-images.multi{display:flex;gap:2px;flex-wrap:wrap}
.post-images.multi img{width:calc(50% - 1px);max-height:250px}
.pa3-stats{display:flex;padding:6px 16px;font-size:11px;color:var(--muted)}
.pa3-stats span{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pa3-stats span:nth-child(2){text-align:center}
.pa3-stats span:last-child{text-align:right}
.post-actions-3{display:flex;border-top:1px solid var(--border)}
.pa3-btn{flex:1;padding:10px 0;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-right:1px solid var(--border)}
.pa3-btn:last-child{border-right:none}
.pa3-btn:active{background:#EDE9FE}
.pa3-btn.pa3-active{color:var(--primary);background:#EDE9FE}
.ship-badge{font-size:11px;font-weight:700}
.type-badge{font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-left:4px}
.type-badge.b-review{background:#FFF3E0;color:#E65100}
.type-badge.b-question{background:#E3F2FD;color:#1565C0}
.type-badge.b-tip{background:#FFF8E1;color:#F57F17}
.type-badge.b-post{background:#F3E5F5;color:#7B1FA2}

/* About tab */
.about-section{background:#fff;margin-top:8px;padding:16px}
.about-section h3{font-size:15px;font-weight:700;margin-bottom:12px}
.rule-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.rule-item:last-child{border-bottom:none}
.rule-num{width:28px;height:28px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0}
.rule-title{font-size:14px;font-weight:600}
.rule-desc{font-size:13px;color:var(--muted);margin-top:2px}
.mod-item{display:flex;gap:10px;align-items:center;padding:8px 0}
.mod-av{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.mod-av img{width:100%;height:100%;object-fit:cover}
.mod-name{font-size:14px;font-weight:600}
.mod-role{font-size:12px;color:var(--muted)}
.msg-mod-btn{display:block;width:100%;padding:12px;text-align:center;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:12px;color:var(--text)}
.msg-mod-btn:active{background:var(--bg)}

/* Leaderboard */
.lb-tabs{display:flex;gap:8px;padding:12px 16px;background:#fff}
.lb-tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;border:1px solid var(--border);background:var(--bg);cursor:pointer}
.lb-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.lb-month{padding:8px 16px;font-size:15px;font-weight:700;background:#fff}
.lb-note{padding:4px 16px 12px;font-size:12px;color:var(--muted);background:#fff;border-bottom:1px solid var(--border)}
.lb-section{background:#fff;margin-top:2px;padding:8px 16px}
.lb-section-title{font-size:12px;font-weight:700;color:var(--muted);padding:8px 0;display:flex;justify-content:space-between}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.lb-row:last-child{border-bottom:none}
.lb-rank{width:24px;font-size:15px;font-weight:700;text-align:center;color:var(--text)}
.lb-av{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-name{flex:1;font-size:14px}
.lb-score{font-size:14px;font-weight:600;color:var(--muted)}

/* Create post area */
.create-area{background:#fff;margin-top:8px;padding:12px 16px;display:flex;gap:10px;align-items:center;cursor:pointer}
.create-area .post-av{width:36px;height:36px}
.create-placeholder{flex:1;padding:8px 14px;border-radius:20px;background:var(--bg);font-size:14px;color:var(--muted)}

/* Post modal */
.pm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.pm-overlay.open{display:flex}
.pm-modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:80vh;overflow:auto;padding:16px}
.pm-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pm-head h3{font-size:16px;font-weight:700}
.pm-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted)}
.pm-ta{width:100%;border:none;font-size:15px;resize:none;min-height:120px;outline:none;line-height:1.5}
.pm-submit{width:100%;padding:12px;border-radius:8px;background:var(--primary);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
.pm-submit:disabled{opacity:.5}

/* Sort bar */
.sort-bar{background:#fff;padding:8px 16px;display:flex;gap:8px;border-bottom:1px solid var(--border)}
.sort-btn{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--bg);cursor:pointer}
.sort-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid var(--border);z-index:100;padding:4px 0 calc(4px + env(safe-area-inset-bottom))}
.bnav a{flex:1;text-align:center;padding:6px 0;text-decoration:none;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav a i{font-size:20px}
.bnav a.active{color:var(--primary)}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
.empty-msg{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}
.post-dots{background:none;border:none;font-size:18px;color:#65676B;cursor:pointer;padding:4px 8px;border-radius:50%;}.post-dots:hover{background:#f0f2f5;}
.post-menu{position:absolute;right:8px;top:36px;background:#fff;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:50;min-width:160px;padding:4px 0;}
.post-menu div{padding:10px 14px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;}.post-menu div:hover{background:#f5f5f5;}
.post-meta{position:relative;}
</style>
</head>
<body>
<!-- Header -->
<div class="gh" id="groupHeader">
<button class="gh-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
<div style="flex:1"><div class="gh-name" id="ghName">...</div></div>
<div class="gh-icons">
<button class="gh-icon" onclick="shareGroup()"><i class="fas fa-share-alt"></i></button>
<button class="gh-join join" id="ghJoin" onclick="toggleJoin()">Tham gia</button>
</div>
</div>

<!-- Banner -->
<div class="g-banner" id="gBanner"></div>

<!-- Tabs -->
<div class="g-tabs">
<div class="g-tab active" onclick="switchTab('posts',this)">Bài viết</div>
<div class="g-tab" onclick="switchTab('about',this)">Giới thiệu</div>
<div class="g-tab" onclick="switchTab('leaderboard',this)">Xếp hạng</div>
</div>

<!-- Tab contents -->
<div id="tabPosts"></div>
<div id="tabAbout" style="display:none"></div>
<div id="tabLeaderboard" style="display:none"></div>

<!-- Post modal -->
<div class="pm-overlay" id="pmOverlay" onclick="if(event.target===this)closePM()">
<div class="pm-modal">
<div class="pm-head"><h3>Tạo bài viết</h3><button class="pm-close" onclick="closePM()"><i class="fas fa-times"></i></button></div>
<textarea class="pm-ta" id="pmText" placeholder="Bạn đang nghĩ gì?" oninput="document.getElementById('pmSend').disabled=!this.value.trim()"></textarea>
<button class="pm-submit" id="pmSend" disabled onclick="submitPost()">Đăng bài</button>
</div>
</div>

<!-- Bottom nav -->
<div class="bnav" id="mobileBottomNav">
<a href="index.html"><i class="fas fa-home"></i>Trang chủ</a>
<a href="groups.html" class="active"><i class="fas fa-users"></i>Cộng đồng</a>
<a href="javascript:void(0)" onclick="openPM()"><i class="fas fa-plus-circle"></i>Tạo</a>
<a href="profile.html"><i class="far fa-bell"></i>Hộp thư đến</a>
<a href="profile.html"><i class="far fa-user"></i>Bạn</a>
</div>

<div class="toast" id="toast"></div>

<script>
var CU=JSON.parse(localStorage.getItem("user")||"null");
var P=new URLSearchParams(location.search);
var groupSlug=P.get("slug")||"";
var groupId=parseInt(P.get("id"))||0;
var GROUP=null;
var curSort="new";
var lbType="posts";

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";setTimeout(function(){t.className="toast";},2500);}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fN(n){n=parseInt(n)||0;if(n>=1000000)return(n/1000000).toFixed(1)+"tr";if(n>=1000)return(n/1000).toFixed(1)+"k";return n;}
function ago(dt){if(!dt)return"";var s=Math.floor((new Date()-new Date(dt.replace(" ","T")))/1000);if(s<60)return s+" giây";if(s<3600)return Math.floor(s/60)+" phút";if(s<86400)return Math.floor(s/3600)+" giờ";if(s<604800)return Math.floor(s/86400)+" ngày";return new Date(dt).toLocaleDateString("vi-VN");}

function apiFetch(url,opts){
  opts=opts||{};
  opts.credentials="include";
  if(!opts.headers)opts.headers={};
  var tk=localStorage.getItem("token");
  if(tk)opts.headers["Authorization"]="Bearer "+tk;
  return fetch(url,opts).then(function(r){return r.json();});
}

// Load group
function loadGroup(){
  var q=groupSlug?"slug="+encodeURIComponent(groupSlug):"id="+groupId;
  apiFetch("/api/groups.php?action=detail&"+q).then(function(d){
    if(!d.success){document.getElementById("gBanner").innerHTML="<p class='empty-msg'>Không tìm thấy nhóm</p>";return;}
    GROUP=d.data;
    renderHeader();
    loadPosts();
    renderAbout();
    loadLeaderboard();
  });
}

function renderHeader(){
  var g=GROUP;
  document.title=g.name+" - ShipperShop";
  document.getElementById("ghName").textContent=g.name;
  var jb=document.getElementById("ghJoin");
  if(g.is_member){jb.className="gh-join joined";jb.textContent="\u0110\u00e3 tham gia";}
  else{jb.className="gh-join join";jb.textContent="Tham gia";}

  var icon=g.icon_image?"<img src='"+esc(g.icon_image)+"' style='width:100%;height:100%;object-fit:cover;border-radius:16px'>":"<span>"+esc(g.name[0])+"</span>";
  var isAdmin=g.member_role==="admin";
  var bannerBg=g.banner_image?"background:url("+esc(g.banner_image)+") center/cover no-repeat":"background:"+(g.banner_color||"var(--primary)");
  var editBtns="";
  if(isAdmin){
    editBtns="<div style='position:absolute;bottom:8px;right:8px;display:flex;gap:6px'>";
    editBtns+="<label style='width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;cursor:pointer'><i class='fas fa-camera' style='color:#fff;font-size:12px'></i><input type='file' accept='image/*' style='display:none' onchange='uploadGroupImg(\"banner\",this)'></label>";
    editBtns+="</div>";
  }
  var iconEdit="";
  if(isAdmin){
    iconEdit="<label style='position:absolute;bottom:-2px;right:-2px;width:20px;height:20px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff'><i class='fas fa-camera' style='color:#fff;font-size:8px'></i><input type='file' accept='image/*' style='display:none' onchange='uploadGroupImg(\"icon\",this)'></label>";
  }
  document.getElementById("gBanner").innerHTML=
    "<div style='"+bannerBg+";height:140px;position:relative'>"+editBtns+"</div>"+
    "<div class='g-banner-info' style='margin-top:-32px;padding:0 16px 16px;align-items:flex-end'>"+
      "<div class='g-banner-icon' style='background:"+(g.banner_color||"var(--primary)")+";position:relative;border:3px solid #fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.15)'>"+icon+iconEdit+"</div>"+
      "<div class='g-banner-text' style='padding-bottom:4px'><h1>"+esc(g.name)+"</h1><div class='gm'>"+fN(g.member_count)+" th\u00e0nh vi\u00ean \u00b7 "+fN(g.post_count||0)+" b\u00e0i vi\u1ebft"+(g.cat_name?" \u00b7 "+esc(g.cat_name):"")+"</div>"+(g.privacy==="private"?"<div class='gm' style='color:var(--primary)'><i class='fas fa-lock' style='margin-right:4px'></i>Ri\u00eang t\u01b0</div>":"")+"</div>"+
    "</div>";
}

function toggleJoin(){
  if(!CU){location.href="login.html";return;}
  if(!GROUP)return;
  apiFetch("/api/groups.php?action=join",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({group_id:GROUP.id})})
  .then(function(d){
    if(d.success){
      GROUP.is_member=d.data.joined;
      if(d.data.joined){GROUP.member_count++;toast("\u0110\u00e3 tham gia nh\u00f3m!");}
      else{GROUP.member_count--;toast("\u0110\u00e3 r\u1eddi nh\u00f3m");}
      renderHeader();
    }else{if((d.message||'').indexOf('Shipper Plus')>-1){if(confirm(d.message+'\n\nN\u00e2ng c\u1ea5p ngay?'))location.href='/wallet.html';}else toast(d.message);}
  });
}

function shareGroup(){
  var url=location.origin+"/group.html?slug="+(GROUP?GROUP.slug:"");
  if(navigator.share)navigator.share({url:url,title:GROUP?GROUP.name:"Nhóm"});
  else{navigator.clipboard.writeText(url);toast("Đã copy link!");}
}

// Tabs
function switchTab(tab,el){
  document.querySelectorAll(".g-tab").forEach(function(t){t.classList.remove("active");});
  el.classList.add("active");
  document.getElementById("tabPosts").style.display=tab==="posts"?"block":"none";
  document.getElementById("tabAbout").style.display=tab==="about"?"block":"none";
  document.getElementById("tabLeaderboard").style.display=tab==="leaderboard"?"block":"none";
}

// Posts tab
function loadPosts(){
  if(!GROUP)return;
  var html="";
  // Create post area
  if(GROUP.is_member&&CU){
    var cuAv=CU.avatar?"<img src='"+CU.avatar+"' style='width:40px;height:40px;border-radius:50%;object-fit:cover'>":"<div class='post-av'>"+esc((CU.fullname||"?")[0])+"</div>";
    html+="<div class='create-area' onclick='openPM()'>"+cuAv+"<div class='create-placeholder'>B\u1ea1n \u0111ang ngh\u0129 g\u00ec?</div></div>";
  }
  // Sort bar
  html+="<div class='sort-bar'>";
  html+="<div class='sort-btn"+(curSort==="hot"?" active":"")+"' onclick='changeSort(\"hot\",this)'>🔥 Nổi bật</div>";
  html+="<div class='sort-btn"+(curSort==="new"?" active":"")+"' onclick='changeSort(\"new\",this)'>🆕 Mới nhất</div>";
  html+="<div class='sort-btn"+(curSort==="top"?" active":"")+"' onclick='changeSort(\"top\",this)'>⬆ Nhiều thích</div>";
  html+="</div>";
  html+="<div id='postsContainer'><div class='empty-msg'><i class='fas fa-spinner fa-spin'></i></div></div>";
  html+="<button id='grpLoadMore' onclick='grpPage++;fetchPosts(true)' style='display:none;width:100%;padding:12px;background:#e4e6eb;border:none;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px'>Tải thêm bài viết</button>";
  document.getElementById("tabPosts").innerHTML=html;

  fetchPosts();
}

function changeSort(s,el){
  curSort=s;grpPage=1;
  document.querySelectorAll(".sort-btn").forEach(function(b){b.classList.remove("active");});
  el.classList.add("active");
  fetchPosts();
}

var grpPage=1,grpTotalPg=1;

function fetchPosts(append){
  if(!append)grpPage=1;
  apiFetch("/api/groups.php?action=posts&group_id="+GROUP.id+"&sort="+curSort+"&page="+grpPage).then(function(d){
    if(!d.success||!d.data.posts||!d.data.posts.length){
      if(!append)document.getElementById("postsContainer").innerHTML="<p class='empty-msg'>Chưa có bài viết nào. Hãy là người đầu tiên!</p>";
      return;
    }
    grpTotalPg=d.data.total_pages||1;
    var html=d.data.posts.map(function(p){return mkPost(p);}).join("");
    if(append){document.getElementById("postsContainer").insertAdjacentHTML("beforeend",html);}
    else{document.getElementById("postsContainer").innerHTML=html;}
    var lmBtn=document.getElementById("grpLoadMore");
    if(lmBtn)lmBtn.style.display=grpPage<grpTotalPg?"block":"none";
  });
}

var _SC={"GHTK":"#00b14f","J&T":"#d32f2f","GHN":"#ff6600","Viettel Post":"#e21a1a","SPX":"#EE4D2D","Grab":"#00b14f","Be":"#5bc500","Gojek":"#00aa13","Ninja Van":"#c41230"};
var _BT={"review":"b-review","question":"b-question","tip":"b-tip","post":"b-post"};
var _BTxt={"review":"\u2b50 Review","question":"\u2753 H\u1ecfi \u0111\u00e1p","tip":"\ud83d\udca1 Tip"};

function mkPost(p){
  var av=p.user_avatar?"<img src='"+esc(p.user_avatar)+"' onerror=\"this.outerHTML='<span>"+esc((p.user_name||"U")[0])+"</span>'\">":esc((p.user_name||"?")[0]);
  var liked=p.user_liked;
  var likes=parseInt(p.likes_count)||0;
  var cmts=parseInt(p.comments_count)||0;
  var shares=parseInt(p.shares_count)||0;
  var shipBadge="";
  if(p.shipping_company){var sc=p.shipping_company;shipBadge="<span class='ship-badge' style='color:"+(_SC[sc]||"#666")+"'>"+esc(sc)+"</span><span>\u00b7</span>";}
  var badge=_BTxt[p.type]?"<span class='type-badge "+(_BT[p.type]||"")+"'>"+_BTxt[p.type]+"</span>":"";
  var title=p.title?"<div style='font-weight:700;font-size:16px;padding:4px 16px 0'>"+esc(p.title)+"</div>":"";
  var body=esc(p.content||"");
  var isLong=body.length>300;
  var contentH="<div class='post-content"+(isLong?" trunc":"")+"' id='gpc"+p.id+"'>"+body+"</div>"+(isLong?"<span class='show-more' onclick='var el=document.getElementById(\"gpc"+p.id+"\");el.classList.toggle(\"trunc\");this.textContent=el.classList.contains(\"trunc\")?\"Xem th\u00eam \u25bc\":\"Thu g\u1ecdn \u25b2\"'>Xem th\u00eam \u25bc</span>":"");
  var imgH="";
  if(p.images){try{var a=JSON.parse(p.images);if(a&&a.length){var cl=a.length>1?" multi":"";window._ssPI=window._ssPI||{};window._ssPI["g"+p.id]=a;window._ssIvGroup=true;window._ssIvGroupId=GROUP?GROUP.id:0;imgH="<div class='post-images"+cl+"'>";for(var i=0;i<Math.min(a.length,4);i++){imgH+="<img src='"+a[i]+"' loading='lazy' onclick='openLb(\""+a[i]+"\","+p.id+",window._ssPI[\"g"+p.id+"\"])' onerror='this.style.display=\"none\"'>";}imgH+="</div>";}}catch(x){}}
  var vidH="";
  if(p.video_url){if(p.video_url.indexOf("/uploads/")!==-1){vidH="<video controls playsinline preload='metadata' style='width:100%;max-height:500px'><source src='"+p.video_url+"' type='video/mp4'></video>";}else{vidH="<div style='position:relative;padding-bottom:56%;height:0;overflow:hidden'><iframe src='"+p.video_url+"' style='position:absolute;inset:0;width:100%;height:100%;border:0' allowfullscreen></iframe></div>";}}
  var canDel=CU&&parseInt(p.user_id)===parseInt(CU.id);
  return "<div class='post-card' id='gp"+p.id+"'>"
    +"<div class='post-meta'><div class='post-av'>"+av+"</div>"
    +"<div style='flex:1;min-width:0'><div style='display:flex;align-items:center;justify-content:space-between'><div class='post-author'><a href='user.html?id="+p.user_id+"'>"+esc(p.user_name)+"</a></div><button class='post-dots' onclick='event.stopPropagation();togMenu("+p.id+")'><i class='fas fa-ellipsis'></i></button></div>"
    +"<div style='font-size:12px;color:#65676B;display:flex;align-items:center;gap:4px'>"+shipBadge+"<span>"+ago(p.created_at)+"</span>"+badge+"</div></div></div>"
    +"<div class='post-menu' id='pm"+p.id+"' style='display:none'><div id='sv"+p.id+"' onclick='togSave("+p.id+")'><i class='"+(p.user_saved?"fas":"far")+" fa-bookmark' style='color:"+(p.user_saved?"#7C3AED":"inherit")+"'></i> "+(p.user_saved?"Bỏ lưu":"Lưu bài viết")+"</div>"+(canDel?"<div onclick='delP("+p.id+")'><i class='far fa-trash-can'></i> Xóa bài</div>":"")+"<div onclick='reportP("+p.id+")'><i class='fas fa-flag'></i> Báo cáo</div><div onclick='togMenu("+p.id+")'><i class='fas fa-times'></i> Đóng</div></div>"
    +title+contentH+imgH+vidH
    +"<div class='pa3-stats'><span>"+(likes>0?fN(likes)+" \u0111\u01a1n giao th\u00e0nh c\u00f4ng":"")+"</span><span>"+(cmts>0?fN(cmts)+" ghi ch\u00fa":"")+"</span><span>"+(shares>0?fN(shares)+" chuy\u1ec3n ti\u1ebfp":"")+"</span></div>"
    +"<div class='post-actions-3'>"
    +"<button class='pa3-btn"+(liked?" pa3-active":"")+"' onclick='likePost("+p.id+",this)'>Th\u00e0nh c\u00f4ng</button>"
    +"<button class='pa3-btn' onclick='openComment("+p.id+")'>Ghi ch\u00fa</button>"
    +"<button class='pa3-btn' onclick='sharePost("+p.id+")'>Chuy\u1ec3n ti\u1ebfp</button>"
    +"</div></div>";
}

function likePost(pid,btn){
  if(!CU){location.href="login.html";return;}
  apiFetch("/api/groups.php?action=like_post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({post_id:pid})})
  .then(function(d){
    if(d.success){
      var liked=d.data.liked;
      var count=d.data.count||0;
      btn.className="pa3-btn"+(liked?" pa3-active":"");
      btn.textContent="Th\u00e0nh c\u00f4ng";
      var card=btn.closest(".post-card");
      if(card){var s=card.querySelector(".pa3-stats span");if(s)s.textContent=count>0?fN(count)+" \u0111\u01a1n giao th\u00e0nh c\u00f4ng":"";}
    }
  });
}

// About tab
function renderAbout(){
  if(!GROUP)return;
  var g=GROUP;
  var html="";

  // Description
  html+="<div class='about-section'><h3>Mô tả</h3><p style='font-size:14px;line-height:1.6'>"+esc(g.description||"Chưa có mô tả")+"</p></div>";

  // Rules
  if(g.rules&&g.rules.length){
    html+="<div class='about-section'><h3>Quy tắc của nhóm</h3>";
    g.rules.forEach(function(r){
      html+="<div class='rule-item'><div class='rule-num'>"+r.rule_order+"</div><div><div class='rule-title'>"+esc(r.title)+"</div>"+(r.description?"<div class='rule-desc'>"+esc(r.description)+"</div>":"")+"</div></div>";
    });
    html+="</div>";
  }

  // Moderators
  if(g.moderators&&g.moderators.length){
    html+="<div class='about-section'><h3>Kiểm duyệt viên</h3>";
    g.moderators.forEach(function(m){
      var mav=m.avatar?"<img src='"+esc(m.avatar)+"'>":esc((m.fullname||"?")[0]);
      var rl=m.role==="admin"?"Quản trị viên":"Kiểm duyệt viên";
      html+="<div class='mod-item'><div class='mod-av'>"+mav+"</div><div><div class='mod-name'>"+esc(m.fullname)+"</div><div class='mod-role'>"+rl+"</div></div></div>";
    });
    html+="<button class='msg-mod-btn' onclick='msgMod()'><i class='fas fa-envelope' style='margin-right:6px'></i>Nhắn tin cho kiểm duyệt viên</button>";
    html+="</div>";
  }

  document.getElementById("tabAbout").innerHTML=html;
}

function msgMod(){
  if(!GROUP||!GROUP.moderators||!GROUP.moderators.length)return;
  location.href="messages.html?user="+GROUP.moderators[0].id;
}

// Leaderboard tab
function loadLeaderboard(){
  if(!GROUP)return;
  var html="<div class='lb-tabs'>"+
    "<div class='lb-tab"+(lbType==="posts"?" active":"")+"' onclick='changeLbType(\"posts\",this)'>Người đăng nhiều nhất</div>"+
    "<div class='lb-tab"+(lbType==="comments"?" active":"")+"' onclick='changeLbType(\"comments\",this)'>Người bình luận nhiều nhất</div>"+
  "</div>";

  var now=new Date();
  var months=["Tháng 01","Tháng 02","Tháng 03","Tháng 04","Tháng 05","Tháng 06","Tháng 07","Tháng 08","Tháng 09","Tháng 10","Tháng 11","Tháng 12"];
  html+="<div class='lb-month'>"+months[now.getMonth()]+" "+now.getFullYear()+"</div>";
  html+="<div class='lb-note'>Dựa trên số bình chọn được tính trong tháng.</div>";
  html+="<div id='lbContent'><div class='empty-msg'><i class='fas fa-spinner fa-spin'></i></div></div>";
  document.getElementById("tabLeaderboard").innerHTML=html;

  fetchLeaderboard();
}

function changeLbType(t,el){
  lbType=t;
  document.querySelectorAll(".lb-tab").forEach(function(b){b.classList.remove("active");});
  el.classList.add("active");
  fetchLeaderboard();
}

function fetchLeaderboard(){
  apiFetch("/api/groups.php?action=leaderboard&group_id="+GROUP.id+"&type="+lbType).then(function(d){
    if(!d.success||!d.data.leaderboard.length){
      document.getElementById("lbContent").innerHTML="<p class='empty-msg'>Chưa có dữ liệu tháng này</p>";return;
    }
    var leaders=d.data.leaderboard;
    var html="<div class='lb-section'><div class='lb-section-title'><span>"+(lbType==="posts"?"% người đăng nhiều nhất":"% người bình luận nhiều nhất")+"</span><span>Lượt thích</span></div>";
    leaders.forEach(function(l,i){
      var av=l.avatar?"<img src='"+esc(l.avatar)+"'>":esc((l.fullname||"?")[0]);
      html+="<div class='lb-row'>"+
        "<div class='lb-rank'>"+(i+1)+"</div>"+
        "<div class='lb-av'>"+av+"</div>"+
        "<div class='lb-name'>"+esc(l.fullname)+"</div>"+
        "<div class='lb-score'>"+fN(l.total_likes)+"</div>"+
      "</div>";
    });
    html+="</div>";
    document.getElementById("lbContent").innerHTML=html;
  });
}

// Post modal
function openPM(){
  if(!CU){location.href="login.html";return;}
  document.getElementById("pmOverlay").classList.add("open");
  setTimeout(function(){document.getElementById("pmText").focus();},200);
}
function closePM(){
  document.getElementById("pmOverlay").classList.remove("open");
  document.getElementById("pmText").value="";
  document.getElementById("pmSend").disabled=true;
}
function submitPost(){
  var content=document.getElementById("pmText").value.trim();
  if(!content||!GROUP)return;
  var btn=document.getElementById("pmSend");
  btn.disabled=true;btn.textContent="Đang đăng...";
  apiFetch("/api/groups.php?action=post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({group_id:GROUP.id,content:content})})
  .then(function(d){
    if(d.success){closePM();toast("Đã đăng bài!");fetchPosts();}
    else{toast(d.message||"Lỗi");}
    btn.disabled=false;btn.textContent="Đăng bài";
  }).catch(function(){btn.disabled=false;btn.textContent="Đăng bài";toast("Lỗi kết nối");});
}

// Init
if(groupSlug||groupId){loadGroup();}
else{document.getElementById("gBanner").innerHTML="<p class='empty-msg'>Không tìm thấy nhóm</p>";}

function uploadGroupImg(type,input){
  if(!input.files||!input.files[0]||!GROUP)return;
  var f=input.files[0];
  if(f.size>10*1024*1024){toast("File max 10MB");return;}
  var fd=new FormData();
  fd.append("action","update_group");
  fd.append("group_id",GROUP.id);
  fd.append(type,f);
  var tk=localStorage.getItem("token");
  var hdrs={};if(tk)hdrs["Authorization"]="Bearer "+tk;
  toast("Đang tải lên...");
  fetch("/api/groups.php?action=update_group",{method:"POST",headers:hdrs,credentials:"include",body:fd})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.success){toast("Đã cập nhật!");loadGroup();}
    else toast(d.message||"Lỗi");
  }).catch(function(){toast("Lỗi kết nối");});
}

// Comment bottom sheet
function openComment(pid){
  var old=document.getElementById("gcOverlay2");if(old)old.remove();
  var ov=document.createElement("div");
  ov.id="gcOverlay2";ov.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;";
  ov.onclick=function(e){if(e.target===ov)closeComment();};
  var sh=document.createElement("div");
  sh.style.cssText="background:#fff;width:100%;max-width:600px;max-height:80vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;overflow:hidden;";
  sh.innerHTML="<div style='padding:12px 16px;border-bottom:1px solid #e4e6eb;display:flex;align-items:center'><h3 style='flex:1;font-size:16px;font-weight:700;margin:0'>Ghi chú</h3><button onclick='closeComment()' style='background:#e4e6eb;border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px'><i class='fas fa-times'></i></button></div>"
  +"<div id='gcCmts2' style='flex:1;overflow-y:auto;padding:8px'><div style='text-align:center;padding:30px;color:#999'><i class='fas fa-spinner fa-spin'></i></div></div>"
  +"<div style='display:flex;gap:8px;padding:10px 12px;border-top:1px solid #e4e6eb'><input id='gcInput2' style='flex:1;padding:8px 14px;border-radius:20px;border:1px solid #e4e6eb;font-size:14px;outline:none' placeholder='Viết bình luận...' onkeydown='if(event.key===\"Enter\")sendGroupComment("+pid+")'><button onclick='sendGroupComment("+pid+")' style='background:#7C3AED;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer'><i class='fas fa-paper-plane'></i></button></div>";
  ov.appendChild(sh);document.body.appendChild(ov);
  // Load comments
  apiFetch("/api/groups.php?action=comments&post_id="+pid).then(function(d){
    var wrap=document.getElementById("gcCmts2");
    if(!d.success||!d.data||!d.data.length){wrap.innerHTML="<div style='text-align:center;padding:30px;color:#999'>Chưa có bình luận</div>";return;}
    var h="";d.data.forEach(function(c){
      var av=c.user_avatar?"<img src='"+esc(c.user_avatar)+"' style='width:28px;height:28px;border-radius:50%;object-fit:cover'>":"<div style='width:28px;height:28px;border-radius:50%;background:#e4e6eb;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700'>"+esc((c.user_name||"U")[0])+"</div>";
      h+="<div style='display:flex;gap:8px;padding:6px 8px'>"+av+"<div><div style='background:#f0f2f5;border-radius:18px;padding:6px 12px;display:inline-block'><div style='font-weight:700;font-size:13px'>"+esc(c.user_name)+"</div><div style='font-size:14px'>"+esc(c.content)+"</div></div><div style='font-size:11px;color:#65676B;padding:2px 12px'>"+ago(c.created_at)+"</div></div></div>";
    });
    wrap.innerHTML=h;
  });
}
function closeComment(){var ov=document.getElementById("gcOverlay2");if(ov)ov.remove();}
function sendGroupComment(pid){
  if(!CU)return;
  var inp=document.getElementById("gcInput2");var ct=inp.value.trim();if(!ct)return;
  inp.value="";
  apiFetch("/api/groups.php?action=comment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({post_id:pid,content:ct})}).then(function(d){
    if(d.success){openComment(pid);var card=document.getElementById("gp"+pid);if(card){var s=card.querySelectorAll(".pa3-stats span");if(s.length>=2){var cur=parseInt(s[1].textContent)||0;s[1].textContent=(cur+1)+" ghi ch\u00fa";}}}
    else toast(d.message||"L\u1ed7i");
  });
}

function sharePost(pid){
  var url=location.origin+"/group.html?"+(groupSlug?"slug="+groupSlug:"id="+GROUP.id)+"&post="+pid;
  if(navigator.share)navigator.share({url:url,title:GROUP?GROUP.name:"Nhóm"});
  else{navigator.clipboard.writeText(url);toast("Đã copy link!");}
}

<script>
function togMenu(pid){var m=document.getElementById("pm"+pid);if(!m)return;var show=m.style.display==="none"||!m.style.display;document.querySelectorAll(".post-menu").forEach(function(el){el.style.display="none";});if(show)m.style.display="block";}
function reportP(pid){togMenu(pid);if(typeof toast==="function")toast("Đã gửi báo cáo!");}
function delP(pid){if(!confirm("Xóa bài viết này?"))return;togMenu(pid);apiFetch("/api/groups.php?action=delete_post",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({post_id:pid})}).then(function(d){if(d.success){var el=document.getElementById("gp"+pid);if(el)el.style.display="none";}});}
async function togSave(pid){if(!CU){location.href="login.html";return;}togMenu(pid);try{var tk=localStorage.getItem("token");var r=await fetch("/api/posts.php?action=save",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tk},credentials:"include",body:JSON.stringify({post_id:pid})});var d=await r.json();if(d.success){var saved=d.data&&d.data.saved;var el=document.getElementById("sv"+pid);if(el){el.innerHTML="<i class='"+(saved?"fas":"far")+" fa-bookmark' style='color:"+(saved?"#7C3AED":"inherit")+"'></i> "+(saved?"Bỏ lưu":"Lưu bài viết");}}}catch(e){}}
document.addEventListener("click",function(e){if(!e.target.closest(".post-dots")&&!e.target.closest(".post-menu")){document.querySelectorAll(".post-menu").forEach(function(m){m.style.display="none";});}});
</script>
