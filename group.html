<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#7C3AED">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nhóm - ShipperShop</title>
<link rel="stylesheet" href="/css/design-system.css">
<link rel="stylesheet" href="css/style-v2.css">
<link rel="stylesheet" href="mobile.css">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>

<script src="/js/network-handler.js" defer></script>
<link rel="stylesheet" href="/css/group-page.css?v=20260322">
</head>
<body>

<!-- Header -->
<div class="gh" id="groupHeader">
<button class="gh-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
<div style="flex:1"><div class="gh-name" id="ghName">...</div></div>
<div class="gh-icons">
<button class="gh-icon" onclick="shareGroup()"><i class="fas fa-share-alt"></i></button>
<button class="gh-join join" id="ghJoin" onclick="toggleJoin()">Tham gia</button>
</div>
</div>

<!-- Banner -->
<div class="g-banner" id="gBanner"></div>

<!-- Tabs -->
<div class="g-tabs">
<div class="g-tab active" onclick="switchTab('posts',this)">Bài viết</div>
<div class="g-tab" onclick="switchTab('about',this)">Giới thiệu</div>
<div class="g-tab" onclick="switchTab('leaderboard',this)">Xếp hạng</div>
</div>

<!-- Tab contents -->
<div id="tabPosts"></div>
<div id="tabAbout" style="display:none"></div>
<div id="tabLeaderboard" style="display:none"></div>

<!-- Post modal (fallback) -->
<div class="pm-overlay" id="pmOverlay" onclick="if(event.target===this)closePM()">
<div class="pm-modal">
<div class="pm-head"><h3>Tạo bài viết</h3><button class="pm-close" onclick="closePM()"><i class="fas fa-times"></i></button></div>
<textarea class="pm-ta" id="pmText" placeholder="Bạn đang nghĩ gì?" oninput="document.getElementById('pmSend').disabled=!this.value.trim()"></textarea>
<button class="pm-submit" id="pmSend" disabled onclick="submitPost()">Đăng bài</button>
</div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Main JS -->
<script src="js/group-detail.js?v=20260322"></script>

<!-- Bottom nav -->
<nav id="mobileBottomNav" role="navigation" aria-label="Mobile navigation">
    <a href="index.html" class="mnav-item" data-page="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
    <a href="marketplace.html" class="mnav-item" data-page="marketplace.html"><i class="fas fa-store"></i><span>Mua sắm</span></a>
    <div class="mnav-item mnav-fab-wrap" style="overflow:visible" onclick="openPM()"><div class="mnav-fab" style="width:46px;height:46px;font-size:18px;margin-top:-16px;cursor:pointer;z-index:1001;position:relative"><i class="fas fa-camera"></i></div></div>
    <a href="map.html" class="mnav-item" data-page="map.html"><i class="fas fa-map-marked-alt"></i><span>Bản đồ</span></a>
    <a href="profile.html" class="mnav-item" data-page="profile.html"><i class="fas fa-user"></i><span>Tài khoản</span></a>
</nav>

<script src="js/mobile.js"></script>
<script src="/js/ss-error-tracker.js"></script>
<script src="/js/analytics.js"></script>
<script src="js/post-modal.js"></script>
<script src="/js/pages/group-detail.js"></script>
<!-- SS v2 Core + Components -->
<script src="/js/core/utils.js"></script>
<script src="/js/core/store.js"></script>
<script src="/js/core/ui.js"></script>
<script src="/js/core/api.js"></script>
<script src="/js/components/notification-bell.js"></script>
<script src="/js/components/scroll-heartbeat.js"></script>
<script src="/js/components/notif-sound.js"></script>
<script src="/js/components/image-optimizer.js"></script>
<script src="/js/components/connection-status.js"></script>
<script src="/js/components/shortcuts.js"></script>
<script src="/js/components/a11y.js"></script>
<script src="/js/components/post-types.js"></script>
<script src="/js/components/qr-share.js"></script>
<script src="/js/components/lazy-img.js"></script>
<script src="/js/components/error-boundary.js"></script>
<script src="/js/components/report-dialog.js"></script>
<script src="/js/components/payment.js"></script>
<script src="/js/components/notif-poll.js"></script>
<script src="/js/components/pwa-install.js"></script>
<script src="/js/components/dark-mode.js"></script>
<script src="/js/components/search-overlay.js"></script>
<script src="/js/components/image-viewer.js"></script>
<script src="/js/components/post-create.js"></script>
<script src="/js/components/emoji-picker.js"></script>
<script src="/js/components/post-card.js"></script>
<script src="/js/components/comment-sheet.js"></script>
<script src="/js/components/video-player.js"></script>

<script>
(function(){
  if(typeof SS!=='undefined'&&SS.store&&SS.store.isLoggedIn()&&SS.NotifBell){
    var nb=document.getElementById('ss-notif-bell');
    if(nb)SS.NotifBell.init('ss-notif-bell');
  }
  if(typeof window.toast==='undefined'&&typeof SS!=='undefined'&&SS.ui){
    window.toast=function(m,dur){SS.ui.toast(m,'info',dur||3000);};
  }
})();
</script>
<script src="/js/perf-boost.js" defer></script>
<script src="/js/lightbox.js"></script>
</body>
</html>
