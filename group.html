<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hội nhóm - ShipperShop</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="mobile.css">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
:root{--primary:#EE4D2D;--bg:#f0f2f5;--card:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding-bottom:80px;}
.back-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f0;}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:#333;}
.back-nav h1{font-size:17px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.group-banner{margin-top:48px;background:linear-gradient(135deg,var(--primary),#ff8a65);height:120px;}
.group-meta{background:#fff;padding:16px;border-bottom:1px solid var(--border);}
.group-icon-wrap{display:flex;gap:14px;align-items:flex-start;}
.g-icon{width:64px;height:64px;border-radius:16px;background:#fff;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.15);margin-top:-36px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
.g-info{flex:1;min-width:0;}
.g-name{font-size:20px;font-weight:800;margin-bottom:2px;}
.g-desc{font-size:13px;color:var(--muted);margin-bottom:8px;}
.g-stats{display:flex;gap:16px;font-size:13px;color:var(--muted);margin-bottom:10px;}
.g-stats b{color:var(--text);}
.join-btn{padding:8px 24px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;border:2px solid var(--primary);background:var(--primary);color:#fff;}
.join-btn.joined{background:#fff;color:var(--primary);}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:50;}
.tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.create-post{background:#fff;padding:12px;margin:8px;border-radius:12px;display:flex;gap:10px;align-items:center;border:1px solid var(--border);}
.create-post input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:24px;font-size:14px;background:#f0f2f5;cursor:pointer;outline:none;}
.post-card{background:#fff;margin:0 0 8px;padding:12px 16px;}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.post-av{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.post-author{font-weight:700;font-size:14px;}
.post-time{font-size:12px;color:var(--muted);}
.ship-badge{font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;}
.post-content{font-size:14px;line-height:1.6;margin-bottom:8px;white-space:pre-wrap;word-break:break-word;}
.post-actions{display:flex;gap:4px;border-top:1px solid var(--border);padding-top:8px;}
.act-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;}
.act-btn:hover{background:#f0f2f5;}
.rules-section{background:#fff;margin:8px;border-radius:12px;padding:16px;border:1px solid var(--border);}
.rules-section h3{font-size:15px;font-weight:700;margin-bottom:10px;}
.rule-item{padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px;line-height:1.5;}
.rule-item:last-child{border:none;}
.member-item{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#fff;margin-bottom:1px;}
.member-av{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.member-name{font-weight:600;font-size:14px;}
.member-role{font-size:11px;color:var(--primary);font-weight:700;background:#FFF0EB;padding:2px 8px;border-radius:10px;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty i{font-size:36px;display:block;margin-bottom:8px;color:#ddd;}
.spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:80vh;display:flex;flex-direction:column;}
.modal-head{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.modal-head h2{font-size:17px;font-weight:700;}
.modal-x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px;overflow-y:auto;flex:1;}
.modal-body textarea{width:100%;min-height:120px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;outline:none;}
.submit-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:3000;opacity:0;transition:.3s;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
<link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="ShipperShop"><link rel="apple-touch-icon" href="/icons/icon-192.png"></head>
<body>
<div class="back-nav"><button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i></button><h1 id="navTitle">Hội nhóm</h1></div>
<div class="group-banner" id="banner"></div>
<div class="group-meta"><div class="group-icon-wrap"><div class="g-icon" id="gIcon">👥</div><div class="g-info"><div class="g-name" id="gName">...</div><div class="g-desc" id="gDesc"></div><div class="g-stats"><span><b id="gMembers">0</b> thành viên</span><span><b id="gPosts">0</b> bài viết</span></div><div><button class="join-btn" id="joinBtn" onclick="toggleJoin()">Tham gia</button></div></div></div></div>
<div class="tabs"><div class="tab active" onclick="setTab('posts',this)">Bài đăng</div><div class="tab" onclick="setTab('rules',this)">Nội quy</div><div class="tab" onclick="setTab('members',this)">Thành viên</div></div>
<div id="tabContent"><div class="empty"><i class="fas fa-spinner spin"></i></div></div>
<div class="modal-overlay" id="postModal"><div class="modal"><div class="modal-head"><h2>Đăng bài trong nhóm</h2><button class="modal-x" onclick="closePostModal()">×</button></div><div class="modal-body"><textarea id="postContent" placeholder="Chia sẻ trong nhóm..."></textarea><button class="submit-btn" onclick="submitPost()"><i class="fas fa-paper-plane"></i> Đăng bài</button></div></div></div>
<div class="toast" id="toast"></div>
<script src="js/reddit-mkpost.js"></script>
<script src="js/mobile.js"></script>
<script>
var CU=JSON.parse(localStorage.getItem('user')||'null');var slug=new URLSearchParams(location.search).get('slug');var groupData=null,curTab='posts';
var shipColors={'GHTK':'#00b14f','J&T':'#d32f2f','GHN':'#ff6600','SPX':'#EE4D2D','Grab':'#00b14f','Be':'#5bc500','Gojek':'#00aa13','Ninja Van':'#c41230','Viettel Post':'#e21a1a','Lalamove':'#f5a623','Ahamove':'#f5a623','BEST':'#ffc107'};
async function loadGroup(){if(!slug){location.href='groups.html';return;}try{var r=await fetch('/api/groups.php?action=detail&slug='+encodeURIComponent(slug),{credentials:'include'});var d=await r.json();if(!d.success){location.href='groups.html';return;}groupData=d.data;document.title=groupData.name+' - ShipperShop';document.getElementById('navTitle').textContent=groupData.name;document.getElementById('gName').textContent=groupData.name;document.getElementById('gDesc').textContent=groupData.description||'';document.getElementById('gMembers').textContent=fN(groupData.member_count);document.getElementById('gPosts').textContent=fN(groupData.post_count);var catIcon={'shipping':'🚚','location':'📍','review':'⭐','confession':'🎭','tips':'💡'}[groupData.category]||'👥';document.getElementById('gIcon').innerHTML=catIcon;updateJoinBtn();loadTab('posts');}catch(e){document.getElementById('tabContent').innerHTML='<div class="empty"><p>Lỗi kết nối</p></div>';}}
function updateJoinBtn(){var btn=document.getElementById('joinBtn');if(groupData.is_member){btn.classList.add('joined');btn.textContent='Đã tham gia';}else{btn.classList.remove('joined');btn.textContent='Tham gia';}}
async function toggleJoin(){if(!CU){toast('Đăng nhập!');return;}try{var r=await fetch('/api/groups.php?action=join',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({group_id:groupData.id})});var d=await r.json();if(d.success){groupData.is_member=d.joined;updateJoinBtn();toast(d.joined?'Đã tham gia!':'Đã rời nhóm');}}catch(e){toast('Lỗi');}}
function setTab(tab,el){curTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');loadTab(tab);}
async function loadTab(tab){var c=document.getElementById('tabContent');c.innerHTML='<div class="empty"><i class="fas fa-spinner spin"></i></div>';
if(tab==='posts'){var html='';if(groupData.is_member){html='<div class="create-post"><input type="text" placeholder="Đăng bài trong nhóm..." readonly onclick="openPostModal()"></div>';}
try{var r=await fetch('/api/groups.php?action=posts&group_id='+groupData.id,{credentials:'include'});var d=await r.json();if(d.success&&d.data.posts.length){d.data.posts.forEach(function(p){var av=p.user_avatar?'<img src="'+p.user_avatar+'" class="post-av" onerror="this.outerHTML=\'<div class=post-av>'+((p.user_name||'U').charAt(0))+'</div>\'">':'<div class="post-av">'+((p.user_name||'U').charAt(0))+'</div>';var ship=p.shipping_company?'<span class="ship-badge" style="color:'+(shipColors[p.shipping_company]||'#999')+'">'+esc(p.shipping_company)+'</span>':'';html+='<div class="post-card"><div class="post-head">'+av+'<div><div class="post-author">'+esc(p.user_name)+' '+ship+'</div><div class="post-time">'+ago(p.created_at)+'</div></div></div><div class="post-content">'+esc(p.content)+'</div><div class="post-actions"><button class="act-btn"><i class="far fa-heart"></i> '+fN(p.likes_count)+'</button><button class="act-btn"><i class="far fa-comment"></i> '+fN(p.comments_count)+'</button><button class="act-btn"><i class="far fa-share-square"></i> Chia sẻ</button></div></div>';});}else html+='<div class="empty"><i class="fas fa-file-lines"></i><p>Chưa có bài viết</p></div>';}catch(e){html+='<div class="empty"><p>Lỗi</p></div>';}c.innerHTML=html;}
if(tab==='rules'){var rules=(groupData.rules||'Chưa có nội quy').split('\n');c.innerHTML='<div class="rules-section"><h3>📋 Nội quy nhóm</h3>'+rules.map(function(r){return '<div class="rule-item">'+esc(r)+'</div>';}).join('')+'</div>';}
if(tab==='members'){try{var r=await fetch('/api/groups.php?action=members&group_id='+groupData.id,{credentials:'include'});var d=await r.json();if(d.success&&d.data.length){var roleLabel={'admin':'👑 Trưởng nhóm','moderator':'🛡 Kiểm duyệt','member':''};c.innerHTML=d.data.map(function(m){var av=m.avatar?'<img src="'+m.avatar+'" class="member-av" onerror="this.outerHTML=\'<div class=member-av style=background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px>'+((m.fullname||'U').charAt(0))+'</div>\'">':'<div class="member-av" style="background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px">'+((m.fullname||'U').charAt(0))+'</div>';var role=roleLabel[m.role]?'<span class="member-role">'+roleLabel[m.role]+'</span>':'';var online=m.is_online?'<span style="color:#22c55e;font-size:11px">● Online</span>':'';return '<div class="member-item" onclick="location.href=\'user.html?id='+m.id+'\'">'+av+'<div style="flex:1"><div class="member-name">'+esc(m.fullname)+' '+role+'</div><div style="font-size:12px;color:var(--muted)">'+esc(m.shipping_company||'')+' '+online+'</div></div></div>';}).join('');}else c.innerHTML='<div class="empty"><p>Chưa có thành viên</p></div>';}catch(e){c.innerHTML='<div class="empty"><p>Lỗi</p></div>';}}}
function openPostModal(){document.getElementById('postModal').classList.add('open');setTimeout(function(){document.getElementById('postContent').focus();},100);}
function closePostModal(){document.getElementById('postModal').classList.remove('open');}
async function submitPost(){var content=document.getElementById('postContent').value.trim();if(!content){toast('Nhập nội dung!');return;}try{var r=await fetch('/api/groups.php?action=post',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({group_id:groupData.id,content:content})});var d=await r.json();if(d.success){toast('Đã đăng bài!');closePostModal();document.getElementById('postContent').value='';loadTab('posts');}else toast(d.message||'Lỗi');}catch(e){toast('Lỗi');}}
function esc(t){if(!t)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fN(n){n=parseInt(n)||0;if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();}
function ago(dt){if(!dt)return'';var s=Math.floor((new Date()-new Date(dt.replace(' ','T')))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(dt).toLocaleDateString('vi-VN');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(function(){t.classList.remove('show');},2500);}
loadGroup();
</script>
<nav id="mobileBottomNav" role="navigation"><a href="index.html" class="mnav-item"><i class="fas fa-home"></i><span>Trang chủ</span></a><a href="marketplace.html" class="mnav-item"><i class="fas fa-store"></i><span>Mua sắm</span></a><button class="mnav-item mnav-fab-wrap" onclick="handleFab()"><div class="mnav-fab"><i class="fas fa-camera"></i></div></button><a href="map.html" class="mnav-item"><i class="fas fa-map-marked-alt"></i><span>Bản đồ</span></a><a href="profile.html" class="mnav-item"><i class="fas fa-user"></i><span>Tài khoản</span></a></nav>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js");</script><script src="js/post-modal.js"></script>
</body></html>
