<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#ffffff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hội nhóm - ShipperShop</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="mobile.css">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
:root{--primary:#EE4D2D;--bg:#f0f2f5;--card:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding-bottom:80px;}
.top-nav{background:#fff;position:fixed;top:0;left:0;right:0;z-index:100;padding:8px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f0f0f0;}
.nav-logo{font-size:20px;font-weight:800;color:var(--primary);text-decoration:none;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.page-header{padding:16px;padding-top:68px;background:#fff;border-bottom:1px solid var(--border);}
.page-header h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.page-header p{font-size:13px;color:var(--muted);}
.search-bar{margin:12px 16px;position:relative;}
.search-bar input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:24px;font-size:14px;background:#f0f2f5;outline:none;}
.search-bar input:focus{border-color:var(--primary);background:#fff;}
.search-bar i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
.cats{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cats::-webkit-scrollbar{display:none;}
.cat-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--text);}
.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.groups-list{padding:8px 16px;}
.group-card{background:var(--card);border-radius:12px;margin-bottom:12px;overflow:hidden;border:1px solid var(--border);}
.group-cover{height:80px;background:linear-gradient(135deg,var(--primary),#ff8a65);}
.group-info{padding:12px 14px;display:flex;gap:12px;align-items:flex-start;}
.group-icon{width:48px;height:48px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;margin-top:-30px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.group-detail{flex:1;min-width:0;}
.group-name{font-size:16px;font-weight:700;cursor:pointer;display:block;text-decoration:none;color:var(--text);}
.group-name:hover{color:var(--primary);}
.group-desc{font-size:13px;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px;}
.group-stats{display:flex;gap:12px;font-size:12px;color:var(--muted);}
.group-stats span{display:flex;align-items:center;gap:4px;}
.join-btn{padding:6px 20px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:2px solid var(--primary);background:var(--primary);color:#fff;white-space:nowrap;}
.join-btn.joined{background:#fff;color:var(--primary);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;}
.modal-head{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.modal-head h2{font-size:18px;font-weight:700;}
.modal-x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px;overflow-y:auto;flex:1;}
.f-row{margin-bottom:14px;}
.f-row label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted);}
.f-row input,.f-row textarea,.f-row select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
.f-row textarea{min-height:80px;resize:vertical;}
.submit-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty i{font-size:48px;display:block;margin-bottom:12px;color:#ddd;}
.spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:3000;opacity:0;transition:.3s;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.mnav-fab-wrap{overflow:visible!important;position:relative!important;}.mnav-fab{width:46px!important;height:46px!important;font-size:18px!important;margin-top:-16px!important;cursor:pointer!important;position:relative!important;z-index:1001!important;border-radius:50%!important;background:#EE4D2D!important;color:#fff!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 2px 8px rgba(0,0,0,.2)!important;}
@media (min-width: 769px) {
  .top-nav { max-width: 680px; margin: 0 auto; }
  body { padding-bottom: 0 !important; }
}
</style>
<link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="ShipperShop"><link rel="apple-touch-icon" href="/icons/icon-192.png"></head>
<body>
<nav class="top-nav">
<a href="index.html" class="nav-logo"><i class="fa-solid fa-truck-fast"></i> ShipperShop</a>
<div style="flex:1"></div>
<button onclick="openCreate()" style="background:var(--primary);color:#fff;border:none;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer"><i class="fas fa-plus"></i> Tạo nhóm</button>
</nav>
<div class="page-header"><h1><i class="fas fa-users-rectangle"></i> Hội nhóm</h1><p>Tham gia cộng đồng shipper theo chủ đề yêu thích</p></div>
<div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Tìm hội nhóm..." oninput="filterGroups()"></div>
<div class="cats" id="catTabs">
<button class="cat-btn active" onclick="setCat('',this)">Tất cả</button>
<button class="cat-btn" onclick="setCat('shipping',this)">🚚 Vận chuyển</button>
<button class="cat-btn" onclick="setCat('location',this)">📍 Khu vực</button>
<button class="cat-btn" onclick="setCat('review',this)">⭐ Review</button>
<button class="cat-btn" onclick="setCat('confession',this)">🎭 Confession</button>
<button class="cat-btn" onclick="setCat('tips',this)">💡 Mẹo hay</button>
</div>
<div class="groups-list" id="groupsList"><div class="empty"><i class="fas fa-spinner spin"></i><p>Đang tải...</p></div></div>
<div class="modal-overlay" id="createModal">
<div class="modal">
<div class="modal-head"><h2>Tạo hội nhóm mới</h2><button class="modal-x" onclick="closeCreate()">×</button></div>
<div class="modal-body">
<div class="f-row"><label>Tên nhóm *</label><input id="gName" type="text" placeholder="VD: Shipper Sài Gòn" maxlength="200"></div>
<div class="f-row"><label>Mô tả</label><textarea id="gDesc" placeholder="Mô tả về nhóm..."></textarea></div>
<div class="f-row"><label>Danh mục</label><select id="gCat"><option value="general">Chung</option><option value="shipping">🚚 Vận chuyển</option><option value="location">📍 Khu vực</option><option value="review">⭐ Review</option><option value="confession">🎭 Confession</option><option value="tips">💡 Mẹo hay</option></select></div>
<div class="f-row"><label>Nội quy</label><textarea id="gRules" placeholder="1. Tôn trọng lẫn nhau..."></textarea></div>
<button class="submit-btn" onclick="createGroup()"><i class="fas fa-plus"></i> Tạo nhóm</button>
</div></div></div>
<div class="toast" id="toast"></div>
<script src="js/reddit-mkpost.js"></script>
<script src="js/mobile.js"></script>
<script>
var CU=JSON.parse(localStorage.getItem('user')||'null');var allGroups=[],curCat='';
async function loadGroups(){try{var r=await fetch('/api/groups.php',{credentials:'include'});var d=await r.json();if(d.success){allGroups=d.data;renderGroups();}}catch(e){document.getElementById('groupsList').innerHTML='<div class="empty"><i class="fas fa-wifi"></i><p>Lỗi kết nối</p></div>';}}
function renderGroups(){var list=document.getElementById('groupsList');var search=document.getElementById('searchInput').value.toLowerCase();var filtered=allGroups.filter(function(g){if(curCat&&g.category!==curCat)return false;if(search&&g.name.toLowerCase().indexOf(search)===-1)return false;return true;});
if(!filtered.length){list.innerHTML='<div class="empty"><i class="fas fa-users-slash"></i><p>Chưa có hội nhóm nào</p></div>';return;}
list.innerHTML=filtered.map(function(g){var catIcon={'shipping':'🚚','location':'📍','review':'⭐','confession':'🎭','tips':'💡'}[g.category]||'👥';var joined=g.is_member;
return '<div class="group-card"><div class="group-cover"></div><div class="group-info"><div class="group-icon">'+catIcon+'</div><div class="group-detail"><a class="group-name" href="group.html?slug='+g.slug+'">'+esc(g.name)+'</a><div class="group-desc">'+esc(g.description||'')+'</div><div class="group-stats"><span><i class="fas fa-users"></i> '+fN(g.member_count)+' thành viên</span><span><i class="fas fa-file-lines"></i> '+fN(g.post_count)+' bài</span></div></div><button class="join-btn'+(joined?' joined':'')+'" onclick="event.preventDefault();event.stopPropagation();toggleJoin('+g.id+',this)">'+(joined?'Đã tham gia':'Tham gia')+'</button></div></div>';}).join('');}
function filterGroups(){renderGroups();}
function setCat(cat,btn){curCat=cat;document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderGroups();}
async function toggleJoin(gid,btn){if(!CU){toast('Đăng nhập!');return;}try{var r=await fetch('/api/groups.php?action=join',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({group_id:gid})});var d=await r.json();if(d.success){btn.classList.toggle('joined');btn.textContent=d.joined?'Đã tham gia':'Tham gia';toast(d.joined?'Đã tham gia!':'Đã rời nhóm');}}catch(e){toast('Lỗi');}}
function openCreate(){if(!CU){toast('Đăng nhập!');return;}document.getElementById('createModal').classList.add('open');}
function closeCreate(){document.getElementById('createModal').classList.remove('open');}
async function createGroup(){var name=document.getElementById('gName').value.trim();if(!name){toast('Nhập tên nhóm!');return;}try{var r=await fetch('/api/groups.php?action=create',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({name:name,description:document.getElementById('gDesc').value.trim(),category:document.getElementById('gCat').value,rules:document.getElementById('gRules').value.trim()})});var d=await r.json();if(d.success){toast('Tạo nhóm thành công!');closeCreate();setTimeout(function(){location.href='group.html?slug='+d.data.slug;},800);}else toast(d.message);}catch(e){toast('Lỗi');}}
function esc(t){if(!t)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fN(n){n=parseInt(n)||0;if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(function(){t.classList.remove('show');},2500);}
loadGroups();
</script>
<nav id="mobileBottomNav" role="navigation"><a href="index.html" class="mnav-item" data-page="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a><a href="marketplace.html" class="mnav-item" data-page="marketplace.html"><i class="fas fa-store"></i><span>Mua sắm</span></a><button class="mnav-item mnav-fab-wrap" onclick="handleFab()"><div class="mnav-fab"><i class="fas fa-camera"></i></div></button><a href="map.html" class="mnav-item" data-page="map.html"><i class="fas fa-map-marked-alt"></i><span>Bản đồ</span></a><a href="profile.html" class="mnav-item" data-page="profile.html"><i class="fas fa-user"></i><span>Tài khoản</span></a></nav>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js");</script><script src="js/post-modal.js"></script></body></html>
