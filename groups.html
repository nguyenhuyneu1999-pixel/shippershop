<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">

<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
:root{--primary:#7C3AED;--bg:#f0f2f5;--card:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);padding-bottom:80px;padding-top:56px}
.top-bar{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;display:flex;align-items:center;padding:10px 12px;gap:10px;border-bottom:1px solid var(--border)}
.top-bar h1{font-size:20px;font-weight:800;flex:1}
.top-bar .tb-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text);background:var(--bg)}
.search-box{background:var(--bg);border-radius:20px;padding:8px 14px;font-size:14px;border:none;width:100%;margin:12px;display:none}
.search-box:focus{outline:2px solid var(--primary);background:#fff}
.search-active .search-box{display:block}

/* Category chips */
.cat-chips{display:flex;gap:8px;padding:12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;background:#fff;border-bottom:1px solid var(--border)}
.cat-chips::-webkit-scrollbar{display:none}
.cat-chip{white-space:nowrap;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg);color:var(--text);text-decoration:none;border:1px solid var(--border);flex-shrink:0;cursor:pointer;transition:all .2s}
.cat-chip:active,.cat-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Section */
.section{background:#fff;margin-top:8px;padding:16px 0}
.section-head{display:flex;align-items:center;justify-content:space-between;padding:0 16px 12px}
.section-head h2{font-size:16px;font-weight:700}
.section-head a{font-size:13px;color:var(--primary);text-decoration:none;font-weight:600}

/* Group card - COMPACT Reddit-style */
.g-list{padding:0 12px}
.g-card{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.g-card:last-child{border-bottom:none}
.g-icon{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;overflow:hidden}
.g-icon img{width:100%;height:100%;object-fit:cover}
.g-info{flex:1;min-width:0}
.g-name{font-size:14px;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-name a{color:var(--text);text-decoration:none}
.g-meta{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-desc{display:none}
.g-join{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;border:none;cursor:pointer;flex-shrink:0;transition:all .2s}
.g-join.join{background:var(--primary);color:#fff}
.g-join.joined{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.g-join:active{transform:scale(.95)}

/* Horizontal scroll - compact */
.g-scroll{display:flex;gap:8px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.g-scroll::-webkit-scrollbar{display:none}
.g-scroll-card{min-width:220px;max-width:240px;background:#fff;border-radius:10px;border:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.g-scroll-card .g-icon{width:32px;height:32px;font-size:12px}
.g-scroll-card .g-name{font-size:13px}
.g-scroll-card .g-meta{font-size:10px}
.g-scroll-card .g-desc{display:block;font-size:11px;color:#888;line-height:1.3;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Skeleton */
.skel{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:8px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Category page */
.cat-page-head{background:#fff;padding:16px;padding-top:60px;border-bottom:1px solid var(--border)}
.cat-page-head h1{font-size:22px;font-weight:800;display:flex;align-items:center;gap:8px}
.sub-chips{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--border)}
.sub-chips::-webkit-scrollbar{display:none}
.sub-chip{white-space:nowrap;padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;background:var(--bg);color:var(--text);flex-shrink:0;cursor:pointer;border:1px solid var(--border)}
.sub-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;border-top:1px solid var(--border);z-index:100;padding:4px 0 calc(4px + env(safe-area-inset-bottom))}
.bnav a{flex:1;text-align:center;padding:6px 0;text-decoration:none;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav a i{font-size:20px}
.bnav a.active{color:var(--primary)}
.bnav a.active i{font-weight:900}



/* Search results */
.search-results{display:none;padding:16px}
.search-active .search-results{display:block}
.search-active .main-content{display:none}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
</style>
<meta name="description" content="12 nhóm cộng đồng shipper: GHTK, GHN, Grab, Be, Confession, Mẹo tiết kiệm xăng. Tham gia ngay!">
<meta property="og:title" content="Cộng đồng Shipper - ShipperShop">
<meta property="og:description" content="12 nhóm cộng đồng shipper: GHTK, GHN, Grab, Be, Confession, Mẹo tiết kiệm xăng. Tham gia ngay!">
<meta property="og:image" content="https://shippershop.vn/icons/og-image.png">
<meta property="og:url" content="https://shippershop.vn/groups.html">
<meta property="og:type" content="website">
<meta property="og:locale" content="vi_VN">
<meta property="og:site_name" content="ShipperShop">
</head>
<body>
<!-- Top bar -->
<div class="top-bar" id="topBar">
<h1>Cộng đồng</h1>
<div class="tb-icon" onclick="toggleSearch()"><i class="fas fa-search"></i></div>
<a href="profile.html" class="tb-icon"><i class="fas fa-user"></i></a>
</div>
<input class="search-box" id="searchBox" type="text" placeholder="Tìm kiếm cộng đồng..." oninput="onSearch(this.value)">

<!-- Category chips -->
<div class="cat-chips" id="catChips">
<div class="skel" style="width:100px;height:36px"></div>
<div class="skel" style="width:80px;height:36px"></div>
<div class="skel" style="width:120px;height:36px"></div>
</div>

<div class="main-content" id="mainContent">
<div id="discoverContent">
<div class="section"><div class="g-list"><div class="g-card"><div class="skel" style="width:48px;height:48px;border-radius:50%"></div><div style="flex:1"><div class="skel" style="width:60%;height:16px;margin-bottom:8px"></div><div class="skel" style="width:40%;height:12px"></div></div></div></div></div>
</div>
</div>

<!-- Search results -->
<div class="search-results" id="searchResults"></div>

<!-- Category page (hidden by default) -->
<div id="catPage" style="display:none"></div>



<!-- Bottom nav -->
<nav id="mobileBottomNav" role="navigation" aria-label="Mobile navigation">
    <a href="index.html" class="mnav-item" data-page="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
    <a href="marketplace.html" class="mnav-item" data-page="marketplace.html"><i class="fas fa-store"></i><span>Mua sắm</span></a>
    <div class="mnav-item mnav-fab-wrap" style="overflow:visible" onclick="createGroup()"><div class="mnav-fab" style="width:46px;height:46px;font-size:18px;margin-top:-16px;cursor:pointer;z-index:1001;position:relative"><i class="fas fa-camera"></i></div></div>
    <a href="map.html" class="mnav-item" data-page="map.html"><i class="fas fa-map-marked-alt"></i><span>Bản đồ</span></a>
    <a href="profile.html" class="mnav-item" data-page="profile.html"><i class="fas fa-user"></i><span>Tài khoản</span></a>
</nav>

<div class="toast" id="toast"></div>

<script>
var CU=JSON.parse(localStorage.getItem("user")||"null");
var searchTimer=null;
var categories=[];

function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";setTimeout(function(){t.className="toast";},2500);}
function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fN(n){n=parseInt(n)||0;if(n>=1000000)return(n/1000000).toFixed(1)+"tr";if(n>=1000)return(n/1000).toFixed(1)+"k";return n;}

function toggleSearch(){
  document.body.classList.toggle("search-active");
  var sb=document.getElementById("searchBox");
  if(document.body.classList.contains("search-active")){sb.style.display="block";sb.focus();}
  else{sb.style.display="none";sb.value="";document.getElementById("searchResults").innerHTML="";}
}

function onSearch(v){
  clearTimeout(searchTimer);
  if(v.trim().length<2){document.getElementById("searchResults").innerHTML="<p style='text-align:center;color:var(--muted);padding:20px'>Nhập ít nhất 2 ký tự</p>";return;}
  searchTimer=setTimeout(function(){
    fetch("/api/groups.php?action=search&q="+encodeURIComponent(v.trim())).then(function(r){return r.json();}).then(function(d){
      if(!d.success||!d.data.length){document.getElementById("searchResults").innerHTML="<p style='text-align:center;color:var(--muted);padding:40px'>Không tìm thấy</p>";return;}
      document.getElementById("searchResults").innerHTML="<div class='g-list'>"+d.data.map(function(g){return mkGroupCard(g);}).join("")+"</div>";
    });
  },400);
}

function mkGroupCard(g){
  var icon=g.icon_image?"<img src='"+esc(g.icon_image)+"' onerror=\"this.style.display='none';this.parentNode.innerHTML='<span>"+esc((g.name||"G")[0])+"</span>'\">":"<span>"+esc((g.name||"G")[0])+"</span>";
  var joined=g.is_member;
  var btnCls=joined?"joined":"join";
  var btnTxt=joined?"Đã tham gia":"Tham gia";
  var members=fN(g.member_count)+" thành viên";
  var desc=g.description?(g.description.length>50?g.description.substring(0,50)+"...":g.description):"";
  return "<div class='g-card'>"+
    "<div class='g-icon' style='background:"+(g.banner_color||"var(--primary)")+"'>"+icon+"</div>"+
    "<div class='g-info' onclick='goGroup(\""+esc(g.slug)+"\")' style='cursor:pointer'>"+
      "<div class='g-name'>"+esc(g.name)+"</div>"+
      "<div class='g-meta'>"+members+(desc?" · "+esc(desc):"")+"</div>"+
    "</div>"+
    "<button class='g-join "+btnCls+"' onclick='joinGroup("+g.id+",this)'>"+btnTxt+"</button>"+
  "</div>";
}

function mkScrollCard(g){
  var icon=g.icon_image?"<img src='"+esc(g.icon_image)+"' onerror=\"this.style.display='none';this.parentNode.innerHTML='<span>"+esc((g.name||"G")[0])+"</span>'\">":"<span>"+esc((g.name||"G")[0])+"</span>";
  var joined=g.is_member;
  return "<div class='g-scroll-card' onclick='goGroup(\""+esc(g.slug)+"\")' style='cursor:pointer'>"+
    "<div style='display:flex;gap:8px;align-items:center'>"+
      "<div class='g-icon' style='background:"+(g.banner_color||"var(--primary)")+"'>"+icon+"</div>"+
      "<div style='flex:1;min-width:0'>"+
        "<div class='g-name'>"+esc(g.name)+"</div>"+
        "<div class='g-meta'>"+fN(g.member_count)+" thành viên</div>"+
      "</div>"+
      "<button class='g-join "+(joined?"joined":"join")+"' onclick='event.stopPropagation();joinGroup("+g.id+",this)' style='font-size:11px;padding:4px 10px'>"+(joined?"Đã gia nhập":"Tham gia")+"</button>"+
    "</div>"+
    "<div class='g-desc'>"+esc(g.description||"")+"</div>"+
  "</div>";
}

function goGroup(slug){location.href="group.html?slug="+slug;}

function joinGroup(gid,btn){
  if(!CU){location.href="login.html";return;}
  var hdrs={"Content-Type":"application/json"};
  var tk=localStorage.getItem("token");
  if(tk)hdrs["Authorization"]="Bearer "+tk;
  fetch("/api/groups.php?action=join",{method:"POST",headers:hdrs,credentials:"include",body:JSON.stringify({group_id:gid})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.success){
      if(d.data.joined){btn.className="g-join joined";btn.textContent="Đã tham gia";toast("Đã tham gia nhóm!");}
      else{btn.className="g-join join";btn.textContent="Tham gia";toast("Đã rời nhóm");}
    }else{if((d.message||'').indexOf('Shipper Plus')>-1){if(confirm(d.message+'\n\nNâng cấp ngay?'))location.href='/wallet.html';}else toast(d.message||"Lỗi");}
  }).catch(function(){toast("Lỗi kết nối");});
}

// Load categories
function loadCategories(){
  fetch("/api/groups.php?action=categories").then(function(r){return r.json();}).then(function(d){
    if(!d.success)return;
    categories=d.data;
    var html="";
    d.data.forEach(function(c){
      html+="<div class='cat-chip' onclick='showCategory(\""+esc(c.slug)+"\")'>"+c.icon+" "+esc(c.name)+"</div>";
    });
    document.getElementById("catChips").innerHTML=html;
  });
}

// Load discover
function loadDiscover(){
  fetch("/api/groups.php?action=discover",{credentials:"include"}).then(function(r){return r.json();}).then(function(d){
    if(!d.success)return;
    var data=d.data;
    var html="";

    // Recommended (if logged in)
    if(data.recommended&&data.recommended.length){
      html+="<div class='section'><div class='section-head'><h2>Được đề xuất cho bạn</h2></div>";
      html+="<div class='g-list'>"+data.recommended.map(function(g){return mkGroupCard(g);}).join("")+"</div></div>";
    }

    // Popular
    if(data.popular&&data.popular.length){
      html+="<div class='section'><div class='section-head'><h2>Phổ biến nhất</h2></div>";
      html+="<div class='g-list'>"+data.popular.map(function(g){return mkGroupCard(g);}).join("")+"</div></div>";
    }

    // By category
    if(data.by_category){
      data.by_category.forEach(function(sec){
        html+="<div class='section'><div class='section-head'><h2>"+sec.category.icon+" "+esc(sec.category.name)+"</h2><a href='#' onclick='showCategory(\""+esc(sec.category.slug)+"\");return false'>Xem tất cả ›</a></div>";
        html+="<div class='g-scroll'>"+sec.groups.map(function(g){return mkScrollCard(g);}).join("")+"</div></div>";
      });
    }

    document.getElementById("discoverContent").innerHTML=html;
  });
}

// Show category page
function showCategory(slug){
  document.getElementById("mainContent").style.display="none";
  document.getElementById("catPage").style.display="block";
  document.getElementById("catPage").innerHTML="<div style='padding:40px;text-align:center'><i class='fas fa-spinner fa-spin' style='font-size:24px'></i></div>";

  fetch("/api/groups.php?action=category&slug="+encodeURIComponent(slug)).then(function(r){return r.json();}).then(function(d){
    if(!d.success){document.getElementById("catPage").innerHTML="<p style='padding:40px;text-align:center'>Không tìm thấy</p>";return;}
    var cat=d.data.category;
    var subs=d.data.subcategories||[];
    var groups=d.data.groups||[];

    var html="<div class='cat-page-head'><button onclick='backToDiscover()' style='background:none;border:none;font-size:18px;padding:4px 8px;cursor:pointer'><i class='fas fa-arrow-left'></i></button><h1>"+cat.icon+" "+esc(cat.name)+"</h1></div>";

    if(subs.length){
      html+="<div class='sub-chips'>";
      html+="<div class='sub-chip active' onclick='filterByAll(this)'>Tất cả</div>";
      subs.forEach(function(s){html+="<div class='sub-chip' onclick='filterBySub(\""+esc(s.slug)+"\",this,"+cat.id+")'>"+esc(s.name)+"</div>";});
      html+="</div>";
    }

    // Group by subcategory name
    _catGroups=groups;
    if(groups.length){
      html+="<div class='section'><div class='g-list'>"+groups.map(function(g){return mkGroupCard(g);}).join("")+"</div></div>";
    }else{
      html+="<p style='padding:40px;text-align:center;color:var(--muted)'>Chưa có nhóm nào</p>";
    }

    document.getElementById("catPage").innerHTML=html;
  });
}

var _catGroups=[];
function filterByAll(chip){
  var chips=chip.parentNode.querySelectorAll(".sub-chip");
  chips.forEach(function(c){c.classList.remove("active");});
  chip.classList.add("active");
  var listEl=document.querySelector("#catPage .g-list");
  if(listEl)listEl.innerHTML=_catGroups.map(function(g){return mkGroupCard(g);}).join("");
}
function filterBySub(subSlug,chip,parentCatId){
  // Toggle active
  var chips=chip.parentNode.querySelectorAll(".sub-chip");
  var wasActive=chip.classList.contains("active");
  chips.forEach(function(c){c.classList.remove("active");});
  if(!wasActive)chip.classList.add("active");
  
  // Filter groups
  var listEl=document.querySelector("#catPage .g-list");
  if(!listEl)return;
  
  if(wasActive){
    // Deselect = show all
    listEl.innerHTML=_catGroups.map(function(g){return mkGroupCard(g);}).join("");
    return;
  }
  
  // Find subcategory id
  var subCat=null;
  for(var i=0;i<categories.length;i++){
    if(categories[i].slug===subSlug){subCat=categories[i];break;}
  }
  
  // Fetch sub category to get its id, then filter
  fetch("/api/groups.php?action=category&slug="+encodeURIComponent(subSlug)).then(function(r){return r.json();}).then(function(d){
    if(d.success&&d.data.groups){
      listEl.innerHTML=d.data.groups.length?d.data.groups.map(function(g){return mkGroupCard(g);}).join(""):"<p style='padding:30px;text-align:center;color:var(--muted)'>Không có nhóm nào</p>";
    }
  });
}

function backToDiscover(){
  document.getElementById("catPage").style.display="none";
  document.getElementById("mainContent").style.display="block";
}

// Init
loadCategories();
loadDiscover();

function createGroup(){
  if(!CU){location.href="login.html";return;}
  location.href="create-group.html";
}
</script>
