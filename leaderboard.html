<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bảng xếp hạng - ShipperShop</title>
<meta name="theme-color" content="#7C3AED">
<meta name="description" content="Bảng xếp hạng shipper hàng đầu ShipperShop">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/dark-mode.css">
<script src="/js/dark-mode.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:#f0f2f5;min-height:100vh}
.lb-header{background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;padding:20px 16px;text-align:center}
.lb-header h1{font-size:20px;margin-bottom:4px}
.lb-tabs{display:flex;gap:4px;padding:8px 16px;background:#fff;border-bottom:1px solid #e4e6eb;overflow-x:auto}
.lb-tab{padding:8px 16px;border:none;background:none;font-size:13px;cursor:pointer;border-radius:8px;white-space:nowrap;font-weight:500;color:#65676B}
.lb-tab.active{background:#7C3AED;color:#fff}
.lb-body{max-width:600px;margin:0 auto;padding:12px}
.lb-card{background:#fff;border-radius:12px;overflow:hidden}
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f5f5f5}
.lb-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.lb-rank.gold{background:#FEF3C7;color:#D97706}
.lb-rank.silver{background:#F3F4F6;color:#6B7280}
.lb-rank.bronze{background:#FED7AA;color:#C2410C}
.lb-rank.normal{background:#f0f0f0;color:#666}
.lb-av{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
.lb-name{font-weight:600;font-size:14px}
.lb-meta{font-size:12px;color:#65676B}
.lb-score{font-weight:700;color:#7C3AED;font-size:15px;margin-left:auto;flex-shrink:0}
.lb-empty{text-align:center;padding:40px;color:#999}
.back-link{position:absolute;left:16px;top:20px;color:#fff;text-decoration:none;font-size:14px}
@media(min-width:769px){.lb-body{padding:20px}}
</style>
</head>
<body>
<div class="lb-header" style="position:relative">
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i></a>
  <h1>🏆 Bảng xếp hạng</h1>
  <div style="font-size:13px;opacity:.8">Shipper hàng đầu ShipperShop</div>
</div>
<div class="lb-tabs">
  <button class="lb-tab active" onclick="loadLB('xp',this)">⭐ XP</button>
  <button class="lb-tab" onclick="loadLB('posts',this)">📝 Bài viết</button>
  <button class="lb-tab" onclick="loadLB('helpful',this)">❤️ Hữu ích</button>
</div>
<div class="lb-body"><div class="lb-card" id="lbList"><div class="lb-empty"><i class="fas fa-spinner fa-spin" style="font-size:24px"></i></div></div></div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function fN(n){return Number(n||0).toLocaleString('vi-VN');}

function loadLB(type,btn){
  document.querySelectorAll('.lb-tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  var list=document.getElementById('lbList');
  list.innerHTML='<div class="lb-empty"><i class="fas fa-spinner fa-spin" style="font-size:24px"></i></div>';
  
  fetch('/api/leaderboard.php?type='+type+'&limit=20')
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.success||!d.data.leaderboard.length){
        list.innerHTML='<div class="lb-empty">Chưa có dữ liệu</div>';return;
      }
      var scoreLabel=type==='xp'?'XP':(type==='posts'?'bài':'likes');
      list.innerHTML=d.data.leaderboard.map(function(u,i){
        var rankClass=i===0?'gold':(i===1?'silver':(i===2?'bronze':'normal'));
        var medal=i===0?'🥇':(i===1?'🥈':(i===2?'🥉':(i+1)));
        var av=u.avatar?'<img class="lb-av" src="'+u.avatar+'" loading="lazy">':'<div class="lb-av" style="background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">'+(u.fullname||'U')[0]+'</div>';
        var score=type==='xp'?fN(u.total_xp):(type==='posts'?fN(u.post_count):fN(u.total_likes));
        var badge=u.sub_badge?'<span style="margin-left:4px">'+u.sub_badge+'</span>':'';
        return '<a href="user.html?id='+u.user_id+'" style="text-decoration:none;color:inherit" class="lb-item"><div class="lb-rank '+rankClass+'">'+medal+'</div>'+av+'<div><div class="lb-name">'+esc(u.fullname)+badge+'</div><div class="lb-meta">'+(u.shipping_company||'Shipper')+(type==='xp'&&u.level?' · Lv.'+u.level:'')+'</div></div><div class="lb-score">'+score+' '+scoreLabel+'</div></a>';
      }).join('');
    })
    .catch(function(){list.innerHTML='<div class="lb-empty">Lỗi tải dữ liệu</div>';});
}
loadLB('xp');
</script>
</body>
</html>
