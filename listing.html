<script>
// Auto-inject Bearer token on ALL fetch calls to /api/
(function(){var of=window.fetch;window.fetch=function(url,opts){opts=opts||{};if(typeof url==='string'&&url.indexOf('/api/')>-1){opts.headers=opts.headers||{};var tk=localStorage.getItem('token');if(tk&&!opts.headers['Authorization']&&!opts.headers['authorization']){opts.headers['Authorization']='Bearer '+tk;}}return of.call(this,url,opts);};})();
</script>


<!-- HEADER -->
<div class="hd">
  <button class="hd-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
  <h1 id="hdTitle">Chi tiết sản phẩm</h1>
  <button class="hd-btn" onclick="shareListing()"><i class="fas fa-share-alt"></i></button>
  <button class="hd-btn" onclick="location='cart.html'"><i class="fas fa-shopping-cart"></i></button>
</div>

<!-- CONTENT -->
<div id="content">
  <div class="loading"><i class="fas fa-spinner spin" style="font-size:24px"></i><p style="margin-top:8px">Đang tải...</p></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar" style="display:none">
  <button class="bb-icon" id="bbWish" onclick="toggleWish()"><i class="far fa-heart"></i></button>
  <button class="bb-btn bb-chat" onclick="chatSeller()"><i class="fas fa-comment-dots"></i> Nhắn tin</button>
  <button class="bb-btn bb-buy" onclick="buyNow()"><i class="fas fa-shopping-cart"></i> Mua ngay</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <button class="lightbox-close"><i class="fas fa-times"></i></button>
  <img id="lbImg" src="" loading="lazy">
</div>

<script>
(function(){
  if(typeof SS!=='undefined'&&SS.store&&SS.store.isLoggedIn()&&SS.NotifBell){
    var nb=document.getElementById('ss-notif-bell');
    if(nb)SS.NotifBell.init('ss-notif-bell');
  }
  if(typeof window.toast==='undefined'&&typeof SS!=='undefined'&&SS.ui){
    window.toast=function(m,dur){SS.ui.toast(m,'info',dur||3000);};
  }
})();
