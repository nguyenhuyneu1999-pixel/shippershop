<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Chi tiết sản phẩm - ShipperShop</title>
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
:root{--primary:#7C3AED;--bg:#f5f5f5;--card:#fff;--text:#1a1a1a;--muted:#65676B;--border:#e4e6eb;--radius:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding-bottom:80px;}
a{text-decoration:none;color:inherit;}

/* HEADER */
.hd{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;display:flex;align-items:center;padding:8px 12px;gap:8px;border-bottom:1px solid var(--border);}
.hd-back{background:none;border:none;font-size:20px;padding:6px;cursor:pointer;color:#333;}
.hd h1{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hd-btn{background:none;border:none;font-size:18px;padding:6px;cursor:pointer;color:#333;}

/* IMAGE CAROUSEL */
.carousel{position:relative;background:#fff;margin-top:48px;}
.carousel-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.carousel-track::-webkit-scrollbar{display:none;}
.carousel-slide{min-width:100%;scroll-snap-align:start;}
.carousel-slide img{width:100%;aspect-ratio:1;object-fit:contain;background:#f8f8f8;}
.carousel-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;}
.carousel-dots span{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,.2);}
.carousel-dots span.active{background:var(--primary);}
.carousel-actions{position:absolute;bottom:12px;right:12px;display:flex;gap:8px;}
.carousel-actions button{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.carousel-counter{position:absolute;bottom:14px;left:12px;background:rgba(0,0,0,.5);color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;}

/* PRICE SECTION */
.price-section{background:#fff;padding:14px 16px;border-bottom:6px solid var(--bg);}
.price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.price-main{font-size:24px;font-weight:800;color:var(--primary);}
.price-old{font-size:14px;color:#999;text-decoration:line-through;}
.price-disc{background:#fce4ec;color:var(--primary);font-size:12px;font-weight:700;padding:2px 6px;border-radius:4px;}
.product-title{font-size:16px;font-weight:600;line-height:1.4;margin-top:8px;}
.product-meta{display:flex;gap:12px;margin-top:8px;font-size:13px;color:var(--muted);}
.cond-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;}
.cond-new{background:#e8f5e9;color:#2e7d32;}
.cond-like_new{background:#e3f2fd;color:#1565c0;}
.cond-good{background:#fff3e0;color:#e65100;}
.cond-fair{background:#fce4ec;color:#c62828;}

/* VARIANTS */
.variants-section{background:#fff;padding:14px 16px;border-bottom:1px solid var(--border);}
.var-label{font-size:13px;font-weight:600;margin-bottom:8px;}
.var-chips{display:flex;gap:8px;flex-wrap:wrap;}
.var-chip{padding:6px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:#fff;}
.var-chip.sel{border-color:var(--primary);color:var(--primary);background:#fff5f2;}

/* SELLER */
.seller-section{background:#fff;padding:14px 16px;border-bottom:6px solid var(--bg);display:flex;align-items:center;gap:12px;}
.seller-av{width:44px;height:44px;border-radius:50%;object-fit:cover;background:var(--border);}
.seller-av-ph{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;}
.seller-info{flex:1;}
.seller-name{font-weight:600;font-size:14px;}
.seller-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.seller-btn{padding:6px 16px;border:1.5px solid var(--primary);color:var(--primary);border-radius:20px;font-size:12px;font-weight:600;background:#fff;cursor:pointer;}

/* COLLAPSIBLE SECTIONS */
.section{background:#fff;border-bottom:1px solid var(--border);}
.section:last-child{border-bottom:6px solid var(--bg);}
.section-header{display:flex;align-items:center;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.section-header h3{flex:1;font-size:15px;font-weight:600;}
.section-header i{font-size:14px;color:var(--muted);transition:transform .2s;}
.section-header.open i{transform:rotate(180deg);}
.section-body{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease;}
.section-body.open{max-height:2000px;padding-bottom:16px;}
.section-body p{font-size:14px;line-height:1.7;color:#444;}
.section-body ul{margin-left:18px;font-size:14px;line-height:2;}

/* SPECS TABLE */
.specs-table{width:100%;font-size:13px;border-collapse:collapse;}
.specs-table tr:nth-child(even){background:#fafafa;}
.specs-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0;}
.specs-table td:first-child{font-weight:600;color:var(--muted);width:40%;}

/* SIMILAR PRODUCTS */
.similar-section{background:#fff;padding:14px 0;border-bottom:6px solid var(--bg);}
.similar-section h3{font-size:15px;font-weight:600;padding:0 16px 12px;}
.similar-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.similar-scroll::-webkit-scrollbar{display:none;}
.similar-card{min-width:140px;max-width:140px;cursor:pointer;}
.similar-card img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;background:var(--border);}
.similar-card .s-price{font-size:14px;font-weight:700;margin-top:6px;}
.similar-card .s-title{font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* REVIEWS */
.reviews-section{background:#fff;padding:16px;border-bottom:6px solid var(--bg);}
.reviews-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.reviews-stars{font-size:18px;color:#f5a623;}
.reviews-score{font-size:28px;font-weight:800;}
.reviews-count{font-size:13px;color:var(--muted);}
.reviews-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.reviews-tag{padding:4px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;cursor:pointer;}
.reviews-tag.active{border-color:var(--primary);color:var(--primary);background:#fff5f2;}
.review-card{padding:12px 0;border-top:1px solid var(--border);}
.review-user{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.review-user img{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.review-user span{font-size:13px;font-weight:600;}
.review-rating{color:#f5a623;font-size:12px;}
.review-date{font-size:11px;color:var(--muted);margin-left:8px;}
.review-text{font-size:14px;line-height:1.6;margin-top:4px;}
.review-imgs{display:flex;gap:6px;margin-top:8px;}
.review-imgs img{width:60px;height:60px;border-radius:6px;object-fit:cover;cursor:pointer;}
.review-empty{text-align:center;padding:20px;color:var(--muted);font-size:14px;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;align-items:center;padding:8px 12px;gap:8px;z-index:100;}
.bb-btn{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;text-align:center;cursor:pointer;border:none;}
.bb-chat{background:#fff;border:1.5px solid var(--primary);color:var(--primary);}
.bb-buy{background:var(--primary);color:#fff;}
.bb-icon{width:44px;height:44px;border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:#fff;color:#333;flex-shrink:0;}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted);}
.spin{animation:sp 1s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}

/* IMAGE LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:none;align-items:center;justify-content:center;}
.lightbox.open{display:flex;}
.lightbox img{max-width:95%;max-height:90vh;object-fit:contain;}
.lightbox-close{position:absolute;top:16px;right:16px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer;}

@media(max-width:768px){body{font-size:14px;}}

@media (min-width: 769px) {
  body { padding-bottom: 0 !important; }
  .carousel, .price-section, .seller-section, .section, .similar-section, .reviews-section { border-radius: 12px; margin-bottom: 8px; }
}
</style>
<link rel="stylesheet" href="mobile.css">
</head>
<body>

<!-- HEADER -->
<div class="hd">
  <button class="hd-back" onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
  <h1 id="hdTitle">Chi tiết sản phẩm</h1>
  <button class="hd-btn" onclick="shareListing()"><i class="fas fa-share-alt"></i></button>
  <button class="hd-btn" onclick="location='cart.html'"><i class="fas fa-shopping-cart"></i></button>
</div>

<!-- CONTENT -->
<div id="content">
  <div class="loading"><i class="fas fa-spinner spin" style="font-size:24px"></i><p style="margin-top:8px">Đang tải...</p></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottomBar" style="display:none">
  <button class="bb-icon" id="bbWish" onclick="toggleWish()"><i class="far fa-heart"></i></button>
  <button class="bb-btn bb-chat" onclick="chatSeller()"><i class="fas fa-comment-dots"></i> Nhắn tin</button>
  <button class="bb-btn bb-buy" onclick="buyNow()"><i class="fas fa-shopping-cart"></i> Mua ngay</button>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
  <button class="lightbox-close"><i class="fas fa-times"></i></button>
  <img id="lbImg" src="">
</div>

<script>
var CU=JSON.parse(localStorage.getItem("user")||"null");
var itemId=new URLSearchParams(location.search).get("id");
var itemData=null;
var condLabels={new:"Mới 100%",like_new:"Như mới",good:"Đã qua sử dụng",fair:"Còn dùng được"};
var condClass={new:"cond-new",like_new:"cond-like_new",good:"cond-good",fair:"cond-fair"};
var curImg=0;
var imgs=[];

if(!itemId){document.getElementById("content").innerHTML='<div class="loading">Không tìm thấy sản phẩm</div>';}
else{loadItem();}

async function loadItem(){
  try{
    var r=await fetch("/api/marketplace.php?id="+itemId);
    var d=await r.json();
    if(!d.success||!d.data){document.getElementById("content").innerHTML='<div class="loading">Sản phẩm không tồn tại</div>';return;}
    itemData=d.data;
    try{imgs=JSON.parse(itemData.images||"[]");}catch(e){imgs=[];}
    renderItem();
    loadSimilar();
    document.getElementById("bottomBar").style.display="flex";
  }catch(e){document.getElementById("content").innerHTML='<div class="loading">Lỗi kết nối</div>';}
}

function renderItem(){
  var p=itemData;
  var priceStr=p.price>0?Number(p.price).toLocaleString("vi-VN")+" ₫":"Miễn phí";
  document.getElementById("hdTitle").textContent=p.title;
  document.title=p.title+" - ShipperShop";

  var h="";

  // === IMAGE + VIDEO CAROUSEL ===
  if(imgs.length>0 || p.video_url){
    h+='<div class="carousel"><div class="carousel-track" id="carouselTrack" onscroll="onCarouselScroll()">';
    imgs.forEach(function(img){h+='<div class="carousel-slide"><img src="'+img+'" onclick="openLB(this.src)"></div>';});
    if(p.video_url){
      h+='<div class="carousel-slide" style="display:flex;align-items:center;justify-content:center;background:#000">';
      if(p.video_url.indexOf('/uploads/')!==-1){
        h+='<video controls playsinline preload="metadata" style="width:100%;max-height:400px;object-fit:contain" poster="'+(imgs[0]||'')+'"><source src="'+p.video_url+'" type="video/mp4">Video</video>';
      }else{
        h+='<iframe src="'+p.video_url+'" style="width:100%;height:100%;min-height:300px;border:0" allowfullscreen></iframe>';
      }
      h+='</div>';
    }
    var totalSlides=imgs.length+(p.video_url?1:0);
    h+='</div>';
    h+='<div class="carousel-counter" id="imgCounter">1/'+totalSlides+'</div>';
    h+='<div class="carousel-dots" id="carouselDots">';
    for(var di=0;di<totalSlides;di++){h+='<span'+(di===0?' class="active"':'')+'>'+(di>=imgs.length?'▶':'')+'</span>';}
    h+='</div>';
    h+='<div class="carousel-actions"><button onclick="toggleWish()"><i class="far fa-heart" id="wishIcon"></i></button><button onclick="shareListing()"><i class="fas fa-share-alt"></i></button></div>';
    h+='</div>';
  }

  // === PRICE SECTION ===
  h+='<div class="price-section">';
  h+='<div class="price-row"><span class="price-main">'+priceStr+'</span></div>';
  h+='<div class="product-title">'+esc(p.title)+'</div>';
  h+='<span class="cond-badge '+(condClass[p.condition_type]||"cond-good")+'">'+esc(condLabels[p.condition_type]||p.condition_type||"")+'</span>';
  h+='<div class="product-meta"><span><i class="fas fa-eye"></i> '+(p.views_count||0)+' lượt xem</span>';
  if(p.location) h+='<span><i class="fas fa-map-marker-alt"></i> '+esc(p.location)+'</span>';
  h+='</div></div>';

  // === SELLER ===
  h+='<div class="seller-section">';
  if(p.seller_avatar) h+='<img class="seller-av" src="'+p.seller_avatar+'">';
  else h+='<div class="seller-av-ph">'+esc((p.seller_name||"U")[0])+'</div>';
  h+='<div class="seller-info"><div class="seller-name">'+esc(p.seller_name||"")+'</div>';
  if(p.shipping_company) h+='<div class="seller-sub"><span style="color:'+({"GHTK":"#00b14f","J&T":"#d32f2f","GHN":"#ff6600","Viettel Post":"#e21a1a","SPX":"#7C3AED"}[p.shipping_company]||"#999")+'">'+esc(p.shipping_company)+'</span></div>';
  h+='</div><button class="seller-btn" onclick="location.href=\'user.html?id='+p.user_id+'\'">Xem shop</button></div>';

  // === DESCRIPTION (Collapsible) ===
  // === SHOWCASE IMAGES (Amazon A+ Content) ===
  // Full-width images - user just scrolls to see all product details
  var allShowcase=[];
  try{allShowcase=JSON.parse(p.showcase_images||"[]");}catch(e){}
  if((!allShowcase||!allShowcase.length)&&p.description_images){try{allShowcase=JSON.parse(p.description_images);}catch(e){}}
  if(allShowcase&&allShowcase.length>0){
    h+='<div style="background:#fff;margin-top:8px">';
    h+='<div style="padding:14px 16px 8px;font-size:15px;font-weight:700"><i class="fas fa-images" style="color:var(--primary);margin-right:6px"></i>Chi tiết sản phẩm</div>';
    allShowcase.forEach(function(si){
      h+='<img src="'+si+'" style="width:100%;display:block;cursor:pointer" onclick="openLB(this.src)" loading="lazy">';
    });
    h+='</div>';
  }

  // === DESCRIPTION TEXT ===
  if(p.description){
    h+='<div class="section"><div class="section-header open" onclick="toggleSection(this)"><h3><i class="fas fa-file-text" style="color:var(--primary);margin-right:8px"></i>Mô tả sản phẩm</h3><i class="fas fa-chevron-down"></i></div>';
    h+='<div class="section-body open" style="font-size:14px;line-height:1.8">';
    h+='<div style="white-space:pre-wrap;word-break:break-word">'+esc(p.description).replace(/\n/g,"<br>")+'</div>';
    h+='</div></div>';
  }

  // === PRODUCT DETAILS (Collapsible) ===
  h+='<div class="section"><div class="section-header" onclick="toggleSection(this)"><h3><i class="fas fa-list-ul" style="color:#1976d2;margin-right:8px"></i>Chi tiết sản phẩm</h3><i class="fas fa-chevron-down"></i></div>';
  h+='<div class="section-body"><table class="specs-table">';
  h+='<tr><td>Danh mục</td><td>'+esc(catName(p.category))+'</td></tr>';
  h+='<tr><td>Tình trạng</td><td>'+esc(condLabels[p.condition_type]||"")+'</td></tr>';
  if(p.location) h+='<tr><td>Khu vực</td><td>'+esc(p.location)+'</td></tr>';
  if(p.phone) h+='<tr><td>Liên hệ</td><td>'+esc(p.phone)+'</td></tr>';
  h+='<tr><td>Đăng ngày</td><td>'+formatDate(p.created_at)+'</td></tr>';
  h+='<tr><td>Lượt xem</td><td>'+(p.views_count||0)+'</td></tr>';
  h+='</table></div></div>';

  // === SAFETY TIPS ===
  h+='<div class="section"><div class="section-header" onclick="toggleSection(this)"><h3><i class="fas fa-shield-alt" style="color:#2e7d32;margin-right:8px"></i>Lưu ý an toàn</h3><i class="fas fa-chevron-down"></i></div>';
  h+='<div class="section-body"><ul>';
  h+='<li>Kiểm tra hàng trước khi thanh toán</li>';
  h+='<li>Gặp mặt trực tiếp tại nơi đông người</li>';
  h+='<li>Không chuyển tiền trước cho người lạ</li>';
  h+='<li>Báo cáo nếu phát hiện lừa đảo</li>';
  h+='</ul></div></div>';

  // === SIMILAR PRODUCTS ===
  h+='<div class="similar-section"><h3>Sản phẩm tương tự</h3><div class="similar-scroll" id="similarList"><div class="loading" style="padding:20px"><i class="fas fa-spinner spin"></i></div></div></div>';

  // === REVIEWS ===
  h+='<div class="reviews-section"><h3 style="font-size:16px;font-weight:700;margin-bottom:12px"><i class="fas fa-star" style="color:#f5a623;margin-right:6px"></i>Đánh giá từ người mua</h3>';
  h+='<div class="review-empty"><i class="far fa-comment-dots" style="font-size:32px;margin-bottom:8px"></i><p>Chưa có đánh giá nào</p><p style="font-size:12px;margin-top:4px">Hãy là người đầu tiên đánh giá sản phẩm này</p></div>';
  h+='</div>';

  document.getElementById("content").innerHTML=h;
}

// === CAROUSEL ===
function onCarouselScroll(){
  var track=document.getElementById("carouselTrack");
  if(!track)return;
  var idx=Math.round(track.scrollLeft/track.offsetWidth);
  if(idx!==curImg){
    curImg=idx;
    var dots=document.querySelectorAll("#carouselDots span");
    dots.forEach(function(d,i){d.className=i===idx?"active":"";});
    var counter=document.getElementById("imgCounter");
    if(counter) counter.textContent=(idx+1)+"/"+imgs.length;
  }
}

// === SECTIONS ===
function toggleSection(el){
  el.classList.toggle("open");
  var body=el.nextElementSibling;
  body.classList.toggle("open");
}

// === SIMILAR ===
async function loadSimilar(){
  try{
    var r=await fetch("/api/marketplace.php?category="+(itemData.category||"")+"&limit=10");
    var d=await r.json();
    if(!d.success||!d.data.items)return;
    var items=d.data.items.filter(function(x){return x.id!=itemId;}).slice(0,8);
    if(!items.length){document.getElementById("similarList").innerHTML='<span style="color:var(--muted);font-size:13px">Không có sản phẩm tương tự</span>';return;}
    document.getElementById("similarList").innerHTML=items.map(function(item){
      var simImgs=[];try{simImgs=JSON.parse(item.images||"[]");}catch(e){}
      var img=simImgs.length>0?simImgs[0]:"";
      var pr=item.price>0?Number(item.price).toLocaleString("vi-VN")+" ₫":"Miễn phí";
      return '<div class="similar-card" onclick="location.href=\'listing.html?id='+item.id+'\'">'
        +(img?'<img src="'+img+'" loading="lazy">':'<div style="width:100%;aspect-ratio:1;background:var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ccc"><i class="fas fa-image"></i></div>')
        +'<div class="s-price">'+pr+'</div>'
        +'<div class="s-title">'+esc(item.title)+'</div></div>';
    }).join("");
  }catch(e){}
}

// === ACTIONS ===
function toggleWish(){
  var icon=document.querySelectorAll("#wishIcon, #bbWish i");
  icon.forEach(function(i){
    if(i.classList.contains("far")){i.className="fas fa-heart";i.style.color="var(--primary)";}
    else{i.className="far fa-heart";i.style.color="";}
  });
}

function chatSeller(){
  if(!CU){location.href="login.html";return;}
  if(itemData) location.href="messages.html?to="+itemData.user_id;
}

function buyNow(){
  if(!CU){location.href="login.html";return;}
  chatSeller();
}

function shareListing(){
  var url=location.href;
  if(navigator.share) navigator.share({title:itemData?itemData.title:"",url:url});
  else{navigator.clipboard.writeText(url);alert("Đã copy link!");}
}

function openLB(src){
  document.getElementById("lbImg").src=src;

function esc(t){return t?String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):"";}
function catName(c){var m={"xe_co":"Xe cộ","dien_thoai":"Điện thoại","do_dien_tu":"Đồ điện tử","thoi_trang":"Thời trang","do_gia_dung":"Đồ gia dụng","khac":"Khác"};return m[c]||c||"Khác";}
function formatDate(dt){if(!dt)return"";try{var d=new Date(dt.replace(" ","T"));return d.toLocaleDateString("vi-VN");}catch(e){return dt;}}
