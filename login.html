<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - ShipperShop</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/mobile.css">
<link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
<style>
body,input,button,select,textarea{font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{box-sizing:border-box}
body{max-width:100vw;overflow-x:hidden}
.auth-page{min-height:100vh;background:linear-gradient(135deg,var(--primary) 0%,#5B21B6 100%);display:flex;align-items:center;justify-content:center;padding:16px}
.auth-container{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:440px;width:100%;padding:36px 28px}
.auth-header{text-align:center;margin-bottom:28px}
.auth-logo{font-size:40px;margin-bottom:8px}
.auth-title{font-size:26px;color:#333;margin-bottom:6px;font-weight:700}
.auth-subtitle{color:#999;font-size:13px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-weight:600;margin-bottom:8px;color:#333;font-size:14px}
.form-input{width:100%;padding:14px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;transition:all .2s;font-family:inherit}
.form-input:focus{border-color:var(--primary);outline:none;box-shadow:0 0 0 3px rgba(124,58,237,.1)}
.form-input.error{border-color:#f44336}
.error-message{color:#f44336;font-size:13px;margin-top:5px;display:none}
.error-message.show{display:block}
.password-toggle{position:relative}
.password-toggle-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#999;cursor:pointer;font-size:16px}
.remember-forgot{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.checkbox-label{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer}
.checkbox-label input{width:18px;height:18px;accent-color:var(--primary)}
.forgot-link{color:var(--primary);font-size:14px;text-decoration:none}
.btn-submit{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-submit:hover:not(:disabled){background:#5B21B6;transform:translateY(-1px)}
.btn-submit:disabled{background:#ccc;cursor:not-allowed}
.btn-submit.loading .btn-text{display:none}
.btn-submit.loading .loading-spinner{display:block}
.loading-spinner{display:none;width:20px;height:20px;border:3px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.divider{text-align:center;margin:24px 0;position:relative}
.divider::before{content:'';position:absolute;left:0;top:50%;width:100%;height:1px;background:#e0e0e0}
.divider span{background:#fff;padding:0 15px;position:relative;color:#999;font-size:13px}
.auth-footer{text-align:center;margin-top:22px;color:#999;font-size:14px}
.auth-footer a{color:var(--primary);font-weight:600;text-decoration:none}
.back-home{text-align:center;margin-top:12px}
.back-home a{color:#999;font-size:13px;text-decoration:none}
@media(max-width:480px){.auth-container{padding:28px 18px}.auth-title{font-size:22px}}

@media(min-width:769px){
  body{background:#f0f2f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
  #mobileBottomNav{display:none!important}
  .login-wrap,.auth-wrap,.container,form{max-width:420px;margin:0 auto;background:#fff;border-radius:12px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
}
</style>
<link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="ShipperShop"><meta name="description" content="Đăng nhập ShipperShop để chia sẻ kinh nghiệm giao hàng, kết nối shipper cả nước.">
<meta property="og:title" content="Đăng nhập ShipperShop - Cộng đồng Shipper #1">
<meta property="og:description" content="Đăng nhập ShipperShop để chia sẻ kinh nghiệm giao hàng, kết nối shipper cả nước.">
<meta property="og:image" content="https://shippershop.vn/icons/og-image.png">
<meta property="og:url" content="https://shippershop.vn/login.html">
<meta property="og:type" content="website">
<meta property="og:locale" content="vi_VN">
<meta property="og:site_name" content="ShipperShop">
</head>
<body>
<div class="auth-page">
<div class="auth-container">
<div class="auth-header">
<div class="auth-logo"><img src="/icons/icon-96.png" alt="ShipperShop" style="width:56px;height:56px;border-radius:16px"></div>
<h1 class="auth-title">Đăng nhập</h1>
<p class="auth-subtitle">Chào mừng trở lại với ShipperShop!</p>
</div>
<form id="loginForm">
<div class="form-group">
<label class="form-label">Tên đăng nhập</label>
<input type="text" class="form-input" id="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
<div class="error-message" id="usernameError"></div>
</div>
<div class="form-group">
<label class="form-label">Mật khẩu</label>
<div class="password-toggle">
<input type="password" class="form-input" id="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
<button type="button" class="password-toggle-btn" onclick="var i=document.getElementById('password'),c=document.getElementById('toggleIcon');if(i.type==='password'){i.type='text';c.className='far fa-eye-slash'}else{i.type='password';c.className='far fa-eye'}"><i class="far fa-eye" id="toggleIcon"></i></button>
</div>
<div class="error-message" id="passwordError"></div>
</div>
<div class="remember-forgot">
<label class="checkbox-label"><input type="checkbox" id="remember"><span>Ghi nhớ đăng nhập</span></label>
<a href="#" class="forgot-link" onclick="alert('Vui lòng liên hệ admin để đặt lại mật khẩu');return false">Quên mật khẩu?</a>
</div>
<div class="error-message show" id="formError" style="text-align:center;margin-bottom:12px"></div>
<button type="submit" class="btn-submit" id="submitBtn"><span class="btn-text">Đăng nhập</span><div class="loading-spinner"></div></button>
</form>
<div class="auth-footer">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></div>
<div class="back-home"><a href="index.html"><i class="fas fa-arrow-left"></i> Về trang chủ</a></div>
</div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();
  document.getElementById('formError').textContent='';
  var un=document.getElementById('username').value.trim();
  var pw=document.getElementById('password').value;
  if(!un){document.getElementById('usernameError').textContent='Vui lòng nhập tên đăng nhập';document.getElementById('usernameError').classList.add('show');return}
  if(!pw||pw.length<6){document.getElementById('passwordError').textContent='Mật khẩu phải có ít nhất 6 ký tự';document.getElementById('passwordError').classList.add('show');return}
  var btn=document.getElementById('submitBtn');btn.classList.add('loading');btn.disabled=true;
  try{
    var r=await fetch('/api/auth.php?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:un,password:pw})});
    var d=await r.json();
    if(d.success){
      localStorage.setItem('user',JSON.stringify(d.data.user));
      localStorage.setItem('token',d.data.token);
      if(document.getElementById('remember').checked)localStorage.setItem('remember','true');
      var ret=localStorage.getItem('returnUrl')||'index.html';localStorage.removeItem('returnUrl');
      window.location.href=ret;
    }else{
      var fe=document.getElementById('formError');fe.textContent=d.message||'Đăng nhập thất bại';fe.classList.add('show');
    }
  }catch(e){document.getElementById('formError').textContent='Lỗi kết nối';document.getElementById('formError').classList.add('show');}
  finally{btn.classList.remove('loading');btn.disabled=false;}
});
document.getElementById('username').addEventListener('input',function(){document.getElementById('usernameError').classList.remove('show')});
document.getElementById('password').addEventListener('input',function(){document.getElementById('passwordError').classList.remove('show')});
window.addEventListener('DOMContentLoaded',function(){if(localStorage.getItem('user')){var r=localStorage.getItem('returnUrl')||'index.html';localStorage.removeItem('returnUrl');window.location.href=r}});
</script>
<script src="js/mobile.js"></script>
<nav id="mobileBottomNav" role="navigation"><a href="index.html" class="mnav-item" data-page="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a><a href="marketplace.html" class="mnav-item" data-page="marketplace.html"><i class="fas fa-store"></i><span class="mnav-badge" id="navCartBadge" style="display:none">0</span><span>Mua sắm</span></a><button class="mnav-item mnav-fab-wrap" onclick="handleFab()"><div class="mnav-fab"><i class="fas fa-search" id="fabIcon"></i></div></button><a href="map.html" class="mnav-item" data-page="map.html"><i class="fas fa-map-marked-alt"></i><span>Bản đồ</span></a><a href="profile.html" class="mnav-item" data-page="profile.html" id="navProfileItem"><i class="fas fa-user" id="navProfileIcon"></i><span id="navProfileName">Tài khoản</span></a></nav>
<script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js");</script><script src="/js/analytics.js"></script></body>
</html>
