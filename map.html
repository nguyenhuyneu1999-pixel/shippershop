<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản đồ Giao hàng - ShipperShop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--primary:#d32f2f;--bg:#f0f2f5;--card:#fff;--text:#1c1e21;--text2:#65676b;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#map{flex:1;z-index:1}
.map-hd{position:absolute;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.95);padding:8px 12px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.map-hd h1{font-size:16px;font-weight:700;white-space:nowrap}
.map-hd h1 i{color:var(--primary)}
.map-search{flex:1;position:relative}
.map-search input{width:100%;padding:7px 12px 7px 30px;border:1.5px solid #ddd;background:#fff;border-radius:20px;font-size:13px;outline:none}
.map-search input:focus{border-color:var(--primary)}
.map-search i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text2)}
.map-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;color:var(--text)}
.map-filters{position:absolute;top:52px;left:0;right:0;z-index:1000;display:flex;gap:6px;padding:4px 12px;overflow-x:auto;scrollbar-width:none}
.map-filters::-webkit-scrollbar{display:none}
.map-filter{flex-shrink:0;padding:5px 12px;border-radius:16px;background:rgba(255,255,255,.9);border:1.5px solid #e4e6eb;font-size:11px;cursor:pointer;white-space:nowrap;backdrop-filter:blur(4px);color:var(--text2)}
.map-filter.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.map-fab{position:absolute;bottom:76px;right:14px;z-index:1000;width:48px;height:48px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:20px;box-shadow:0 3px 10px rgba(211,47,47,.4);cursor:pointer;display:flex;align-items:center;justify-content:center}
.map-locate{position:absolute;bottom:76px;left:14px;z-index:1000;width:44px;height:44px;border-radius:50%;background:var(--card);border:1.5px solid #ddd;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--primary);box-shadow:0 2px 6px rgba(0,0,0,.1)}
.pin-modal{display:none;position:fixed;bottom:0;left:0;right:0;z-index:2000;background:var(--card);border-radius:16px 16px 0 0;max-height:70vh;flex-direction:column;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.pin-modal.active{display:flex}
.pin-modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e4e6eb;flex-shrink:0}
.pin-modal-hd h3{font-size:16px;font-weight:700}
.pin-modal-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pin-modal-bd{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
.pin-modal-ft{padding:10px 16px;border-top:1px solid #e4e6eb;flex-shrink:0}
.pf{margin-bottom:12px}
.pf label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:3px}
.pf input,.pf textarea,.pf select{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;outline:none}
.pf input:focus,.pf textarea:focus{border-color:var(--primary)}
.pf textarea{resize:vertical;min-height:60px}
.pbtn{display:block;width:100%;padding:11px;border:none;border-radius:10px;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.pbtn:disabled{opacity:.5}
.map-bnav{position:absolute;bottom:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.95);display:flex;align-items:center;border-top:1px solid #e4e6eb;padding:4px 0 max(4px,env(safe-area-inset-bottom));height:56px;backdrop-filter:blur(8px)}
.map-bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:10px;color:#65676b;text-decoration:none;padding:4px 0}
.map-bnav .mnav-item,.map-bnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:#999;padding:4px 0;text-decoration:none;-webkit-tap-highlight-color:transparent}.map-bnav a.active,.map-bnav .mnav-item.active{color:#EE4D2D}.map-bnav a i,.map-bnav .mnav-item i{font-size:20px}.map-bnav a.active i{transform:scale(1.1)}
.map-bnav a i{font-size:20px}
.map-bnav .fab-space{position:relative;width:60px;display:flex;align-items:center;justify-content:center;}
.map-bnav .fab-center{width:46px;height:46px;border-radius:50%;background:#EE4D2D;color:#fff;border:none;display:flex;align-items:center;justify-content:center;font-size:18px;position:absolute;top:50%;left:50%;transform:translate(-50%,-80%);box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer;z-index:10;text-decoration:none;}
.pin-popup{font-size:13px;line-height:1.5;max-width:220px}
.pin-popup strong{font-size:14px;display:block;margin-bottom:4px}
.pin-popup .pin-user{font-size:11px;color:var(--text2);margin-top:6px}
.pin-type-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;margin-bottom:4px}

.ask-fab{position:absolute;bottom:130px;right:14px;z-index:1000;width:52px;height:52px;border-radius:50%;background:#1976d2;color:#fff;border:none;font-size:22px;box-shadow:0 3px 10px rgba(25,118,210,.4);cursor:pointer;display:flex;align-items:center;justify-content:center}
.ask-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:flex-end;justify-content:center}
.ask-overlay.open{display:flex}
.ask-modal{background:#fff;width:100%;max-width:500px;max-height:90vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.ask-overlay.open .ask-modal{transform:translateY(0)}
.ask-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #e4e6eb}
.ask-head h3{flex:1;font-size:16px;font-weight:700;margin:0}
.ask-close{background:#e4e6eb;border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ask-body{padding:16px;overflow-y:auto;flex:1}
.ask-field{margin-bottom:14px}
.ask-field label{display:block;font-size:13px;font-weight:600;color:#65676B;margin-bottom:4px}
.ask-field input,.ask-field select,.ask-field textarea{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;font-family:inherit;outline:none}
.ask-field input:focus,.ask-field select:focus,.ask-field textarea:focus{border-color:#1976d2}
.ask-field textarea{min-height:80px;resize:none}
.ask-foot{padding:12px 16px;border-top:1px solid #e4e6eb}
.ask-submit{width:100%;padding:12px;background:#1976d2;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.ask-submit:disabled{opacity:.5}
.ask-info{background:#e3f2fd;border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;color:#1565c0;line-height:1.5}
</style>
</head>
<body>

<div id="map"></div>

<!-- HEADER -->
<div class="map-hd">
<a href="index.html" class="map-btn"><i class="fas fa-arrow-left"></i></a>
<h1><i class="fas fa-map-marked-alt"></i> Bản đồ</h1>
<div class="map-search"><i class="fas fa-search"></i><input type="text" id="mapSearch" placeholder="Tìm địa điểm..." onkeypress="if(event.key==='Enter')searchLocation()"></div>
</div>

<!-- FILTERS -->
<div class="map-filters">
<div class="map-filter active" onclick="filterPins('',this)"><i class="fas fa-layer-group"></i> Tất cả</div>
<div class="map-filter" onclick="filterPins('delivery',this)">📦 Giao hàng</div>
<div class="map-filter" onclick="filterPins('warning',this)">⚠️ Cảnh báo</div>
<div class="map-filter" onclick="filterPins('note',this)">📝 Ghi chú</div>
<div class="map-filter" onclick="filterPins('favorite',this)">⭐ Yêu thích</div>
</div>

<!-- LOCATE ME -->

<!-- ASK LOCATION -->
<button class="ask-fab" onclick="openAskLocation()" title="Hỏi địa chỉ"><i class="fas fa-question"></i></button>
<button class="map-locate" onclick="locateMe()"><i class="fas fa-crosshairs"></i></button>

<!-- ADD PIN FAB -->
<button class="map-fab" onclick="startAddPin()"><i class="fas fa-map-pin"></i></button>

<!-- ADD PIN MODAL -->
<div class="pin-modal" id="pinModal">
<div class="pin-modal-hd"><h3>📌 Thêm ghim mới</h3><button class="pin-modal-close" onclick="closePinModal()"><i class="fas fa-times"></i></button></div>
<div class="pin-modal-bd">
<div id="pinCoords" style="font-size:12px;color:var(--text2);margin-bottom:10px;padding:6px 10px;background:var(--bg);border-radius:8px"><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> <span id="pinLatLng">Đang lấy tọa độ...</span></div>
<div class="pf"><label>Loại ghim</label>
<select id="pinType"><option value="delivery">📦 Giao hàng</option><option value="warning">⚠️ Cảnh báo</option><option value="note" selected>📝 Ghi chú</option><option value="favorite">⭐ Yêu thích</option></select></div>
<div class="pf"><label>Tiêu đề *</label><input type="text" id="pinTitle" placeholder="VD: Nhà khách KT quen, tầng 3"></div>
<div class="pf"><label>Mô tả chi tiết</label><textarea id="pinDesc" placeholder="VD: Giao buổi sáng, gọi trước 15p, cổng sau..." rows="3"></textarea></div>
<div class="pf"><label>Địa chỉ</label><input type="text" id="pinAddress" placeholder="Số nhà, đường, phường..."></div>
</div>
<div class="pin-modal-ft"><button class="pbtn" id="pinSubmit" onclick="savePin()">Lưu ghim</button></div>
</div>

<!-- BOTTOM NAV -->
<nav class="map-bnav">
<a href="index.html"><i class="fas fa-home"></i><span>Trang chủ</span></a>
<a href="marketplace.html"><i class="fas fa-store"></i><span>Mua sắm</span></a>
<div class="fab-space"><a href="javascript:void(0)" class="fab-center" onclick="handleFab()"><i class="fas fa-camera"></i></a></div>
<a href="map.html" class="active"><i class="fas fa-map-marked-alt"></i><span>Bản đồ</span></a>
<a href="profile.html"><i class="fas fa-user"></i><span>Tài khoản</span></a>
</nav>

<script>
var token=localStorage.getItem("token")||"";
var user=JSON.parse(localStorage.getItem("user")||"null");
var map,markers=[],addingPin=false,tempMarker=null,currentFilter="";
var pinLat=0,pinLng=0;

// Pin type config
var pinConfig={
    delivery:{color:"#2196f3",icon:"📦",label:"Giao hàng"},
    warning:{color:"#ff9800",icon:"⚠️",label:"Cảnh báo"},
    note:{color:"#4caf50",icon:"📝",label:"Ghi chú"},
    favorite:{color:"#ffc107",icon:"⭐",label:"Yêu thích"}
};

// INIT MAP
function initMap(){
    map=L.map("map",{zoomControl:false}).setView([21.0285,105.8542],13);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);
    L.control.zoom({position:"bottomright"}).addTo(map);
    
    // Click to add pin
    map.on("click",function(e){
        if(!addingPin)return;
        pinLat=e.latlng.lat;pinLng=e.latlng.lng;
        if(tempMarker)map.removeLayer(tempMarker);
        tempMarker=L.marker([pinLat,pinLng],{draggable:true}).addTo(map);
        tempMarker.on("dragend",function(ev){pinLat=ev.target.getLatLng().lat;pinLng=ev.target.getLatLng().lng;document.getElementById("pinLatLng").textContent=pinLat.toFixed(5)+", "+pinLng.toFixed(5);reverseGeocode(pinLat,pinLng);});
        document.getElementById("pinLatLng").textContent=pinLat.toFixed(5)+", "+pinLng.toFixed(5);
        reverseGeocode(pinLat,pinLng);
        document.getElementById("pinModal").classList.add("active");
        addingPin=false;
        map.getContainer().style.cursor="";
    });

    loadPins();
    locateMe();
}

// LOCATE ME
function locateMe(){
    if(!navigator.geolocation){alert("Trình duyệt không hỗ trợ GPS");return;}
    navigator.geolocation.getCurrentPosition(function(pos){
        map.setView([pos.coords.latitude,pos.coords.longitude],15);
        L.circle([pos.coords.latitude,pos.coords.longitude],{radius:50,color:"#d32f2f",fillOpacity:.15,weight:2}).addTo(map);
        L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map).bindPopup("<strong>📍 Vị trí của bạn</strong>").openPopup();
    },function(err){
        console.log("GPS error:",err.message);
    },{enableHighAccuracy:true,timeout:10000});
}

// LOAD PINS
async function loadPins(){
    var url="/api/map-pins.php";
    if(currentFilter)url+="?type="+currentFilter;
    try{
        var r=await fetch(url);var d=await r.json();
        if(d.success){
            // Clear old markers
            markers.forEach(function(m){map.removeLayer(m)});
            markers=[];
            d.data.forEach(function(pin){
                var cfg=pinConfig[pin.pin_type]||pinConfig.note;
                var icon=L.divIcon({html:'<div style="font-size:24px;text-shadow:0 2px 4px rgba(0,0,0,.3)">'+cfg.icon+'</div>',className:"",iconSize:[30,30],iconAnchor:[15,15]});
                var m=L.marker([pin.lat,pin.lng],{icon:icon}).addTo(map);
                var badge='<span class="pin-type-badge" style="background:'+cfg.color+'20;color:'+cfg.color+'">'+cfg.icon+" "+cfg.label+'</span>';
                var popup='<div class="pin-popup">'+badge+'<strong>'+esc(pin.title)+'</strong>';
                if(pin.description)popup+='<div style="margin-top:4px">'+esc(pin.description)+'</div>';
                if(pin.address)popup+='<div style="margin-top:4px;font-size:12px;color:#666"><i class="fas fa-map-marker-alt"></i> '+esc(pin.address)+'</div>';
                popup+='<div class="pin-user">👤 '+esc(pin.user_name||"User")+' · '+timeAgo(pin.created_at)+'</div>';
                if(user&&parseInt(pin.user_id)===user.id)popup+='<button onclick="deletePin('+pin.id+')" style="margin-top:6px;padding:4px 10px;background:#f44;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer">Xóa</button>';
                popup+='</div>';
                m.bindPopup(popup);
                markers.push(m);
            });
        }
    }catch(e){console.error("Load pins error:",e);}
}

function filterPins(type,el){
    currentFilter=type;
    document.querySelectorAll(".map-filter").forEach(function(f){f.classList.remove("active")});
    el.classList.add("active");
    loadPins();
}

// ADD PIN
function startAddPin(){
    if(!user||!token){alert("Đăng nhập để thêm ghim");window.location="login.html";return;}
    addingPin=true;
    map.getContainer().style.cursor="crosshair";
    alert("👆 Chạm vào bản đồ để đặt ghim");
}

function closePinModal(){
    document.getElementById("pinModal").classList.remove("active");
    if(tempMarker){map.removeLayer(tempMarker);tempMarker=null;}
}

async function savePin(){
    var title=document.getElementById("pinTitle").value.trim();
    if(!title){alert("Nhập tiêu đề");return;}
    if(!pinLat||!pinLng){alert("Chọn vị trí trên bản đồ");return;}
    var btn=document.getElementById("pinSubmit");
    btn.disabled=true;btn.textContent="Đang lưu...";
    try{
        var r=await fetch("/api/map-pins.php",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},body:JSON.stringify({lat:pinLat,lng:pinLng,title:title,description:document.getElementById("pinDesc").value.trim(),pin_type:document.getElementById("pinType").value,address:document.getElementById("pinAddress").value.trim()})});
        var d=await r.json();
        if(d.success){
            alert("✅ Đã thêm ghim!");closePinModal();
            document.getElementById("pinTitle").value="";document.getElementById("pinDesc").value="";document.getElementById("pinAddress").value="";
            loadPins();
        }else{alert("❌ "+(d.message||"Lỗi"));}
    }catch(e){alert("Lỗi kết nối");}
    btn.disabled=false;btn.textContent="Lưu ghim";
}

async function deletePin(id){
    if(!confirm("Xóa ghim này?"))return;
    try{
        await fetch("/api/map-pins.php?id="+id,{method:"DELETE",headers:{"Authorization":"Bearer "+token}});
        loadPins();
    }catch(e){alert("Lỗi");}
}

// SEARCH
async function searchLocation(){
    var q=document.getElementById("mapSearch").value.trim();
    if(!q)return;
    try{
        var r=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(q)+"&countrycodes=vn&limit=1");
        var d=await r.json();
        if(d.length>0){map.setView([d[0].lat,d[0].lon],16);}
        else{alert("Không tìm thấy: "+q);}
    }catch(e){alert("Lỗi tìm kiếm");}
}

// REVERSE GEOCODE
async function reverseGeocode(lat,lng){
    try{
        var r=await fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&zoom=18");
        var d=await r.json();
        if(d.display_name){document.getElementById("pinAddress").value=d.display_name.split(",").slice(0,4).join(",");}
    }catch(e){}
}

function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function timeAgo(d){if(!d)return"";var s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return"vừa xong";if(s<3600)return Math.floor(s/60)+" phút";if(s<86400)return Math.floor(s/3600)+" giờ";return Math.floor(s/86400)+" ngày";}

// INIT
document.addEventListener("DOMContentLoaded",initMap);
</script>
<script src="js/post-modal.js"></script>
<!-- ASK LOCATION MODAL -->
<div class="ask-overlay" id="askOverlay" onclick="if(event.target===this)closeAskLocation()">
<div class="ask-modal">
  <div class="ask-head">
    <h3><i class="fas fa-question-circle" style="color:#1976d2;margin-right:8px"></i>Hỏi địa chỉ</h3>
    <button class="ask-close" onclick="closeAskLocation()"><i class="fas fa-times"></i></button>
  </div>
  <div class="ask-body">
    <div class="ask-info"><i class="fas fa-info-circle"></i> Bài hỏi sẽ được đăng lên feed của shipper cùng khu vực để giúp bạn tìm địa chỉ.</div>
    <div class="ask-field">
      <label>Tên địa điểm cần tìm *</label>
      <input type="text" id="askPlace" placeholder="VD: Nhà bàn Lan, quán phở Hùng...">
    </div>
    <div class="ask-field">
      <label>Tỉnh/Thành phố *</label>
      <select id="askProvince" onchange="loadDistricts()"><option value="">-- Chọn tỉnh --</option></select>
    </div>
    <div class="ask-field">
      <label>Quận/Huyện</label>
      <select id="askDistrict" onchange="loadWards()"><option value="">-- Chọn quận/huyện --</option></select>
    </div>
    <div class="ask-field">
      <label>Xã/Phường</label>
      <select id="askWard"><option value="">-- Chọn xã/phường --</option></select>
    </div>
    <div class="ask-field">
      <label>Mô tả thêm</label>
      <textarea id="askDesc" placeholder="Mô tả thêm đặc điểm, gần đâu, màu sơn nhà..."></textarea>
    </div>
  </div>
  <div class="ask-foot">
    <button class="ask-submit" id="askSubmit" onclick="submitAskLocation()"><i class="fas fa-paper-plane" style="margin-right:6px"></i>Đăng hỏi</button>
  </div>
</div>
</div>

<script>
// === ASK LOCATION ===
var askProvinces=[], askDistricts=[], askWards=[];

function openAskLocation(){
  var CU2=JSON.parse(localStorage.getItem("user")||"null");
  if(!CU2){alert("Vui l\u00f2ng \u0111\u0103ng nh\u1eadp!");location.href="login.html";return;}
  document.getElementById("askOverlay").classList.add("open");
  if(askProvinces.length===0) loadProvinces();
}

function closeAskLocation(){
  document.getElementById("askOverlay").classList.remove("open");
}

async function loadProvinces(){
  try{
    var r=await fetch("https://provinces.open-api.vn/api/?depth=1");
    askProvinces=await r.json();
    var sel=document.getElementById("askProvince");
    sel.innerHTML='<option value="">-- Ch\u1ECDn t\u1EC9nh --</option>';
    askProvinces.forEach(function(p){
      sel.innerHTML+='<option value="'+p.code+'">'+p.name+'</option>';
    });
  }catch(e){console.log("Province API error",e);}
}

async function loadDistricts(){
  var code=document.getElementById("askProvince").value;
  var sel=document.getElementById("askDistrict");
  var wSel=document.getElementById("askWard");
  sel.innerHTML='<option value="">-- Ch\u1ECDn qu\u1EADn/huy\u1EC7n --</option>';
  wSel.innerHTML='<option value="">-- Ch\u1ECDn x\u00e3/ph\u01b0\u1EDDng --</option>';
  if(!code)return;
  try{
    var r=await fetch("https://provinces.open-api.vn/api/p/"+code+"?depth=2");
    var d=await r.json();
    askDistricts=d.districts||[];
    askDistricts.forEach(function(dist){
      sel.innerHTML+='<option value="'+dist.code+'">'+dist.name+'</option>';
    });
  }catch(e){}
}

async function loadWards(){
  var code=document.getElementById("askDistrict").value;
  var sel=document.getElementById("askWard");
  sel.innerHTML='<option value="">-- Ch\u1ECDn x\u00e3/ph\u01b0\u1EDDng --</option>';
  if(!code)return;
  try{
    var r=await fetch("https://provinces.open-api.vn/api/d/"+code+"?depth=2");
    var d=await r.json();
    askWards=d.wards||[];
    askWards.forEach(function(w){
      sel.innerHTML+='<option value="'+w.code+'">'+w.name+'</option>';
    });
  }catch(e){}
}

async function submitAskLocation(){
  var place=document.getElementById("askPlace").value.trim();
  if(!place){alert("Nh\u1EADp t\u00ean \u0111\u1ECBa \u0111i\u1EC3m!");return;}
  
  var provSel=document.getElementById("askProvince");
  var distSel=document.getElementById("askDistrict");
  var wardSel=document.getElementById("askWard");
  var provName=provSel.options[provSel.selectedIndex]?provSel.options[provSel.selectedIndex].text:"";
  var distName=distSel.options[distSel.selectedIndex]?distSel.options[distSel.selectedIndex].text:"";
  var wardName=wardSel.options[wardSel.selectedIndex]?wardSel.options[wardSel.selectedIndex].text:"";
  var desc=document.getElementById("askDesc").value.trim();
  
  if(!provSel.value){alert("Ch\u1ECDn t\u1EC9nh/th\u00e0nh ph\u1ED1!");return;}
  
  // Build content
  var location_parts=[];
  if(wardName&&wardName.indexOf("--")===-1) location_parts.push(wardName);
  if(distName&&distName.indexOf("--")===-1) location_parts.push(distName);
  if(provName&&provName.indexOf("--")===-1) location_parts.push(provName);
  var locationStr=location_parts.join(", ");
  
  var content="\ud83d\udccd H\u1ECFi \u0111\u1ECBa ch\u1EC9: "+place+"\n\n";
  content+="\ud83d\udccd Khu v\u1ef1c: "+locationStr+"\n";
  if(desc) content+="\n"+desc;
  content+="\n\n#h\u1ECFi\u0111\u1ECBach\u1EC9 #"+provName.replace(/\s+/g,"").toLowerCase();
  
  var btn=document.getElementById("askSubmit");
  btn.disabled=true;btn.textContent="\u0110ang \u0111\u0103ng...";
  
  try{
    var tk=localStorage.getItem("token")||"";
    var fd=new FormData();
    fd.append("content",content);
    fd.append("type","question");
    
    var hdrs={};
    if(tk) hdrs["Authorization"]="Bearer "+tk;
    
    var r=await fetch("/api/posts.php",{method:"POST",headers:hdrs,credentials:"include",body:fd});
    var d=await r.json();
    if(d.success){
      alert("\u2705 \u0110\u00e3 \u0111\u0103ng b\u00e0i h\u1ECFi \u0111\u1ECBa ch\u1EC9! Shipper c\u00f9ng khu v\u1ef1c s\u1ebd gi\u00fap b\u1ea1n.");
      closeAskLocation();
      document.getElementById("askPlace").value="";
      document.getElementById("askDesc").value="";
    }else{
      alert("L\u1ed7i: "+(d.message||"Kh\u00f4ng \u0111\u0103ng \u0111\u01b0\u1ee3c"));
    }
  }catch(e){alert("L\u1ed7i k\u1ebft n\u1ed1i");}
  btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane" style="margin-right:6px"></i>\u0110\u0103ng h\u1ECFi';
}
</script>

</body>
