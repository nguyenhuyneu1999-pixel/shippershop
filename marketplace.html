<script>
// Auto-inject Bearer token on ALL fetch calls to /api/
(function(){var of=window.fetch;window.fetch=function(url,opts){opts=opts||{};if(typeof url==='string'&&url.indexOf('/api/')>-1){opts.headers=opts.headers||{};var tk=localStorage.getItem('token');if(tk&&!opts.headers['Authorization']&&!opts.headers['authorization']){opts.headers['Authorization']='Bearer '+tk;}}return of.call(this,url,opts);};})();
</script>


<!-- HEADER -->
<div class="mk-header">
    <h1><i class="fas fa-store"></i> Chợ</h1>
    <div class="mk-search">
        <i class="fas fa-search"></i>
        <input type="text" id="mkSearch" placeholder="Tìm kiếm trên Chợ" oninput="debounceSearch()">
    </div>
    <a href="cart.html" class="mk-header-btn" style="position:relative;text-decoration:none"><i class="fas fa-shopping-cart"></i><span id="mkCartBadge" style="position:absolute;top:-2px;right:-2px;background:#7C3AED;color:#fff;font-size:9px;min-width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700"></span></a>
</div>

<!-- CATEGORIES -->
<div class="mk-cats" id="mkCats">
    <div class="mk-cat active" onclick="filterCat('',this)"><i class="fas fa-fire"></i>Tất cả</div>
    <div class="mk-cat" onclick="filterCat('xe-co',this)"><i class="fas fa-motorcycle"></i>Xe cộ</div>
    <div class="mk-cat" onclick="filterCat('dien-thoai',this)"><i class="fas fa-mobile-alt"></i>Điện thoại</div>
    <div class="mk-cat" onclick="filterCat('dien-tu',this)"><i class="fas fa-laptop"></i>Đồ điện tử</div>
    <div class="mk-cat" onclick="filterCat('thoi-trang-nu',this)"><i class="fas fa-female"></i>Thời trang nữ</div>
    <div class="mk-cat" onclick="filterCat('thoi-trang-nam',this)"><i class="fas fa-male"></i>Thời trang nam</div>
    <div class="mk-cat" onclick="filterCat('noi-that',this)"><i class="fas fa-couch"></i>Nội thất</div>
    <div class="mk-cat" onclick="filterCat('gia-dung',this)"><i class="fas fa-blender"></i>Gia dụng</div>
    <div class="mk-cat" onclick="filterCat('the-thao',this)"><i class="fas fa-futbol"></i>Thể thao</div>
    <div class="mk-cat" onclick="filterCat('sach',this)"><i class="fas fa-book"></i>Sách</div>
    <div class="mk-cat" onclick="filterCat('nha-dat',this)"><i class="fas fa-house"></i>Nhà đất</div>
    <div class="mk-cat" onclick="filterCat('khac',this)"><i class="fas fa-ellipsis-h"></i>Khác</div>
</div>

<!-- LISTING GRID -->
<div class="mk-grid" id="mkGrid"></div>
<div id="mkMore" style="text-align:center;padding:16px;display:none">
    <button class="mk-btn" style="max-width:200px;margin:0 auto;background:var(--bg);color:var(--text)" onclick="loadMore()">Xem thêm</button>
</div>

<!-- CREATE MODAL -->
<div class="mk-overlay" id="createOverlay" onclick="closeCreate()"></div>
<div class="mk-modal" id="createModal">
    <div class="mk-modal-header">
        <h2>Đăng tin bán</h2>
        <button class="mk-modal-close" onclick="closeCreate()"><i class="fas fa-times"></i></button>
    </div>
    <div class="mk-modal-body">
        <div class="mk-field">
            <label>Ảnh sản phẩm (tối đa 10)</label>
            <div class="mk-images" id="imgPreviews">
                <label class="mk-img-add" id="imgAddBtn">
                    <i class="fas fa-camera"></i>
                    <span>Thêm ảnh</span>
                    <input type="file" accept="image/*" multiple style="display:none" onchange="handleImgUpload(this)">
                </label>
            </div>
        </div>
        <div class="mk-field">
            <label>Video sản phẩm (tùy chọn)</label>
            <div style="display:flex;gap:8px;align-items:center">
                <label style="flex:1;padding:12px;border:2px dashed #ccc;border-radius:10px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px" id="videoAddBtn">
                    <i class="fas fa-video" style="font-size:20px;display:block;margin-bottom:4px"></i>
                    <span id="videoLabel">Chọn video (MP4, tối đa 50MB)</span>
                    <input type="file" accept="video/mp4,video/mov,video/webm" style="display:none" onchange="handleVideoSelect(this)">
                </label>
            </div>
            <div id="videoPreview" style="display:none;margin-top:8px;position:relative">
                <video id="videoPreviewPlayer" style="width:100%;max-height:200px;border-radius:8px" controls></video>
                <button onclick="removeVideo()" style="position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:#333;color:#fff;border:none;font-size:12px;cursor:pointer"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="mk-field">
            <label>Tiêu đề *</label>
            <input type="text" id="cTitle" placeholder="VD: iPhone 14 Pro Max 256GB" maxlength="200">
        </div>
        <div class="mk-field">
            <label>Giá (VNĐ) *</label>
            <input type="number" id="cPrice" placeholder="0 = Miễn phí / Tặng" min="0">
        </div>
        <div class="mk-field">
            <label>Danh mục</label>
            <select id="cCategory">
                <option value="dien-thoai">Điện thoại & Tablet</option>
                <option value="dien-tu">Đồ điện tử / Laptop</option>
                <option value="xe-co">Xe cộ</option>
                <option value="thoi-trang-nu">Thời trang nữ</option>
                <option value="thoi-trang-nam">Thời trang nam</option>
                <option value="noi-that">Đồ nội thất</option>
                <option value="gia-dung">Đồ gia dụng</option>
                <option value="the-thao">Thể thao & Giải trí</option>
                <option value="sach">Sách & Học liệu</option>
                <option value="nha-dat">Nhà đất / Cho thuê</option>
                <option value="khac">Khác</option>
            </select>
        </div>
        <div class="mk-field">
            <label>Tình trạng</label>
            <select id="cCondition">
                <option value="new">Mới 100%</option>
                <option value="like_new">Như mới (99%)</option>
                <option value="good" selected>Tốt (đã dùng)</option>
                <option value="fair">Khá (có vết)</option>
            </select>
        </div>
        <div class="mk-field">
            <label>Mô tả</label>
            <textarea id="cDesc" placeholder="Mô tả chi tiết sản phẩm, lý do bán..." rows="4"></textarea>
        </div>
        <div class="mk-field">
            <label><i class="fas fa-images" style="color:var(--primary);margin-right:4px"></i> Ảnh chi tiết sản phẩm (giống Amazon)</label>
            <p style="font-size:12px;color:#65676B;margin:0 0 8px">Ảnh hiện full màn hình khi cuộn trang. Upload banner, ảnh tính năng, so sánh...</p>
            <div class="mk-images" id="showcaseImgPreviews">
                <label class="mk-img-add" id="showcaseImgAddBtn">
                    <i class="fas fa-plus-circle" style="font-size:24px;color:var(--primary)"></i>
                    <span>Thêm ảnh</span>
                    <input type="file" accept="image/*" multiple style="display:none" onchange="handleShowcaseImgUpload(this)">
                </label>
            </div>
        </div>
        <div class="mk-field">
            <label>Địa điểm</label>
            <input type="text" id="cLocation" placeholder="VD: Quận 1, TP.HCM">
        </div>
        <div class="mk-field">
            <label>Số điện thoại liên hệ</label>
            <input type="tel" id="cPhone" placeholder="0xxx xxx xxx">
        </div>
    </div>
    <div class="mk-modal-footer">
        <button class="mk-btn mk-btn-primary" id="cSubmit" onclick="submitListing()">Đăng tin</button>
    </div>
</div>
