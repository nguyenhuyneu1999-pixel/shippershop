<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ngoại tuyến - ShipperShop</title>
<style>
body{margin:0;font-family:'Be Vietnam Pro',sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#333}
.box{text-align:center;padding:40px;max-width:340px}
.icon{font-size:48px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;margin:0 0 8px}
p{font-size:14px;color:#65676B;margin:0 0 24px}
.retry{padding:12px 32px;background:#7C3AED;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.retry:active{background:#5B21B6}
</style>
</head>
<body>
<div class="box">
<div class="icon">📡</div>
<h2>Mất kết nối mạng</h2>
<p>Kiểm tra kết nối internet và thử lại. Một số nội dung đã lưu có thể vẫn xem được.</p>
<button class="retry" onclick="location.reload()">Thử lại</button>
</div>
</body>
</html>
