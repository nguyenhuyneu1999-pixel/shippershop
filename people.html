<style>
:root{--primary:#7C3AED;--bg:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f0f2f5;font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--text);padding-bottom:80px;}
.page-head{background:#fff;position:sticky;top:0;z-index:100;padding:12px 16px;border-bottom:1px solid var(--border);}
.page-head h1{font-size:24px;font-weight:800;margin-bottom:2px;}
.search-bar{margin-top:10px;position:relative;}
.search-bar input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--border);border-radius:24px;font-size:14px;background:#f0f2f5;outline:none;}
.search-bar input:focus{border-color:var(--primary);background:#fff;}
.search-bar i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:76px;z-index:50;}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.section-title{padding:14px 16px 8px;font-weight:700;font-size:14px;color:var(--muted);background:#f0f2f5;display:flex;align-items:center;gap:6px;}
.person-item{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#fff;border-bottom:1px solid #f5f5f5;cursor:pointer;}
.person-item:hover{background:#fafafa;}
.p-av-wrap{position:relative;flex-shrink:0;}
.p-av{width:52px;height:52px;border-radius:50%;object-fit:cover;}
.p-online{position:absolute;bottom:2px;right:2px;width:14px;height:14px;border-radius:50%;background:#22c55e;border:3px solid #fff;}
.p-info{flex:1;min-width:0;}
.p-name{font-size:15px;font-weight:600;margin-bottom:2px;}
.p-sub{font-size:13px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-btn{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.p-btn.primary{background:var(--primary);color:#fff;}
.p-btn.secondary{background:#e4e6eb;color:var(--text);}
.req-actions{display:flex;gap:6px;}
.stories-bar{display:flex;gap:12px;padding:14px 16px;background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.stories-bar::-webkit-scrollbar{display:none;}
.story-av{position:relative;flex-shrink:0;text-align:center;cursor:pointer;}
.story-av img,.story-av>div:first-child{width:60px;height:60px;border-radius:50%;object-fit:cover;border:3px solid var(--primary);}
.story-av .online{position:absolute;bottom:14px;right:0;width:14px;height:14px;border-radius:50%;background:#22c55e;border:3px solid #fff;}
.story-name{font-size:11px;margin-top:4px;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty i{font-size:36px;display:block;margin-bottom:8px;color:#ddd;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:3000;opacity:0;transition:.3s;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.mnav-fab-wrap{overflow:visible!important;position:relative!important;}.mnav-fab{width:46px!important;height:46px!important;font-size:18px!important;margin-top:-16px!important;cursor:pointer!important;position:relative!important;z-index:1001!important;border-radius:50%!important;background:#7C3AED!important;color:#fff!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 2px 8px rgba(0,0,0,.2)!important;}
@media(min-width:769px){
  body{background:#f0f2f5;padding-bottom:0}
  #mobileBottomNav{display:none!important}
  .container,.people-wrap,.main-content,.content{max-width:900px;margin:0 auto}
  .friend-card,.user-card{border-radius:8px;border:1px solid #e4e6eb}
}
</style>
<link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="ShipperShop"></head>

<script>
// Auto-inject Bearer token on ALL fetch calls to /api/
(function(){var of=window.fetch;window.fetch=function(url,opts){opts=opts||{};if(typeof url==='string'&&url.indexOf('/api/')>-1){opts.headers=opts.headers||{};var tk=localStorage.getItem('token');if(tk&&!opts.headers['Authorization']&&!opts.headers['authorization']){opts.headers['Authorization']='Bearer '+tk;}}return of.call(this,url,opts);};})();
</script>

<div class="page-head"><h1>Mọi người</h1><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Tìm bạn bè..." oninput="filterPeople()"></div></div>
<div class="tabs"><div class="tab active" onclick="setTab('online',this)">Đang online</div><div class="tab" onclick="setTab('all',this)">Tất cả</div><div class="tab" onclick="setTab('requests',this)">Lời mời <span id="reqBadge" style="display:none;background:var(--primary);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;margin-left:4px"></span></div></div>
<div id="storiesBar" class="stories-bar" style="display:none"></div>
<div id="content"></div>
<div class="toast" id="toast"></div>
<script src="js/reddit-mkpost-1773927135.js"></script>
<script src="js/mobile.js"></script>
<script>
var CU=JSON.parse(localStorage.getItem('user')||'null');if(!CU)location.href='login.html';
var allFriends=[],allRequests=[],allSuggestions=[],curTab='online';
var shipColors={'GHTK':'#00b14f','J&T':'#d32f2f','GHN':'#ff6600','SPX':'#7C3AED','Grab':'#00b14f','Be':'#5bc500','Gojek':'#00aa13','Ninja Van':'#c41230','Viettel Post':'#e21a1a'};
async function loadAll(){await Promise.all([loadFriends(),loadRequests(),loadSuggestions()]);renderTab();}
async function loadFriends(){try{var r=await fetch('/api/friends.php?action=list',{credentials:'include'});var d=await r.json();if(d.success)allFriends=d.data;}catch(e){}}
async function loadRequests(){try{var r=await fetch('/api/friends.php?action=requests',{credentials:'include'});var d=await r.json();if(d.success){allRequests=d.data;var b=document.getElementById('reqBadge');if(allRequests.length>0){b.style.display='inline';b.textContent=allRequests.length;}}}catch(e){}}
async function loadSuggestions(){try{var r=await fetch('/api/friends.php?action=suggestions',{credentials:'include'});var d=await r.json();if(d.success)allSuggestions=d.data;}catch(e){}}
function setTab(tab,el){curTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');renderTab();}
function renderTab(){var c=document.getElementById('content');var search=document.getElementById('searchInput').value.toLowerCase();
if(curTab==='online'){var online=allFriends.filter(function(f){return f.is_online&&(!search||f.fullname.toLowerCase().indexOf(search)>-1);});var offline=allFriends.filter(function(f){return !f.is_online&&(!search||f.fullname.toLowerCase().indexOf(search)>-1);});
if(online.length){document.getElementById('storiesBar').style.display='flex';document.getElementById('storiesBar').innerHTML=online.map(function(f){var av=f.avatar?'<img src="'+f.avatar+'" loading="lazy">':'<div style="background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;width:60px;height:60px;border-radius:50%">'+((f.fullname||'U').charAt(0))+'</div>';return '<div class="story-av" onclick="location.href=\'messages.html?user='+f.id+'\'">'+av+'<div class="online"></div><div class="story-name">'+esc((f.fullname||'').split(' ').pop())+'</div></div>';}).join('');}else document.getElementById('storiesBar').style.display='none';
var html='';if(online.length){html+='<div class="section-title"><span style="color:#22c55e">●</span> '+online.length+' đang hoạt động</div>';html+=online.map(function(f){return mkPerson(f,true);}).join('');}if(offline.length){html+='<div class="section-title">Ngoại tuyến</div>';html+=offline.map(function(f){return mkPerson(f,false);}).join('');}if(!online.length&&!offline.length)html='<div class="empty"><i class="fas fa-users"></i><p>Chưa có bạn bè</p></div>';c.innerHTML=html;}
if(curTab==='all'){document.getElementById('storiesBar').style.display='none';var friends=allFriends.filter(function(f){return !search||f.fullname.toLowerCase().indexOf(search)>-1;});var html='';if(friends.length){html+='<div class="section-title"><i class="fas fa-user-check"></i> Bạn bè ('+friends.length+')</div>';html+=friends.map(function(f){return mkPerson(f,f.is_online);}).join('');}if(allSuggestions.length){html+='<div class="section-title"><i class="fas fa-user-plus"></i> Gợi ý kết bạn</div>';html+=allSuggestions.filter(function(f){return !search||f.fullname.toLowerCase().indexOf(search)>-1;}).map(function(f){return mkSuggestion(f);}).join('');}if(!html)html='<div class="empty"><i class="fas fa-users"></i><p>Không tìm thấy</p></div>';c.innerHTML=html;}
if(curTab==='requests'){document.getElementById('storiesBar').style.display='none';if(!allRequests.length){c.innerHTML='<div class="empty"><i class="fas fa-user-clock"></i><p>Không có lời mời</p></div>';return;}c.innerHTML='<div class="section-title"><i class="fas fa-user-clock"></i> Lời mời ('+allRequests.length+')</div>'+allRequests.map(function(r){return mkRequest(r);}).join('');}}
function mkPerson(f,online){var av=f.avatar?'<img src="'+f.avatar+'" class="p-av" loading="lazy">':'<div class="p-av" style="background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">'+((f.fullname||'U').charAt(0))+'</div>';var ship=f.shipping_company?'<span style="color:'+(shipColors[f.shipping_company]||'#999')+'"> '+esc(f.shipping_company)+'</span>':'';var sub=online?'<span style="color:#22c55e">Đang hoạt động</span>':f.last_active?'Hoạt động '+ago(f.last_active):'';return '<div class="person-item" onclick="location.href=\'user.html?id='+f.id+'\'"><div class="p-av-wrap">'+av+(online?'<div class="p-online"></div>':'')+'</div><div class="p-info"><div class="p-name">'+esc(f.fullname)+ship+'</div><div class="p-sub">'+sub+'</div></div><div><button class="p-btn secondary" onclick="event.stopPropagation();location.href=\'messages.html?user='+f.id+'\'"><i class="fas fa-comment-dots"></i></button></div></div>';}
function mkSuggestion(f){var av=f.avatar?'<img src="'+f.avatar+'" class="p-av" loading="lazy">':'<div class="p-av" style="background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">'+((f.fullname||'U').charAt(0))+'</div>';return '<div class="person-item" onclick="location.href=\'user.html?id='+f.id+'\'"><div class="p-av-wrap">'+av+'</div><div class="p-info"><div class="p-name">'+esc(f.fullname)+'</div><div class="p-sub">'+esc(f.shipping_company||'')+'</div></div><div><button class="p-btn primary" onclick="event.stopPropagation();addFriend('+f.id+',this)"><i class="fas fa-user-plus"></i> Kết bạn</button></div></div>';}
function mkRequest(r){var av=r.avatar?'<img src="'+r.avatar+'" class="p-av" loading="lazy">':'<div class="p-av" style="background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px">'+((r.fullname||'U').charAt(0))+'</div>';return '<div class="person-item"><div class="p-av-wrap">'+av+'</div><div class="p-info"><div class="p-name">'+esc(r.fullname)+'</div><div class="p-sub">'+esc(r.shipping_company||'')+' · '+ago(r.created_at)+'</div></div><div class="req-actions"><button class="p-btn primary" onclick="acceptFriend('+r.id+',this.parentElement.parentElement)">Chấp nhận</button><button class="p-btn secondary" onclick="rejectFriend('+r.id+',this.parentElement.parentElement)">Từ chối</button></div></div>';}
async function addFriend(id,btn){try{var r=await fetch('/api/friends.php?action=add',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({friend_id:id})});var d=await r.json();if(d.success){btn.outerHTML='<button class="p-btn secondary" disabled>Đã gửi</button>';toast('Đã gửi lời mời!');}else toast(d.message);}catch(e){toast('Lỗi');}}
async function acceptFriend(id,el){try{var r=await fetch('/api/friends.php?action=accept',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({friend_id:id})});var d=await r.json();if(d.success){el.remove();toast('Đã chấp nhận!');loadAll();}}catch(e){toast('Lỗi');}}
async function rejectFriend(id,el){try{await fetch('/api/friends.php?action=reject',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({friend_id:id})});el.remove();toast('Đã từ chối');}catch(e){toast('Lỗi');}}
function filterPeople(){renderTab();}
function esc(t){if(!t)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function ago(dt){if(!dt)return'';var s=Math.floor((new Date()-new Date(dt.replace(' ','T')))/1000);if(s<60)return'Vừa xong';if(s<3600)return Math.floor(s/60)+' phút trước';if(s<86400)return Math.floor(s/3600)+' giờ trước';return Math.floor(s/86400)+' ngày trước';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(function(){t.classList.remove('show');},2500);}
loadAll();
</script>

  if(typeof SS!=='undefined'&&SS.store&&SS.store.isLoggedIn()&&SS.NotifBell){
