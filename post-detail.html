<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="theme-color" content="#ffffff"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bài viết - ShipperShop</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="mobile.css"><link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'"><noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript><style>:root{--primary:#EE4D2D;--bg:#f0f2f5;--card:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B;}*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding-bottom:60px;animation:slideRight .25s ease-out;}@keyframes slideRight{from{transform:translateX(30%);opacity:0;}to{transform:translateX(0);opacity:1;}}@keyframes slideOut{to{transform:translateX(30%);opacity:0;}}.header{position:fixed;top:0;left:0;right:0;z-index:100;background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}.header-back{background:none;border:none;font-size:22px;cursor:pointer;color:#333;padding:4px;}.header h1{font-size:17px;font-weight:700;flex:1;}.post-wrap{margin-top:52px;background:#fff;overflow:hidden;max-width:100%;}.post-author{display:flex;align-items:center;gap:10px;padding:14px 16px 0;}.post-av{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;}.post-av-ph{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0;}.author-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;}.ship-badge{font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px;}.post-time{font-size:12px;color:var(--muted);margin-top:1px;}.post-content{padding:10px 16px;font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word;}.post-images{display:flex;gap:4px;flex-wrap:wrap;}.post-images img{width:100%;max-height:500px;object-fit:cover;}.post-images.multi img{width:calc(50% - 2px);max-height:300px;}.post-stats{display:flex;padding:0;margin:0;font-size:12px;color:#65676B;width:100%;border:none;align-items:flex-end;}.post-stats span{flex:1;padding:0 4px 2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;min-width:0;}.post-stats span:first-child{text-align:center;}.post-stats span:nth-child(2){text-align:right;}.post-stats span:last-child{text-align:center;}.post-actions{display:flex;border-top:1px solid #e4e6eb;background:#fff;width:100%;box-sizing:border-box;}.act-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 0;border:none;background:#f8f8f8;cursor:pointer;font-size:14px;font-weight:600;color:#555;border-right:1px solid #ddd;gap:6px;min-width:0;overflow:hidden;white-space:nowrap;}.act-btn:last-child{border-right:none;}.act-btn:active{background:#FFF3EF;}.act-btn.liked{background:#FFF3EF;color:#EE4D2D;}.act-btn.liked{color:var(--primary);}.sort-cmt{padding:12px 16px;font-size:14px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:4px;}.cmt-item{display:flex;gap:8px;padding:6px 16px;}.cmt-item.highlight{background:#FFF8E1;border-left:3px solid #FFC107;animation:fadeH 4s ease-out forwards;}@keyframes fadeH{0%,70%{background:#FFF8E1;}100%{background:#fff;}}.cmt-av{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}.cmt-av-ph{width:36px;height:36px;border-radius:50%;background:#e4e6eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}.cmt-body{flex:1;min-width:0;}.cmt-bubble{background:#f0f2f5;border-radius:18px;padding:8px 12px;display:inline-block;max-width:100%;}.cmt-author{font-weight:700;font-size:13px;}.cmt-text{font-size:14px;line-height:1.4;margin-top:2px;}.cmt-meta{display:flex;gap:12px;padding:2px 12px;font-size:12px;color:var(--muted);}.cmt-meta a{color:var(--muted);text-decoration:none;font-weight:600;cursor:pointer;}.cmt-meta a.liked{color:var(--primary);}.replies{margin-top:4px;padding-left:16px;border-left:2px solid var(--border);}.cmt-input{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:50;}.cmt-placeholder-bar{flex:1;padding:10px 16px;border-radius:24px;background:#f0f2f5;color:#65676B;font-size:14px;cursor:pointer;border:none;text-align:left;user-select:none;}.cmt-placeholder-bar:active{background:#e4e6eb;}.pd-cmt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}.pd-cmt-overlay.open{display:flex;}.pd-cmt-modal{background:#fff;width:100%;max-width:500px;border-radius:16px;overflow:hidden;transform:scale(.9);opacity:0;transition:all .2s ease;}.pd-cmt-overlay.open .pd-cmt-modal{transform:scale(1);opacity:1;}.pd-cmt-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #e4e6eb;}.pd-cmt-head span{flex:1;font-size:15px;font-weight:700;}.pd-cmt-x{background:none;border:none;width:32px;height:32px;border-radius:50%;background:#e4e6eb;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;}.pd-cmt-x:hover{background:#d8dadf;}.pd-cmt-body{padding:16px;}.pd-rpl-info{font-size:13px;color:#65676B;margin-bottom:8px;display:none;align-items:center;gap:6px;}.pd-rpl-info.show{display:flex;}.pd-rpl-info .cancel-rpl{background:none;border:none;color:var(--primary);font-weight:700;cursor:pointer;font-size:12px;}.pd-cmt-ta{width:100%;min-height:100px;max-height:200px;border:none;outline:none;font-size:15px;font-family:inherit;resize:none;line-height:1.5;color:#1C1C1C;}.pd-cmt-ta::placeholder{color:#65676B;}.pd-cmt-foot{display:flex;align-items:center;justify-content:flex-end;padding:10px 16px;border-top:1px solid #e4e6eb;}.pd-cmt-send{background:var(--primary);color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer;}.pd-cmt-send:disabled{opacity:.5;cursor:not-allowed;}.pd-cmt-send:hover:not(:disabled){background:#D73211;}@media(max-width:768px){.pd-cmt-modal{max-width:100%;margin:0 8px;border-radius:12px;}}.empty{text-align:center;padding:40px;color:var(--muted);}.spin{animation:sp 1s linear infinite;}@keyframes sp{to{transform:rotate(360deg);}}.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:3000;opacity:0;transition:.3s;}.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}</style><link rel="manifest" href="/manifest.json"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="ShipperShop"><link rel="apple-touch-icon" href="/icons/icon-192.png"></head><body><div class="header"><button class="header-back" onclick="document.body.style.animation='slideOut .2s ease-in forwards';setTimeout(function(){history.back();},150);"><i class="fas fa-times"></i></button><h1>Bài viết</h1></div><div id="postWrap" class="post-wrap"><div class="empty"><i class="fas fa-spinner spin" style="font-size:24px"></i><p style="margin-top:8px">Đang tải...</p></div></div><div id="cmtSection"></div><div class="cmt-input" id="cmtInput" style="display:none"><div id="cmtAv" class="cmt-av-ph" style="width:32px;height:32px;border-radius:50%;flex-shrink:0">?</div><button class="cmt-placeholder-bar" onclick="openPdCmtModal()">Viết bình luận...</button></div><div class="pd-cmt-overlay" id="pdCmtOverlay" onclick="if(event.target===this)closePdCmtModal()"><div class="pd-cmt-modal"><div class="pd-cmt-head"><span>Ghi chú</span><button class="pd-cmt-x" onclick="closePdCmtModal()"><i class="fas fa-times"></i></button></div><div class="pd-cmt-body"><div class="pd-rpl-info" id="pdRplInfo"><span>Trả lời <b id="pdRplName"></b></span><button class="cancel-rpl" onclick="cancelPdReply()">Hủy</button></div><textarea class="pd-cmt-ta" id="pdCmtText" placeholder="Viết bình luận của bạn..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';document.getElementById('pdCmtSend').disabled=!this.value.trim()"></textarea></div><div class="pd-cmt-foot"><button class="pd-cmt-send" id="pdCmtSend" disabled onclick="sendCmt()"><i class="fas fa-paper-plane" style="margin-right:4px"></i> Gửi</button></div></div></div><div class="toast" id="toast"></div><script src="js/reddit-mkpost.js"></script><script>var CU=JSON.parse(localStorage.getItem("user")||"null");var P=new URLSearchParams(location.search);var postId=parseInt(P.get("id"))||0;var hlCmt=P.get("comment")||null;var replyTo=null;var SC={"GHTK":"#00b14f","J&T":"#d32f2f","GHN":"#ff6600","Viettel Post":"#e21a1a","SPX":"#EE4D2D","Grab":"#00b14f","Be":"#5bc500","Gojek":"#00aa13","Ninja Van":"#c41230","Lalamove":"#f5a623"};if(!postId){document.getElementById("postWrap").innerHTML="<div class=empty>Không tìm thấy</div>";}else{loadPost();}async function loadPost(){try{var r=await fetch("/api/posts.php?id="+postId,{credentials:"include"});var d=await r.json();if(!d.success||!d.data){document.getElementById("postWrap").innerHTML="<div class=empty>Bài viết không tồn tại</div>";return;}rPost(d.data);loadCmts();showInput();}catch(e){document.getElementById("postWrap").innerHTML="<div class=empty>Lỗi kết nối</div>";}}function rPost(p){var av=p.user_avatar?"<img src='"+p.user_avatar+"' class=post-av>":"<div class=post-av-ph>"+esc((p.user_name||"U")[0])+"</div>";var sh=p.shipping_company?"<span class=ship-badge style=color:"+(SC[p.shipping_company]||"#999")+">"+esc(p.shipping_company)+"</span>":"";var imgs="";if(p.images){try{var a=JSON.parse(p.images);if(a&&a.length){imgs="<div class='post-images"+(a.length>1?" multi":"")+"'>";a.forEach(function(s){imgs+="<img src='"+s+"' onerror=this.remove()>";});imgs+="</div>";}}catch(x){}}var vid="";if(p.video_url&&p.video_url.indexOf("/uploads/")>-1)vid="<video controls playsinline preload=metadata style=width:100%;max-height:500px><source src='"+p.video_url+"' type=video/mp4></video>";var lk=p.user_liked;document.getElementById("postWrap").innerHTML="<div class=post-author>"+av+"<div style=flex:1><div class=author-name><a href=user.html?id="+p.user_id+" style=text-decoration:none;color:inherit>"+esc(p.user_name||"Ẩn danh")+"</a></div><div class=post-time style='display:flex;align-items:center;gap:4px'>"+sh+"<span>·</span><span>"+ago(p.created_at)+"</span></div></div></div><div class=post-content>"+esc(p.content||"")+"</div>"+imgs+vid+"<div class=post-stats><span>"+(p.likes_count||0)+" đơn giao thành công</span><span>"+(p.comments_count||0)+" ghi chú</span><span>"+(p.shares_count||0)+" đơn chuyển tiếp</span></div><div class=post-actions><button class='act-btn"+(lk?" liked":"")+"'id=lkBtn onclick=togLike()><i class='fa"+(lk?"s":"r")+" fa-heart'></i> Thành công</button><button class=act-btn onclick=openPdCmtModal()>Ghi chú</button><button class=act-btn onclick=shr()>Chuyển tiếp</button></div>";}async function loadCmts(){var s=document.getElementById("cmtSection");s.innerHTML="<div class=empty><i class='fas fa-spinner spin'></i></div>";try{var r=await fetch("/api/posts.php?action=comments&post_id="+postId,{credentials:"include"});var d=await r.json();if(!d.success||!d.data||!d.data.length){s.innerHTML="<div class=empty style=padding:20px;font-size:13px>Chưa có bình luận</div>";return;}var flat=d.data,map={},top=[];flat.forEach(function(c){c.replies=[];map[c.id]=c;});flat.forEach(function(c){if(c.parent_id&&c.parent_id>0&&map[c.parent_id])map[c.parent_id].replies.push(c);else top.push(c);});s.innerHTML="<div class=sort-cmt>Phù hợp nhất <i class='fas fa-chevron-down'></i></div>"+top.map(function(c){return rCmt(c,0);}).join("");if(hlCmt)setTimeout(function(){var el=document.getElementById("cmt-"+hlCmt);if(el){el.classList.add("highlight");el.scrollIntoView({behavior:"smooth",block:"center"});}},500);}catch(x){s.innerHTML="";}}function rCmt(c,dp){var sz=dp>0?28:36;var av=c.user_avatar?"<img src='"+c.user_avatar+"' class=cmt-av style=width:"+sz+"px;height:"+sz+"px>":"<div class=cmt-av-ph style=width:"+sz+"px;height:"+sz+"px>"+esc((c.user_name||"U")[0])+"</div>";var lk=c.user_vote==="up"||c.user_liked;var n=c.likes_count||0;var reps=c.replies&&c.replies.length?"<div class=replies>"+c.replies.map(function(r){return rCmt(r,dp+1);}).join("")+"</div>":"";return "<div class=cmt-item id=cmt-"+c.id+">"+av+"<div class=cmt-body><div class=cmt-bubble><a href=user.html?id="+c.user_id+" class=cmt-author style=text-decoration:none;color:inherit>"+esc(c.user_name||"Ẩn danh")+"</a><div class=cmt-text>"+esc(c.content)+"</div></div><div class=cmt-meta><span>"+ago(c.created_at)+"</span><a class='"+(lk?"liked":"")+"' onclick='lkCmt("+c.id+",this)'>Thành công"+(n>0?" · "+n:"")+"</a><a onclick='setRpl("+c.id+",this.dataset.n)' data-n='"+esc(c.user_name||"")+"'>Ghi chú</a></div>"+reps+"</div></div>";}function showInput(){if(!CU)return;document.getElementById("cmtInput").style.display="flex";var a=document.getElementById("cmtAv");if(CU.avatar)a.outerHTML="<img src='"+CU.avatar+"' style=width:32px;height:32px;border-radius:50%;object-fit:cover>";else a.textContent=CU.fullname[0];}function setRpl(id,name){replyTo=id;document.getElementById("pdRplInfo").classList.add("show");document.getElementById("pdRplName").textContent=name;openPdCmtModal();}function openPdCmtModal(){document.getElementById("pdCmtOverlay").classList.add("open");setTimeout(function(){document.getElementById("pdCmtText").focus();},200);}function closePdCmtModal(){document.getElementById("pdCmtOverlay").classList.remove("open");document.getElementById("pdCmtText").value="";document.getElementById("pdCmtSend").disabled=true;cancelPdReply();}function cancelPdReply(){replyTo=null;document.getElementById("pdRplInfo").classList.remove("show");}async function sendCmt(){if(!CU){toast("Đăng nhập!");return;}var i=document.getElementById("pdCmtText");var ct=i.value.trim();if(!ct)return;var sendBtn=document.getElementById("pdCmtSend");sendBtn.innerHTML="<i class='fas fa-spinner fa-spin' style='font-size:16px'></i>";sendBtn.disabled=true;i.value="";var b={post_id:postId,content:ct};if(replyTo)b.parent_id=replyTo;try{var hdrs={"Content-Type":"application/json"};var tk=localStorage.getItem("token");if(tk)hdrs["Authorization"]="Bearer "+tk;var r=await fetch("/api/posts.php?action=comment",{method:"POST",headers:hdrs,credentials:"include",body:JSON.stringify(b)});var d=await r.json();if(d.success){replyTo=null;closePdCmtModal();loadCmts();}else{toast(d.message||"Lỗi");i.value=ct;}}catch(x){toast("Lỗi");i.value=ct;}finally{sendBtn.innerHTML="<i class='fas fa-paper-plane' style='margin-right:4px'></i> Gửi";sendBtn.disabled=false;}}async function togLike(){if(!CU){toast("Đăng nhập!");return;}try{var hdrs2={"Content-Type":"application/json"};var tk2=localStorage.getItem("token");if(tk2)hdrs2["Authorization"]="Bearer "+tk2;var r=await fetch("/api/posts.php?action=vote",{method:"POST",headers:hdrs2,credentials:"include",body:JSON.stringify({post_id:postId,vote_type:"up"})});var d=await r.json();if(d.success){var b=document.getElementById("lkBtn");var lk=d.data.user_vote==="up";b.className="act-btn"+(lk?" liked":"");b.innerHTML="Thành công";b.className="act-btn"+(lk?" liked":"");}}catch(x){}}async function lkCmt(cid,btn){if(!CU){toast("Đăng nhập!");return;}try{var hdrs3={"Content-Type":"application/json"};var tk3=localStorage.getItem("token");if(tk3)hdrs3["Authorization"]="Bearer "+tk3;var r=await fetch("/api/posts.php?action=vote_comment",{method:"POST",headers:hdrs3,credentials:"include",body:JSON.stringify({comment_id:cid,vote_type:"up"})});var d=await r.json();if(d.success){var lk=d.data.user_vote==="up";btn.className=lk?"liked":"";btn.textContent="Thành công"+(d.data.score>0?" · "+d.data.score:"");}}catch(x){}}function shr(){var u=location.href;if(navigator.share)navigator.share({url:u});else{navigator.clipboard.writeText(u);toast("Đã copy link!");}}function esc(t){if(!t)return"";return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}function ago(dt){if(!dt)return"";var s=Math.floor((new Date()-new Date(dt.replace(" ","T")))/1000);if(s<60)return s+" giây";if(s<3600)return Math.floor(s/60)+" phút";if(s<86400)return Math.floor(s/3600)+" giờ";if(s<604800)return Math.floor(s/86400)+" ngày";return new Date(dt).toLocaleDateString("vi-VN");}function toast(m){var t=document.getElementById("toast");t.textContent=m;t.className="toast show";setTimeout(function(){t.classList.remove("show");},2500);}</script><script>if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js");</script></body></html>
