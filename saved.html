<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đã lưu - ShipperShop</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/style-v2.css">
<link rel="stylesheet" href="/css/index-page.css">
<link rel="stylesheet" href="/css/dark-mode.css">
<script src="/js/dark-mode.js"></script>
<style>
.sv-header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e4e6eb;position:sticky;top:0;z-index:100}
.sv-body{max-width:680px;margin:0 auto;padding:12px}
.sv-empty{text-align:center;padding:60px 20px;color:#999}
</style>
</head>
<body>
<div class="sv-header">
  <a href="javascript:history.back()" style="color:#333;text-decoration:none"><i class="fas fa-arrow-left"></i></a>
  <h1 style="font-size:17px;font-weight:700">🔖 Đã lưu</h1>
  <span id="svCount" style="font-size:13px;color:#65676B;margin-left:auto"></span>
</div>
<div class="sv-body" id="savedFeed"><div style="text-align:center;padding:40px"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#7C3AED"></i></div></div>

<script src="/js/reddit-mkpost-1773927135.js"></script>
<script>
var token=localStorage.getItem('token');
if(!token){location.href='login.html';}

function loadSaved(){
  fetch('/api/posts.php?action=saved',{headers:{'Authorization':'Bearer '+token}})
    .then(function(r){return r.json()})
    .then(function(d){
      var feed=document.getElementById('savedFeed');
      if(!d.success||!d.data||!d.data.length){
        feed.innerHTML='<div class="sv-empty"><div style="font-size:48px;margin-bottom:12px">🔖</div><div style="font-size:16px;font-weight:600;color:#333;margin-bottom:8px">Chưa lưu bài viết nào</div><div>Nhấn biểu tượng bookmark trên bài viết để lưu</div></div>';
        return;
      }
      document.getElementById('svCount').textContent=d.data.length+' bài';
      feed.innerHTML=d.data.map(function(p){return typeof mkPost==='function'?mkPost(p):'<div>'+p.content+'</div>';}).join('');
    }).catch(function(){document.getElementById('savedFeed').innerHTML='<div class="sv-empty">Lỗi tải dữ liệu</div>';});
}

loadSaved();
</script>
</body>
</html>
