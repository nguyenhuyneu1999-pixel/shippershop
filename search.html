<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tìm kiếm - ShipperShop</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/style-v2.css">
<link rel="stylesheet" href="/css/index-page.css">
<link rel="stylesheet" href="/css/dark-mode.css">
<script src="/js/dark-mode.js"></script>
<style>
.sr-header{background:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e4e6eb;position:sticky;top:0;z-index:100}
.sr-input{flex:1;padding:8px 14px;border:1px solid #e4e6eb;border-radius:20px;font-size:14px;outline:none}
.sr-input:focus{border-color:#7C3AED}
.sr-tabs{display:flex;gap:4px;padding:8px 12px;background:#fff;border-bottom:1px solid #e4e6eb}
.sr-tab{padding:6px 14px;border:none;background:none;font-size:13px;cursor:pointer;border-radius:8px;font-weight:500;color:#65676B}
.sr-tab.active{background:#7C3AED;color:#fff}
.sr-body{max-width:680px;margin:0 auto;padding:8px}
.sr-user{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:8px;margin-bottom:6px}
.sr-empty{text-align:center;padding:40px;color:#999}
</style>
</head>
<body>
<div class="sr-header">
  <a href="javascript:history.back()" style="color:#333;text-decoration:none;padding:4px"><i class="fas fa-arrow-left"></i></a>
  <input class="sr-input" id="srInput" type="text" placeholder="Tìm kiếm bài viết, người dùng, nhóm..." autofocus>
  <button onclick="doSearch()" style="background:none;border:none;color:#7C3AED;font-size:16px;cursor:pointer;padding:4px"><i class="fas fa-search"></i></button>
</div>
<div class="sr-tabs">
  <button class="sr-tab active" onclick="switchTab('posts',this)">Bài viết</button>
  <button class="sr-tab" onclick="switchTab('users',this)">Người dùng</button>
  <button class="sr-tab" onclick="switchTab('groups',this)">Nhóm</button>
</div>
<div class="sr-body" id="srResults"><div class="sr-empty">Nhập từ khóa để tìm kiếm</div></div>

<script src="/js/reddit-mkpost-1773927135.js"></script>
<script>
var currentTab='posts';
var params=new URLSearchParams(location.search);
var initQ=params.get('q')||'';
if(initQ){document.getElementById('srInput').value=initQ;setTimeout(doSearch,300);}

document.getElementById('srInput').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});

function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.sr-tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  doSearch();
}

function doSearch(){
  var q=document.getElementById('srInput').value.trim();
  if(q.length<2){document.getElementById('srResults').innerHTML='<div class="sr-empty">Nhập ít nhất 2 ký tự</div>';return;}
  
  var el=document.getElementById('srResults');
  el.innerHTML='<div style="text-align:center;padding:30px"><i class="fas fa-spinner fa-spin" style="font-size:20px;color:#7C3AED"></i></div>';
  
  var token=localStorage.getItem('token')||'';
  fetch('/api/search.php?q='+encodeURIComponent(q)+'&type='+currentTab,{headers:token?{'Authorization':'Bearer '+token}:{}})
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.success){el.innerHTML='<div class="sr-empty">Lỗi tìm kiếm</div>';return;}
      var data=d.data||{};
      
      if(currentTab==='posts'){
        var posts=data.posts||[];
        if(!posts.length){el.innerHTML='<div class="sr-empty">Không tìm thấy bài viết cho "'+esc(q)+'"</div>';return;}
        el.innerHTML=posts.map(function(p){return typeof mkPost==='function'?mkPost(p):'<div style="padding:10px;background:#fff;margin:4px 0;border-radius:8px">'+esc(p.content||'').substring(0,100)+'</div>';}).join('');
      }
      else if(currentTab==='users'){
        var users=data.users||[];
        if(!users.length){el.innerHTML='<div class="sr-empty">Không tìm thấy người dùng</div>';return;}
        el.innerHTML=users.map(function(u){
          var av=u.avatar?'<img src="'+u.avatar+'" style="width:44px;height:44px;border-radius:50%;object-fit:cover">':'<div style="width:44px;height:44px;border-radius:50%;background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700">'+(u.fullname||'U')[0]+'</div>';
          return '<a href="user.html?id='+u.id+'" class="sr-user" style="text-decoration:none;color:inherit">'+av+'<div><div style="font-weight:600;font-size:14px">'+esc(u.fullname)+'</div><div style="font-size:12px;color:#65676B">@'+esc(u.username||'')+(u.shipping_company?' · '+esc(u.shipping_company):'')+'</div></div></a>';
        }).join('');
      }
      else if(currentTab==='groups'){
        var groups=data.groups||[];
        if(!groups.length){el.innerHTML='<div class="sr-empty">Không tìm thấy nhóm</div>';return;}
        el.innerHTML=groups.map(function(g){
          return '<a href="group.html?id='+g.id+'" style="display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:8px;margin-bottom:6px;text-decoration:none;color:inherit">'+(g.icon_image?'<img src="'+g.icon_image+'" style="width:48px;height:48px;border-radius:10px;object-fit:cover">':'<div style="width:48px;height:48px;border-radius:10px;background:#7C3AED;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px">👥</div>')+'<div><div style="font-weight:600;font-size:14px">'+esc(g.name)+'</div><div style="font-size:12px;color:#65676B">'+g.member_count+' thành viên</div></div></a>';
        }).join('');
      }
    }).catch(function(){el.innerHTML='<div class="sr-empty">Lỗi kết nối</div>';});
}
</script>
</body>
</html>
