<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cài đặt - ShipperShop</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/dark-mode.css">
<script src="/js/dark-mode.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:#f0f2f5;min-height:100vh}
.s-header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e4e6eb;position:sticky;top:0;z-index:100}
.s-header h1{font-size:17px;font-weight:700}
.s-body{max-width:600px;margin:0 auto;padding:12px}
.s-section{background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden}
.s-title{padding:12px 16px;font-weight:700;font-size:14px;color:#7C3AED;border-bottom:1px solid #f0f0f0}
.s-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f8f8f8}
.s-item:last-child{border:none}
.s-item i{width:20px;text-align:center;color:#7C3AED;font-size:15px}
.s-item span{flex:1;font-size:14px}
.s-item .s-arrow{color:#ccc;font-size:12px}
.s-toggle{position:relative;width:44px;height:24px;border-radius:12px;background:#ddd;cursor:pointer;transition:background .2s}
.s-toggle.on{background:#7C3AED}
.s-toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.s-toggle.on::after{transform:translateX(20px)}
.s-danger{color:#e74c3c!important}
</style>
</head>
<body>
<div class="s-header">
  <a href="javascript:history.back()" style="color:#333;text-decoration:none"><i class="fas fa-arrow-left"></i></a>
  <h1>Cài đặt</h1>
</div>
<div class="s-body">
  <div class="s-section">
    <div class="s-title">Tài khoản</div>
    <div class="s-item" onclick="location='profile.html'"><i class="fas fa-user"></i><span>Thông tin cá nhân</span><i class="fas fa-chevron-right s-arrow"></i></div>
    <div class="s-item" onclick="openChangePassword()"><i class="fas fa-key"></i><span>Đổi mật khẩu</span><i class="fas fa-chevron-right s-arrow"></i></div>
    <div class="s-item" onclick="editShippingCompany()"><i class="fas fa-truck"></i><span>Hãng vận chuyển</span><i class="fas fa-chevron-right s-arrow"></i></div>
  </div>
  
  <div class="s-section">
    <div class="s-title">Thông báo & Quyền riêng tư</div>
    <div class="s-item" onclick="openNotifPrefs()"><i class="fas fa-bell"></i><span>Cài đặt thông báo</span><i class="fas fa-chevron-right s-arrow"></i></div>
    <div class="s-item"><i class="fas fa-moon"></i><span>Chế độ tối</span><div class="s-toggle" id="darkToggle" onclick="toggleDarkMode();this.classList.toggle('on')"></div></div>
  </div>
  
  <div class="s-section">
    <div class="s-title">Khác</div>
    <div class="s-item" onclick="showReferral()"><i class="fas fa-gift"></i><span>Mời bạn bè</span><i class="fas fa-chevron-right s-arrow"></i></div>
    <div class="s-item" onclick="location='achievements.html'"><i class="fas fa-trophy"></i><span>Thành tựu</span><i class="fas fa-chevron-right s-arrow"></i></div>
    <div class="s-item" onclick="location='about.html'"><i class="fas fa-info-circle"></i><span>Về ShipperShop</span><i class="fas fa-chevron-right s-arrow"></i></div>
    <div class="s-item" onclick="location='help.html'"><i class="fas fa-question-circle"></i><span>Trợ giúp & FAQ</span><i class="fas fa-chevron-right s-arrow"></i></div>
  </div>
  
  <div class="s-section">
    <div class="s-item" onclick="if(confirm('Đăng xuất?')){localStorage.clear();location='login.html'}"><i class="fas fa-sign-out-alt s-danger"></i><span class="s-danger">Đăng xuất</span></div>
    <div class="s-item" onclick="if(confirm('Xóa tài khoản? Tài khoản sẽ bị xóa sau 30 ngày.')){deleteAccount()}"><i class="fas fa-trash s-danger"></i><span class="s-danger">Xóa tài khoản</span></div>
  </div>
</div>

<script src="/js/profile-page.js"></script>
<script>
// Init dark mode toggle
var dt=document.getElementById('darkToggle');
if(dt&&document.documentElement.classList.contains('dark'))dt.classList.add('on');

function deleteAccount(){
  var pw=prompt('Nhập mật khẩu để xác nhận:');
  if(!pw)return;
  var token=localStorage.getItem('token');
  fetch('/api/auth.php?action=delete_account',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||'')},body:JSON.stringify({password:pw,reason:'User requested'})})
    .then(function(r){return r.json()})
    .then(function(d){alert(d.message);if(d.success){localStorage.clear();location='login.html';}});
}
</script>
</body>
</html>
