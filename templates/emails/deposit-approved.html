<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<div style="max-width:560px;margin:0 auto;padding:20px">
  <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <div style="background:linear-gradient(135deg,#22c55e,#16a34a);padding:24px;text-align:center">
      <h1 style="color:#fff;font-size:20px;margin:0;font-weight:800">ShipperShop</h1>
    </div>
    <div style="padding:32px 24px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <h2 style="font-size:20px;color:#1C1C1C;margin:0 0 12px">Nạp tiền thành công!</h2>
      <p style="font-size:14px;color:#65676B;margin:0 0 8px">Xin chào <b>{{fullname}}</b>,</p>
      <p style="font-size:14px;color:#65676B;margin:0 0 20px">Yêu cầu nạp tiền của bạn đã được duyệt.</p>
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:20px;margin:16px 0">
        <div style="font-size:28px;font-weight:800;color:#16a34a">{{amount}}</div>
        <div style="font-size:13px;color:#65676B;margin-top:4px">đã được cộng vào ví</div>
      </div>
      <p style="font-size:14px;color:#65676B;margin:16px 0">Số dư hiện tại: <b style="color:#16a34a">{{balance}}</b></p>
      <div style="margin:24px 0">
        <a href="https://shippershop.vn/wallet.html" style="background:#7C3AED;color:#fff;padding:12px 28px;border-radius:8px;font-weight:700;font-size:14px;text-decoration:none;display:inline-block">Xem ví</a>
      </div>
    </div>
    <div style="padding:16px 24px;background:#f9fafb;border-top:1px solid #e4e6eb;text-align:center">
      <p style="font-size:12px;color:#999;margin:0">ShipperShop — shippershop.vn</p>
    </div>
  </div>
</div>
</body>
</html>
