<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<div style="max-width:560px;margin:0 auto;padding:20px">
  <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <div style="background:linear-gradient(135deg,#7C3AED,#5B21B6);padding:24px;text-align:center">
      <h1 style="color:#fff;font-size:20px;margin:0;font-weight:800">ShipperShop</h1>
    </div>
    <div style="padding:32px 24px">
      <h2 style="font-size:18px;color:#1C1C1C;margin:0 0 12px">Đặt lại mật khẩu</h2>
      <p style="font-size:14px;color:#65676B;line-height:1.6;margin:0 0 8px">Xin chào <b>{{fullname}}</b>,</p>
      <p style="font-size:14px;color:#65676B;line-height:1.6;margin:0 0 24px">Bạn đã yêu cầu đặt lại mật khẩu. Click nút bên dưới để tạo mật khẩu mới:</p>
      <div style="text-align:center;margin:24px 0">
        <a href="{{reset_link}}" style="background:#7C3AED;color:#fff;padding:14px 32px;border-radius:8px;font-weight:700;font-size:15px;text-decoration:none;display:inline-block">Đặt lại mật khẩu</a>
      </div>
      <p style="font-size:13px;color:#999;line-height:1.5;margin:24px 0 0">Link hết hạn sau 1 giờ. Nếu bạn không yêu cầu, vui lòng bỏ qua email này.</p>
    </div>
    <div style="padding:16px 24px;background:#f9fafb;border-top:1px solid #e4e6eb;text-align:center">
      <p style="font-size:12px;color:#999;margin:0">ShipperShop — shippershop.vn</p>
    </div>
  </div>
</div>
</body>
</html>
