<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width"></head>
<body style="margin:0;padding:0;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<div style="max-width:560px;margin:0 auto;padding:20px">
  <div style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <div style="background:linear-gradient(135deg,#7C3AED,#5B21B6);padding:32px 24px;text-align:center">
      <h1 style="color:#fff;font-size:24px;margin:0;font-weight:800">ShipperShop</h1>
      <p style="color:rgba(255,255,255,.8);font-size:14px;margin:8px 0 0">Cộng đồng Shipper #1 Việt Nam</p>
    </div>
    <div style="padding:32px 24px">
      <h2 style="font-size:20px;color:#1C1C1C;margin:0 0 16px">Chào mừng {{fullname}}! 🎉</h2>
      <p style="font-size:14px;color:#65676B;line-height:1.6;margin:0 0 16px">Cảm ơn bạn đã gia nhập ShipperShop. Bạn đã sẵn sàng để:</p>
      <div style="margin:20px 0">
        <div style="display:flex;align-items:center;gap:12px;margin:12px 0"><span style="background:#EDE9FE;color:#7C3AED;width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">📦</span><span style="font-size:14px;color:#1C1C1C">Chia sẻ kinh nghiệm giao hàng</span></div>
        <div style="display:flex;align-items:center;gap:12px;margin:12px 0"><span style="background:#EDE9FE;color:#7C3AED;width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🤝</span><span style="font-size:14px;color:#1C1C1C">Kết nối với hàng nghìn shipper</span></div>
        <div style="display:flex;align-items:center;gap:12px;margin:12px 0"><span style="background:#EDE9FE;color:#7C3AED;width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">💰</span><span style="font-size:14px;color:#1C1C1C">Mua bán trên Chợ ShipperShop</span></div>
      </div>
      <div style="text-align:center;margin:28px 0">
        <a href="https://shippershop.vn/" style="background:#7C3AED;color:#fff;padding:14px 32px;border-radius:8px;font-weight:700;font-size:15px;text-decoration:none;display:inline-block">Khám phá ngay</a>
      </div>
    </div>
    <div style="padding:16px 24px;background:#f9fafb;border-top:1px solid #e4e6eb;text-align:center">
      <p style="font-size:12px;color:#999;margin:0">ShipperShop — shippershop.vn</p>
    </div>
  </div>
</div>
</body>
</html>
