<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug Group Posts</title>
<style>body{font-family:sans-serif;padding:20px}.log{font-family:monospace;white-space:pre-wrap;background:#f5f5f5;padding:10px;margin:10px 0;font-size:12px;max-height:300px;overflow:auto}.post{border:1px solid #ddd;padding:10px;margin:5px 0;border-radius:8px}.err{color:red;font-weight:bold}</style>
</head><body>
<h2>Group Posts Debug</h2>
<div id="log" class="log"></div>
<div id="posts"></div>
<script>
var el=document.getElementById("log");
function log(m,err){el.innerHTML+=((err?"<span class=err>":"")+(new Date().toLocaleTimeString())+": "+m+(err?"</span>":"")+"<br>");console.log(m);}

var token=localStorage.getItem("token");
log("Token: "+(token?"YES ("+token.substring(0,15)+"...)":"NO - not logged in"));
var CU=JSON.parse(localStorage.getItem("user")||"null");
log("User: "+(CU?CU.fullname+" (id="+CU.id+")":"NOT LOGGED IN"));

log("\n--- Step 1: Fetch group detail ---");
var headers={};
if(token)headers["Authorization"]="Bearer "+token;

fetch("/api/groups.php?action=detail&id=1",{headers:headers,credentials:"include"})
.then(function(r){log("HTTP "+r.status);return r.json();})
.then(function(d){
  log("success: "+d.success);
  if(d.data){
    log("name: "+d.data.name);
    log("is_member: "+d.data.is_member);
    log("post_count: "+d.data.post_count);
  }
  
  log("\n--- Step 2: Fetch posts ---");
  return fetch("/api/groups.php?action=posts&group_id=1&limit=5&sort=new",{headers:headers,credentials:"include"});
})
.then(function(r){log("HTTP "+r.status);return r.json();})
.then(function(d){
  log("success: "+d.success);
  if(d.data&&d.data.posts){
    log("posts count: "+d.data.posts.length);
    var container=document.getElementById("posts");
    d.data.posts.forEach(function(p){
      var div=document.createElement("div");
      div.className="post";
      var img=p.images?"<br><small>📷 "+p.images.substring(0,50)+"</small>":"";
      div.innerHTML="<b>#"+p.id+" "+p.user_name+"</b> ("+p.shipping_company+")<br>"+p.content.substring(0,100)+"..."+img+"<br><small>👍"+p.likes_count+" 💬"+p.comments_count+"</small>";
      container.appendChild(div);
      log("  ✅ #"+p.id+": "+p.content.substring(0,40)+"...");
    });
    log("\n✅ Posts rendered successfully!");
  } else {
    log("NO POSTS IN RESPONSE",true);
    log(JSON.stringify(d).substring(0,200));
  }
})
.catch(function(e){
  log("FETCH ERROR: "+e.message,true);
});
</script>
</body></html>
