<style>
:root{--primary:#EE4D2D;--bg:#f0f2f5;--card:#fff;--border:#e4e6eb;--text:#1C1C1C;--muted:#65676B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);padding-bottom:80px;}
.back-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);padding:10px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f0;}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;color:#333;}
.back-nav-title{font-size:17px;font-weight:700;flex:1;}
.cover{height:140px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);margin-top:48px;}
.profile-section{background:#fff;padding:0 16px 16px;border-bottom:1px solid var(--border);}
.avatar-wrap{position:relative;width:96px;height:96px;margin-top:-48px;margin-bottom:8px;}
.profile-av{width:96px;height:96px;border-radius:50%;border:4px solid #fff;object-fit:cover;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;}
.profile-name{font-size:22px;font-weight:800;margin-bottom:2px;}
.profile-username{font-size:14px;color:var(--muted);margin-bottom:6px;}
.profile-bio{font-size:14px;line-height:1.5;margin-bottom:10px;color:#444;}
.profile-stats{display:flex;gap:0;margin-bottom:12px;}
.stat{flex:1;text-align:center;padding:10px 0;}
.stat-n{font-size:20px;font-weight:800;}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}
.profile-actions{display:flex;gap:8px;}
.p-btn{flex:1;padding:8px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:none;}
.p-btn.primary{background:var(--primary);color:#fff;}
.p-btn.secondary{background:#e4e6eb;color:var(--text);}
.ship-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:8px;}
.online-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#22c55e;margin-left:4px;}
.info-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;color:var(--muted);}
.info-row i{width:18px;text-align:center;}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:50;}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.post-card{background:#fff;border:none;border-radius:0;margin-bottom:6px;display:flex;flex-direction:column;overflow:hidden;}
.post-card:hover{background:#fafafa;}
.post-content{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.post-stats{display:flex;gap:16px;margin-top:8px;font-size:13px;color:var(--muted);}
.comment-card{background:#fff;margin-bottom:1px;padding:12px 16px;}
.cmt-ref{font-size:12px;color:var(--primary);margin-bottom:4px;cursor:pointer;}
.about-section{background:#fff;margin:8px;border-radius:12px;padding:16px;}
.about-section h3{font-size:15px;font-weight:700;margin-bottom:12px;}
.about-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px;}
.about-item:last-child{border:none;}
.about-item i{width:24px;text-align:center;font-size:16px;color:var(--muted);}
.about-item b{color:var(--text);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty i{font-size:36px;display:block;margin-bottom:8px;color:#ddd;}
.spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;}
.modal-head{padding:16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.modal-head h2{font-size:17px;font-weight:700;}
.modal-x{background:none;border:none;font-size:24px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px;overflow-y:auto;flex:1;}
.f-row{margin-bottom:14px;}
.f-row label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted);}
.f-row input,.f-row textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none;}
.f-row textarea{min-height:80px;resize:vertical;}
.submit-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(100px);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:3000;opacity:0;transition:.3s;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

.post-body{padding:0;width:100%;}
.post-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:4px;flex-wrap:wrap;position:relative;padding:8px 12px 4px;}
.post-images{display:block;width:100%;margin:0;}
.post-images.multi-img{display:flex;gap:2px;flex-wrap:wrap;}
.post-img{width:100%;border-radius:0;display:block;}
.post-img.multi{width:calc(50% - 1px);max-height:400px;object-fit:cover;}
.pa3-stats{display:flex;padding:0;margin:0;font-size:12px;color:#65676B;width:100%;border:none;}
.pa3-stats span{flex:1;padding:0 4px 2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;min-width:0;}
.pa3-stats span:first-child{text-align:center;}
.pa3-stats span:nth-child(2){text-align:right;}
.pa3-stats span:last-child{text-align:center;}
.pa3-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 0;border:none;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#65676B;border-right:1px solid #e4e6eb;transition:background .15s;}
.pa3-btn:last-child{border-right:none;}
.pa3-btn:active,.pa3-btn.pa3-active{background:#FFF3EF;color:#EE4D2D;}
.post-actions-3{display:flex;border-top:1px solid #e4e6eb;}
.type-badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.province-badge{background:var(--orange-light);color:var(--primary);padding:1px 7px;border-radius:20px;font-size:11px;font-weight:600;}
.anon-badge{background:#f0f0f0;color:#555;padding:1px 7px;border-radius:20px;font-size:11px;}

@media (min-width: 769px) {
  body { padding-bottom: 0 !important; }
  .post-card { border-radius: 8px; margin-bottom: 8px; }
}
</style>

<script src="js/reddit-mkpost-1773810843.js"></script><script>function tryParse(s){try{return JSON.parse(s);}catch(e){return null;}}
function togCmt(pid){var el=document.getElementById("cmt-sec-"+pid);if(!el)return;el.style.display=el.style.display==="none"?"block":"none";}
function loadCmts(){}
function togMenu(pid){var m=document.getElementById("pm"+pid);if(!m)return;m.style.display=m.style.display==="none"?"block":"none";}
function delP(pid){if(confirm("Xóa bài này?")){fetch("/api/posts.php?action=delete",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",body:JSON.stringify({post_id:pid})}).then(function(r){return r.json();}).then(function(d){if(d.success){document.getElementById("P"+pid).remove();}});}}
function reportP(pid){togMenu(pid);}
function openLb(src){window.open(src,"_blank");}
function xpnd(pid){var el=document.getElementById("pc-"+pid);if(el)el.classList.add("full");var btn=el.nextElementSibling;if(btn)btn.remove();}
</script>
<script src="js/mobile.js"></script>
<script>
var CU=JSON.parse(localStorage.getItem('user')||'null');var targetId=parseInt(new URLSearchParams(location.search).get('id'))||(CU?CU.id:0);var userData=null;
var shipColors={'GHTK':'#00b14f','J&T':'#d32f2f','GHN':'#ff6600','SPX':'#EE4D2D','Grab':'#00b14f','Be':'#5bc500','Gojek':'#00aa13','Ninja Van':'#c41230','Viettel Post':'#e21a1a','Lalamove':'#f5a623'};
async function loadProfile(){if(!targetId){location.href='login.html';return;}try{var r=await fetch('/api/user-page.php?id='+targetId,{credentials:'include'});var d=await r.json();if(!d.success){document.getElementById('tabContent').innerHTML='<div class="empty"><i class="fas fa-user-slash"></i><p>Không tìm thấy</p></div>';return;}userData=d.data;renderProfile();loadTab('posts');}catch(e){document.getElementById('tabContent').innerHTML='<div class="empty"><p>Lỗi</p></div>';}}
function renderProfile(){var u=userData;document.title=u.fullname+' - ShipperShop';document.getElementById('navTitle').textContent=u.fullname;document.getElementById('pName').innerHTML=esc(u.fullname)+(u.is_online?'<span class="online-dot"></span>':'');document.getElementById('pUsername').textContent='u/'+u.username;document.getElementById('pBio').textContent=u.bio||'';document.getElementById('sKarma').textContent=fN(u.karma);document.getElementById('sPosts').textContent=fN(u.post_count);document.getElementById('sAge').textContent=u.account_age_days;document.getElementById('sFollowers').textContent=fN(u.follower_count);
if(u.avatar)document.getElementById('avatar').outerHTML='<img class="profile-av" id="avatar" src="'+u.avatar+'" onerror="this.outerHTML=\'<div class=profile-av>'+((u.fullname||'?').charAt(0))+'</div>\'">';
if(u.shipping_company){var c=shipColors[u.shipping_company]||'#999';document.getElementById('pShipBadge').innerHTML='<div class="ship-tag" style="background:'+c+'15;color:'+c+'"><i class="fas fa-truck"></i> '+esc(u.shipping_company)+'</div>';}
var info='';if(u.address)info+='<div class="info-row"><i class="fas fa-map-marker-alt"></i> '+esc(u.address)+'</div>';info+='<div class="info-row"><i class="fas fa-cake-candles"></i> Tham gia '+new Date(u.created_at).toLocaleDateString('vi-VN')+'</div>';document.getElementById('pInfo').innerHTML=info;
var act='';if(u.is_self){act='<button class="p-btn secondary" onclick="openEdit()"><i class="fas fa-pen"></i> Sửa hồ sơ</button>';}else{act='<button class="p-btn '+(u.is_following?'secondary':'primary')+'" onclick="toggleFollow()"><i class="fas fa-'+(u.is_following?'check':'user-plus')+'"></i> '+(u.is_following?'Đang theo dõi':'Theo dõi')+'</button>';act+='<button class="p-btn secondary" onclick="location.href=\'messages.html?user='+targetId+'\'"><i class="fas fa-comment-dots"></i> Nhắn tin</button>';}document.getElementById('pActions').innerHTML=act;}
function setTab(tab,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');loadTab(tab);}
async function loadTab(tab){var c=document.getElementById('tabContent');c.innerHTML='<div class="empty"><i class="fas fa-spinner spin"></i></div>';
if(tab==='posts'){try{var r=await fetch('/api/user-page.php?action=posts&id='+targetId,{credentials:'include'});var d=await r.json();if(d.success&&d.data.length){c.innerHTML=d.data.map(function(p){return mkPost(p);}).join('');}else c.innerHTML='<div class="empty"><i class="fas fa-file-lines"></i><p>Chưa có bài đăng</p></div>';}catch(e){c.innerHTML='<div class="empty"><p>Lỗi</p></div>';}}
if(tab==='comments'){try{var r=await fetch('/api/user-page.php?action=comments&id='+targetId,{credentials:'include'});var d=await r.json();if(d.success&&d.data.length){c.innerHTML=d.data.map(function(cm){return '<div class="comment-card"><div class="cmt-ref" onclick="location.href=\'post-detail.html?id='+cm.post_id+'\'"><i class="fas fa-reply"></i> '+esc((cm.post_content||'').substring(0,60))+'...</div><div class="post-content" style="font-size:13px">'+esc(cm.content)+'</div><div class="post-stats" style="font-size:12px"><span>'+ago(cm.created_at)+'</span></div></div>';}).join('');}else c.innerHTML='<div class="empty"><i class="far fa-comment"></i><p>Chưa có bình luận</p></div>';}catch(e){c.innerHTML='<div class="empty"><p>Lỗi</p></div>';}}
if(tab==='about'){var u=userData;var html='<div class="about-section"><h3>Giới thiệu</h3>';html+='<div class="about-item"><i class="fas fa-user"></i><div><b>'+esc(u.fullname)+'</b></div></div>';if(u.username)html+='<div class="about-item"><i class="fas fa-at"></i><div>u/'+esc(u.username)+'</div></div>';if(u.shipping_company)html+='<div class="about-item"><i class="fas fa-truck"></i><div>'+esc(u.shipping_company)+'</div></div>';if(u.address)html+='<div class="about-item"><i class="fas fa-map-marker-alt"></i><div>'+esc(u.address)+'</div></div>';if(u.bio)html+='<div class="about-item"><i class="fas fa-quote-left"></i><div>'+esc(u.bio)+'</div></div>';html+='<div class="about-item"><i class="fas fa-calendar"></i><div>Tham gia '+new Date(u.created_at).toLocaleDateString('vi-VN')+'</div></div>';html+='<div class="about-item"><i class="fas fa-star"></i><div><b>'+fN(u.karma)+'</b> karma</div></div>';html+='<div class="about-item"><i class="fas fa-users"></i><div><b>'+fN(u.follower_count)+'</b> theo dõi · <b>'+fN(u.following_count)+'</b> đang theo dõi</div></div></div>';c.innerHTML=html;}}
async function toggleFollow(){if(!CU){toast('Đăng nhập!');return;}try{var r=await fetch('/api/social.php?action=follow',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({user_id:targetId})});var d=await r.json();if(d.success){userData.is_following=!userData.is_following;renderProfile();}}catch(e){toast('Lỗi');}}
function openEdit(){document.getElementById('eName').value=userData.fullname||'';document.getElementById('eBio').value=userData.bio||'';document.getElementById('editModal').classList.add('open');}
function closeEdit(){document.getElementById('editModal').classList.remove('open');}
async function saveProfile(){try{var r=await fetch('/api/user-page.php?action=update_profile',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({display_name:document.getElementById('eName').value.trim(),bio:document.getElementById('eBio').value.trim()})});var d=await r.json();if(d.success){toast('Đã cập nhật!');closeEdit();loadProfile();}else toast(d.message||'Lỗi');}catch(e){toast('Lỗi');}}
function esc(t){if(!t)return'';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fN(n){n=parseInt(n)||0;if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString();}
function ago(dt){if(!dt)return'';var s=Math.floor((new Date()-new Date(dt.replace(' ','T')))/1000);if(s<60)return s+'s';if(s<3600)return Math.floor(s/60)+'m';if(s<86400)return Math.floor(s/3600)+'h';if(s<604800)return Math.floor(s/86400)+'d';return new Date(dt).toLocaleDateString('vi-VN');}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(function(){t.classList.remove('show');},2500);}
loadProfile();
</script>

<style>.post-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}.post-sheet-overlay.open{display:flex}.post-sheet{background:#fff;width:100%;max-width:600px;max-height:92vh;border-radius:16px 16px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);overflow:hidden}.post-sheet-overlay.open .post-sheet{transform:translateY(0)}.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;flex-shrink:0}.sheet-header{display:flex;align-items:center;padding:12px 16px 8px;border-bottom:1px solid #f0f0f0;flex-shrink:0}.sheet-header h3{flex:1;font-size:16px;font-weight:700;margin:0}.sheet-close{background:none;border:none;font-size:22px;color:#666;cursor:pointer;padding:4px 8px;border-radius:50%}.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:70px}.sheet-cmt-bar{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e4e6eb;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:10}.sheet-cmt-bar .cmt-placeholder{flex:1;padding:10px 16px;border-radius:24px;background:#f0f2f5;color:#65676B;font-size:14px;cursor:pointer;border:none;text-align:left}.sheet-post-content{padding:10px 16px;font-size:15px;line-height:1.7;white-space:pre-wrap;word-break:break-word}.sheet-post-stats{display:flex;padding:4px 0 2px;font-size:12px;color:#65676B;border-top:1px solid #e4e6eb}.sheet-post-stats span{flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px;min-width:0}.post-actions-3{display:flex;border-top:1px solid #e4e6eb}.pa3-btn{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 0;border:none;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:#444;border-right:1px solid #ddd}.pa3-btn:last-child{border-right:none}.pa3-btn.pa3-active{color:#EE4D2D;background:#FFF3EF}.cmt-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1200;display:none;align-items:center;justify-content:center;padding:16px}.cmt-modal-overlay.open{display:flex}.cmt-modal{background:#fff;width:100%;max-width:500px;border-radius:16px;overflow:hidden;transform:scale(.9);opacity:0;transition:all .2s}.cmt-modal-overlay.open .cmt-modal{transform:scale(1);opacity:1}.cmt-modal-head{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #e4e6eb}.cmt-modal-head span{flex:1;font-size:15px;font-weight:700}.cmt-modal-x{background:#e4e6eb;border:none;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333}.cmt-modal-body{padding:16px}.cmt-modal-reply{font-size:13px;color:#65676B;margin-bottom:8px;display:none;align-items:center;gap:6px}.cmt-modal-reply.show{display:flex}.cmt-modal-reply .cancel-rpl{background:none;border:none;color:#EE4D2D;font-weight:700;cursor:pointer;font-size:12px}.cmt-modal-ta{width:100%;min-height:100px;max-height:200px;border:none;outline:none;font-size:15px;font-family:inherit;resize:none;line-height:1.5}.cmt-modal-foot{display:flex;justify-content:flex-end;padding:10px 16px;border-top:1px solid #e4e6eb}.cmt-modal-send{background:#EE4D2D;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;font-weight:700;cursor:pointer}.cmt-modal-send:disabled{opacity:.5;cursor:not-allowed}.cmt-bubble{background:#f0f2f5;border-radius:18px;padding:8px 12px;display:inline-block;max-width:100%}.cmt-author{font-weight:700;font-size:13px}.cmt-text{font-size:14px;line-height:1.4;margin-top:1px}.cmt-meta{display:flex;gap:12px;padding:2px 12px;font-size:12px;color:#65676B}.cmt-meta a{color:#65676B;text-decoration:none;font-weight:600;cursor:pointer}.cmt-meta a.liked{color:#EE4D2D;font-weight:700}@media(max-width:768px){.post-sheet{max-height:95vh}.cmt-modal{max-width:100%;margin:0 8px;border-radius:12px}}
@media (min-width: 769px) {
  body { padding-bottom: 0 !important; }
  .post-card { border-radius: 8px; margin-bottom: 8px; }
}
</style>
<div class="post-sheet-overlay" id="postSheetOverlay" onclick="if(event.target===this)closePostSheet()"><div class="post-sheet"><div class="sheet-handle"></div><div class="sheet-header"><h3>Bài viết</h3><button class="sheet-close" onclick="closePostSheet()"><i class="fas fa-times"></i></button></div><div class="sheet-body" id="sheetBody"></div><div class="sheet-cmt-bar" id="sheetCmtBar" style="display:none"><div id="sheetUserAv" style="width:32px;height:32px;border-radius:50%;background:#e4e6eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">?</div><button class="cmt-placeholder" onclick="openCmtModal()">Viết bình luận...</button></div></div></div>
<div class="cmt-modal-overlay" id="cmtModalOverlay" onclick="if(event.target===this)closeCmtModal()"><div class="cmt-modal"><div class="cmt-modal-head"><span>Ghi chú</span><button class="cmt-modal-x" onclick="closeCmtModal()"><i class="fas fa-times"></i></button></div><div class="cmt-modal-body"><div class="cmt-modal-reply" id="cmtModalReply"><span>Trả lời <b id="cmtReplyName"></b></span><button class="cancel-rpl" onclick="cancelSheetReply()">Hủy</button></div><textarea class="cmt-modal-ta" id="cmtModalText" placeholder="Viết bình luận của bạn..."></textarea></div><div class="cmt-modal-foot"><button class="cmt-modal-send" id="cmtModalSend" disabled onclick="sendSheetCmt()"><i class="fas fa-paper-plane" style="margin-right:4px"></i> Gửi</button></div></div></div>
<script>
var sheetPostId=0,sheetReplyTo=null;var SC2={"GHTK":"#00b14f","J&T":"#d32f2f","GHN":"#ff6600","Viettel Post":"#e21a1a","SPX":"#EE4D2D","Grab":"#00b14f","Be":"#5bc500","Gojek":"#00aa13","Ninja Van":"#c41230","Lalamove":"#f5a623"};document.addEventListener("DOMContentLoaded",function(){var ta=document.getElementById("cmtModalText");if(ta)ta.addEventListener("input",function(){this.style.height="auto";this.style.height=this.scrollHeight+"px";document.getElementById("cmtModalSend").disabled=!this.value.trim();});});
function openPostSheet(pid){sheetPostId=pid;sheetReplyTo=null;var ov=document.getElementById("postSheetOverlay");ov.classList.add("open");document.body.style.overflow="hidden";if(CU){document.getElementById("sheetCmtBar").style.display="flex";var av=document.getElementById("sheetUserAv");if(CU.avatar&&av.tagName!=="IMG")av.outerHTML="<img src=\""+CU.avatar+"\" style=\"width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0\" id=\"sheetUserAv\">";else if(!CU.avatar&&av.tagName!=="IMG")av.textContent=(CU.fullname||"U")[0];}loadSheetPost(pid);}
function closePostSheet(){var ov=document.getElementById("postSheetOverlay");var s=ov.querySelector(".post-sheet");s.style.transform="translateY(100%)";setTimeout(function(){ov.classList.remove("open");s.style.transform="";document.body.style.overflow="";},300);}
async function loadSheetPost(pid){var body=document.getElementById("sheetBody");body.innerHTML="<div style=\"text-align:center;padding:40px;color:#999\"><i class=\"fas fa-spinner spin\" style=\"font-size:24px\"></i></div>";try{var r=await fetch("/api/posts.php?id="+pid);var d=await r.json();if(!d.success||!d.data){body.innerHTML="<div style=\"text-align:center;padding:40px;color:#999\">Khong tim thay</div>";return;}var p=d.data;var av=p.user_avatar?"<img src=\""+p.user_avatar+"\" style=\"width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0\">":"<div style=\"width:40px;height:40px;border-radius:50%;background:#EE4D2D;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0\">"+esc((p.user_name||"U")[0])+"</div>";var sh=p.shipping_company?"<span style=\"font-size:11px;font-weight:700;color:"+(SC2[p.shipping_company]||"#999")+"\">"+esc(p.shipping_company)+"</span>":"";var imgs="";if(p.images){try{var a=JSON.parse(p.images);if(a&&a.length){imgs="<div>";a.forEach(function(s){imgs+="<img src=\""+s+"\" style=\"width:100%;max-height:500px;object-fit:cover\" onerror=\"this.remove()\">";});imgs+="</div>";}}catch(x){}}var vid="";if(p.video_url&&p.video_url.indexOf("/uploads/")>-1)vid="<video controls playsinline preload=metadata style=\"width:100%;max-height:500px\"><source src=\""+p.video_url+"\" type=video/mp4></video>";var lk=p.user_liked;var h="<div style=\"display:flex;align-items:center;gap:10px;padding:14px 16px 0\">"+av+"<div style=\"flex:1\"><div style=\"font-weight:700;font-size:15px\"><a href=\"user.html?id="+p.user_id+"\" style=\"text-decoration:none;color:inherit\">"+esc(p.user_name||"An danh")+"</a></div><div style=\"font-size:12px;color:#65676B;display:flex;align-items:center;gap:4px\">"+sh+"<span>\u00b7</span><span>"+ago(p.created_at)+"</span></div></div></div>";h+="<div class=\"sheet-post-content\">"+esc(p.content||"")+"</div>"+imgs+vid;h+="<div class=\"sheet-post-stats\"><span>"+(p.likes_count||0)+" \u0111\u01a1n giao th\u00e0nh c\u00f4ng</span><span>"+(p.comments_count||0)+" ghi ch\u00fa</span><span>"+(p.shares_count||0)+" \u0111\u01a1n chuy\u1ec3n ti\u1ebfp</span></div>";h+="<div class=\"post-actions-3\" style=\"border-top:1px solid #e4e6eb;border-bottom:1px solid #e4e6eb\"><button class=\"pa3-btn"+(lk?" pa3-active":"")+"\" id=\"sheetLkBtn\" onclick=\"togSheetLike()\">Th\u00e0nh c\u00f4ng</button><button class=\"pa3-btn\" onclick=\"openCmtModal()\">Ghi ch\u00fa</button><button class=\"pa3-btn\" onclick=\"shrSheet()\">Chuy\u1ec3n ti\u1ebfp</button></div>";h+="<div style=\"padding:12px 16px;font-size:14px;font-weight:700;color:#65676B\">Ph\u00f9 h\u1ee3p nh\u1ea5t <i class=\"fas fa-chevron-down\" style=\"font-size:12px\"></i></div>";h+="<div id=\"sheetCmts\"><div style=\"text-align:center;padding:20px;color:#999\"><i class=\"fas fa-spinner spin\"></i></div></div>";body.innerHTML=h;loadSheetCmts(pid);}catch(e){body.innerHTML="<div style=\"text-align:center;padding:40px;color:#999\">Loi ket noi</div>";}}
async function loadSheetCmts(pid){var wrap=document.getElementById("sheetCmts");if(!wrap)return;try{var r=await fetch("/api/posts.php?action=comments&post_id="+pid);var d=await r.json();if(!d.success||!d.data||!d.data.length){wrap.innerHTML="<div style=\"text-align:center;padding:20px;font-size:13px;color:#999\">Chua co binh luan</div>";return;}var flat=d.data,map={},top=[];flat.forEach(function(c){c.replies=[];map[c.id]=c;});flat.forEach(function(c){if(c.parent_id&&c.parent_id>0&&map[c.parent_id])map[c.parent_id].replies.push(c);else top.push(c);});wrap.innerHTML=top.map(function(c){return mkSC(c,0);}).join("");}catch(x){wrap.innerHTML="";}}
function mkSC(c,dp){var sz=dp>0?28:36;var av=c.user_avatar?"<img src=\""+c.user_avatar+"\" style=\"width:"+sz+"px;height:"+sz+"px;border-radius:50%;object-fit:cover;flex-shrink:0\">":"<div style=\"width:"+sz+"px;height:"+sz+"px;border-radius:50%;background:#e4e6eb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0\">"+esc((c.user_name||"U")[0])+"</div>";var lk=c.user_vote==="up"||c.user_liked;var n=c.likes_count||0;var reps=c.replies&&c.replies.length?"<div style=\"margin-top:4px;padding-left:16px;border-left:2px solid #e4e6eb\">"+c.replies.map(function(r){return mkSC(r,dp+1);}).join("")+"</div>":"";var sn=esc(c.user_name||"").replace(/'/g,"\\'");return "<div style=\"display:flex;gap:8px;padding:6px 16px;"+(dp>0?"padding-left:32px":"")+"\">"+av+"<div style=\"flex:1;min-width:0\"><div class=\"cmt-bubble\"><a href=\"user.html?id="+c.user_id+"\" class=\"cmt-author\" style=\"text-decoration:none;color:inherit\">"+esc(c.user_name||"An danh")+"</a><div class=\"cmt-text\">"+esc(c.content)+"</div></div><div class=\"cmt-meta\"><span>"+ago(c.created_at)+"</span><a class=\""+(lk?"liked":"")+"\" onclick=\"lkSC("+c.id+",this)\">Th\u00e0nh c\u00f4ng"+(n>0?" \u00b7 "+n:"")+"</a><a onclick=\"setSheetReply("+c.id+",'"+sn+"')\">Ghi ch\u00fa</a></div>"+reps+"</div></div>";}
function openCmtModal(){if(!CU){toast("Dang nhap de binh luan!","warning");return;}document.getElementById("cmtModalOverlay").classList.add("open");setTimeout(function(){document.getElementById("cmtModalText").focus();},200);}
function closeCmtModal(){document.getElementById("cmtModalOverlay").classList.remove("open");document.getElementById("cmtModalText").value="";document.getElementById("cmtModalSend").disabled=true;cancelSheetReply();}
function setSheetReply(id,name){sheetReplyTo=id;document.getElementById("cmtModalReply").classList.add("show");document.getElementById("cmtReplyName").textContent=name;openCmtModal();}
function cancelSheetReply(){sheetReplyTo=null;document.getElementById("cmtModalReply").classList.remove("show");}
async function sendSheetCmt(){if(!CU||!sheetPostId)return;var ta=document.getElementById("cmtModalText");var ct=ta.value.trim();if(!ct)return;var btn=document.getElementById("cmtModalSend");btn.disabled=true;btn.innerHTML="<i class=\"fas fa-spinner fa-spin\"></i>";var b={post_id:sheetPostId,content:ct};if(sheetReplyTo)b.parent_id=sheetReplyTo;try{var r=await fetch("/api/posts.php?action=comment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});var d=await r.json();if(d.success){closeCmtModal();loadSheetCmts(sheetPostId);}else{toast(d.message||"Loi","error");btn.disabled=false;}}catch(x){toast("Loi ket noi","error");btn.disabled=false;}btn.innerHTML="<i class=\"fas fa-paper-plane\" style=\"margin-right:4px\"></i> G\u1eedi";}
async function togSheetLike(){if(!CU){toast("Dang nhap!","warning");return;}try{var r=await fetch("/api/posts.php?action=vote",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({post_id:sheetPostId,vote_type:"up"})});var d=await r.json();if(d.success){var btn=document.getElementById("sheetLkBtn");var lk=d.data.user_vote==="up";btn.className="pa3-btn"+(lk?" pa3-active":"");btn.innerHTML="Th\u00e0nh c\u00f4ng";}}catch(x){}}
async function lkSC(cid,btn){if(!CU){toast("Dang nhap!","warning");return;}try{var r=await fetch("/api/posts.php?action=vote_comment",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({comment_id:cid,vote_type:"up"})});var d=await r.json();if(d.success){var lk=d.data.user_vote==="up";btn.className=lk?"liked":"";btn.textContent="Th\u00e0nh c\u00f4ng"+(d.data.score>0?" \u00b7 "+d.data.score:"");}}catch(x){}}
function shrSheet(){var u=location.origin+"/share.php?id="+sheetPostId;if(navigator.share)navigator.share({url:u});else{navigator.clipboard.writeText(u);toast("Da copy link!","success");}}
</script>
<script src="js/post-modal.js"></script>
</body></html>
