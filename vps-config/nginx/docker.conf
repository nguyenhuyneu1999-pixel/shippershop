upstream php_pool {
    server php1:9000 weight=1;
    server php2:9000 weight=1;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=SS:50m inactive=5m max_size=500m;

server {
    listen 80;
    server_name shippershop.vn;
    root /var/www/html;
    index index.html;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

    location ~* \.(css|js)$ { expires 7d; access_log off; }
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2)$ { expires 30d; access_log off; }
    location ~* \.html$ { expires 2m; }

    location ~ ^/api/.*\.php$ {
        limit_req zone=api burst=50 nodelay;

        set $skip_cache 0;
        if ($request_method != GET) { set $skip_cache 1; }
        if ($arg_action ~ "^(vote|comment|send|create|delete|save|login|register|set_pin|subscribe|deposit)") { set $skip_cache 1; }
        if ($http_authorization != "") { set $skip_cache 1; }

        fastcgi_cache SS;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;

        include fastcgi_params;
        fastcgi_pass php_pool;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 30s;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php_pool;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\.(git|env|htaccess) { deny all; }
    location ~ ^/includes/ { deny all; }
}
