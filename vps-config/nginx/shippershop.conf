# ShipperShop Nginx â€” 100K concurrent users
# Copy to: /etc/nginx/sites-available/shippershop.conf

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

upstream php_fpm {
    server unix:/run/php/php8.2-fpm.sock;
    keepalive 32;
}

fastcgi_cache_path /tmp/nginx_cache levels=1:2 keys_zone=SS:100m inactive=10m max_size=1g;

server {
    listen 80;
    server_name shippershop.vn www.shippershop.vn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name shippershop.vn www.shippershop.vn;
    root /var/www/shippershop/public_html;
    index index.html index.php;

    ssl_certificate /etc/ssl/certs/shippershop.pem;
    ssl_certificate_key /etc/ssl/private/shippershop.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    limit_conn conn 100;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_comp_level 6;

    # Static: CSS/JS 7 days
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static: Images 30 days
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML: 2 min cache
    location ~* \.html$ {
        expires 2m;
        add_header Cache-Control "public, must-revalidate";
    }

    # API: FastCGI cache + rate limit
    location ~ ^/api/.*\.php$ {
        limit_req zone=api burst=50 nodelay;

        set $skip_cache 0;
        if ($request_method != GET) { set $skip_cache 1; }
        if ($arg_action ~ "^(vote|comment|send|create|delete|save|login|register)") { set $skip_cache 1; }
        if ($http_authorization != "") { set $skip_cache 1; }

        fastcgi_cache SS;
        fastcgi_cache_key "$scheme$request_method$host$request_uri";
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_bypass $skip_cache;
        fastcgi_no_cache $skip_cache;
        add_header X-Nginx-Cache $upstream_cache_status;

        include fastcgi_params;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 30s;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 32k;
    }

    # Login: strict rate limit
    location = /api/auth.php {
        limit_req zone=login burst=3 nodelay;
        include fastcgi_params;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # PHP general
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php_fpm;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 30s;
    }

    # Security
    location ~ /\.(git|env|htaccess) { deny all; }
    location ~ ^/includes/ { deny all; }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/ss_access.log;
    error_log /var/log/nginx/ss_error.log;
}
