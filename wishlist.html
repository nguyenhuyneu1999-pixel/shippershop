<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Yêu thích - ShipperShop</title>
<meta name="theme-color" content="#7C3AED">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="/css/dark-mode.css">
<script src="/js/dark-mode.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:#f0f2f5;min-height:100vh}
.wl-header{background:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e4e6eb;position:sticky;top:0;z-index:100}
.wl-body{max-width:600px;margin:0 auto;padding:12px}
.wl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.wl-card{background:#fff;border-radius:10px;overflow:hidden}
.wl-img{width:100%;aspect-ratio:1;object-fit:cover;background:#f0f0f0}
.wl-info{padding:8px 10px}
.wl-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-price{font-size:14px;font-weight:700;color:#7C3AED;margin-top:2px}
.wl-empty{text-align:center;padding:60px 20px;color:#999;grid-column:1/-1}
</style>
</head>
<body>
<div class="wl-header">
  <a href="javascript:history.back()" style="color:#333;text-decoration:none"><i class="fas fa-arrow-left"></i></a>
  <h1 style="font-size:17px">❤️ Yêu thích</h1>
  <span id="wlCount" style="font-size:13px;color:#65676B;margin-left:auto"></span>
</div>
<div class="wl-body"><div class="wl-grid" id="wlGrid"><div style="text-align:center;padding:40px;grid-column:1/-1"><i class="fas fa-spinner fa-spin" style="font-size:24px;color:#7C3AED"></i></div></div></div>

<script>
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
var token=localStorage.getItem('token');
if(!token)location.href='login.html';

fetch('/api/marketplace.php?action=wishlist',{headers:{'Authorization':'Bearer '+token}})
  .then(function(r){return r.json()})
  .then(function(d){
    var grid=document.getElementById('wlGrid');
    var items=d.data||[];
    if(!items.length){grid.innerHTML='<div class="wl-empty"><div style="font-size:48px;margin-bottom:12px">❤️</div><div style="font-size:16px;font-weight:600;color:#333;margin-bottom:8px">Chưa có sản phẩm yêu thích</div><a href="marketplace.html" style="color:#7C3AED;text-decoration:none">Khám phá chợ →</a></div>';return;}
    document.getElementById('wlCount').textContent=items.length+' sản phẩm';
    grid.innerHTML=items.map(function(l){
      return '<a href="listing.html?id='+l.id+'" class="wl-card" style="text-decoration:none;color:inherit">'+(l.image?'<img class="wl-img" src="'+l.image+'" loading="lazy">':'<div class="wl-img" style="display:flex;align-items:center;justify-content:center;font-size:36px;color:#ccc"><i class="fas fa-image"></i></div>')+'<div class="wl-info"><div class="wl-title">'+esc(l.title)+'</div><div class="wl-price">'+Number(l.price||0).toLocaleString('vi-VN')+'đ</div></div></a>';
    }).join('');
  });
</script>
</body>
</html>
